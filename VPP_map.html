tions and provide long-term system benefits by lowering baseline energy consumption and reducing peak demand.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Business Energy Manager (BEM) program is a behavioral and energy efficiency offering for non-residential customers designed to convert platform availability into active engagement and measurable energy savings. For the 2027-2029 program cycle, the program expects to achieve electric energy savings of 3,887 MWh and peak demand savings of 0.156 MW. While the program includes a budget for 'incentive spend,' the source material does not provide specific $/kW or $/kWh incentive rates for participants. The material details a cost recovery mechanism via 'Rider EE' (Energy Efficiency Surcharge Rider) under which Commercial and Industrial customers (Schedules SGS-ND, GS-SH, GS-WH, MGS-S, ORL, LGS-S, GS-P, GS-T, and OL) are billed a surcharge of $0.000010/kWh, but it does not list a specific tariff or schedule for participant-side compensation such as bill credits or direct incentive payments.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Business Energy Manager program does not list specific technology types like HVAC or lighting as eligible; rather, it provides a web-based platform for non-residential customers to access near real-time energy usage data and trends via customer-specific AMI data. No specific manufacturers, telemetry requirements beyond the existing AMI infrastructure, remote shut-off controllability, or demand response penalty conditions are mentioned.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/0bd4bbc0-d0e1-467c-95b4-d450c8faee94\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/5f02f510-b043-45cc-8e37-3c741ab51247\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a></div>\n</div>", "count": 1, "has_data": true}, "geometry": {"type": "Polygon", "coordinates": [[[-75.77378428589387, 39.72220142800481], [-75.75322633799044, 39.75799040111176], [-75.7170573465383, 39.79232640168206], [-75.66284439865956, 39.82142629512292], [-75.59431502144429, 39.834596022211365], [-75.59256076326683, 39.83493315582041], [-75.57964588121786, 39.83741514011883], [-75.57043115331136, 39.83918602842435], [-75.48120522698677, 39.82919206942335], [-75.41506024597793, 39.801920321206346], [-75.45943715069622, 39.76581422130973], [-75.4776380526462, 39.71501431561014], [-75.50973995383298, 39.68611437843608], [-75.53514192103027, 39.64721365349915], [-75.55944393465927, 39.62981386711733], [-75.54396289007407, 39.59600196124341], [-75.51272980668814, 39.578001833677966], [-75.52767379417635, 39.535280137652165], [-75.5280857554355, 39.49811630637827], [-75.59306594433194, 39.47918892040589], [-75.5718277835225, 39.438899703371774], [-75.5216796077728, 39.38787332482347], [-75.5056404328575, 39.37039645408315], [-75.46932165425719, 39.330822303859186], [-75.40837373827553, 39.264700413434575], [-75.3947878394682, 39.18835640851], [-75.40747088999143, 39.13370839968913], [-75.39627504341185, 39.057886383028894], [-75.34088829629249, 39.01996231713989], [-75.30665046463335, 38.94766257913939], [-75.3025503519609, 38.93900443823697], [-75.30407629687443, 38.913162515137905], [-75.23202635200518, 38.84425685588541], [-75.15901929174262, 38.79019621918239], [-75.11332841691885, 38.783001359758025], [-75.08947059291461, 38.79720135703943], [-75.07180168918221, 38.69650083690182], [-75.05396768241074, 38.536277578386155], [-75.04893271251265, 38.45126767395885], [-75.18544856463988, 38.451016239611945], [-75.34128092101652, 38.45243997353045], [-75.47927674518643, 38.453700559261016], [-75.69371506408115, 38.46012942331778], [-75.70037647237022, 38.54274451841926], [-75.70177207115638, 38.560768459972245], [-75.7075458946738, 38.635336585690744], [-75.70754992132773, 38.635386940788855], [-75.72309845355173, 38.829828398729056], [-75.74815170696806, 39.14313410582592], [-75.75643239931514, 39.24669004015541], [-75.76043871801853, 39.29679202159251], [-75.76689251491683, 39.37750120889656], [-75.76690212206093, 39.37765380207697], [-75.78859429228112, 39.722200414973884], [-75.77378428589387, 39.72220142800481]]]}}, {"id": "43", "type": "Feature", "properties": {"STATE_NAME": "Alabama", "summary": "<b style='font-size:13px;'>Alabama</b><span style='font-size:10px;color:#888;'> \u2014 1 program</span><br><br>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Rate Rider IC (Interruptible Capacity)</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Alabama Power Company</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Alabama Power Company's Rate Rider IC (Interruptible Capacity) is an active demand-side management program designed to consolidate two previous tariffs into a single rate schedule. The program\u2019s goal is to manage demand by allowing the company to request that qualifying industrial and commercial customers curtail a specified amount of electricity demand (non-firm capacity) for a prescribed number of hours annually upon notice. In exchange for this commitment, participants receive a capacity credit on their monthly bill for electric service, the value of which varies based on the amount of capacity designated and the agreed-upon suspension limits. Suspension periods are restricted to eight hours per day and must follow set limits on days per week (one, three, or five) and total annual hours (50, 100, or 200). The program also includes a modified non-compliance penalty to encourage performance, calculated by multiplying the amount of non-firm capacity used during a suspension period by $15.30 per kW or $13.80 per kVA.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Under Alabama Power's Rate Rider IC (Interruptible Capacity), qualifying commercial and industrial customers receive a capacity credit applied to their monthly bill for electric service. This incentive is provided in exchange for the customer's commitment to curtail a specified amount of non-firm capacity during suspension periods. Compensation is based on the amount of designated non-firm capacity and the level of the customer's commitment regarding the number of allowed suspension hours and days per week. Specifically, Option 3 participants receive a credit of $0.98 per kW per month or $0.88 per kVA per month for a commitment of 50 maximum cumulative suspension hours per year. The program consolidates the compensation previously set forth in two schedules: Non-Firm Capacity Interruptible Credit and Non-Firm Capacity Interruptible Credit Options.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The program is available to qualifying industrial and commercial customers whose entire electrical requirements are served by the company and who are capable of reducing electric service requirements to a predetermined level upon notice. Non-compliance penalties are calculated by determining the non-firm capacity used during a suspension period in fifteen-minute increments and multiplying that amount by $15.30 per kW or $13.80 per kVA.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/ce9127bb-d410-4ded-b1ba-0e3b46042de7\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/5fa8ca03-7ee0-46f4-b842-522aa1ecb881\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/5c167540-1284-458b-8566-5729ce05d3ad\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/e50f3777-a5b0-4c93-bcaa-e456f51ea46f\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a></div>\n</div>", "count": 1, "has_data": true}, "geometry": {"type": "Polygon", "coordinates": [[[-88.46866168669334, 31.89385317399238], [-88.46865920241633, 31.933170576310733], [-88.43114436686193, 32.22763463196482], [-88.42827698418424, 32.250141459941815], [-88.42131129306412, 32.30867767303572], [-88.38924795287043, 32.57812123398054], [-88.37333735943909, 32.71182377640523], [-88.34748978179405, 32.929033352714434], [-88.34008460181684, 32.99126283124968], [-88.31713469455964, 33.18412133197481], [-88.30444259083467, 33.288318325815496], [-88.2745165474868, 33.534000167772966], [-88.25444461198654, 33.698777630159185], [-88.24838694282865, 33.7449062065245], [-88.20722875623257, 34.05833087247609], [-88.20358340443866, 34.086525588743214], [-88.17326241400085, 34.32103735741064], [-88.15490277637316, 34.46303225308384], [-88.1395598842786, 34.58169470693446], [-88.13426338038309, 34.6226579538098], [-88.09788831425054, 34.892199834746584], [-88.15461735379944, 34.92238973932681], [-88.2000643142902, 34.99563395700627], [-88.20295931006918, 35.00802794331506], [-88.00003248830959, 35.005938766348514], [-87.98491653223535, 35.005909873632255], [-87.8518864901609, 35.00565559929407], [-87.68870603727633, 35.00427155132183], [-87.6250253  retention and enrollment rates,\nmore closely align incentive levels with comparable DEP programs and create an offering for\ncustomers (a) whose curtailment availability is limited to 50 hours per years and/or (b) who are currently prohibited from participating in existing measures based on the classification of their backup generation.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Not available.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/10fdd7b1-1b6f-4f6b-951e-35b3738fb96b\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/4f8e201c-7096-44f9-ac4c-fd38e7052b33\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a></div>\n</div>", "count": 1, "has_data": true}, "geometry": {"type": "Polygon", "coordinates": [[[-83.35323499768826, 34.72864662948908], [-83.32005935122986, 34.759614755571604], [-83.32386355499997, 34.789710675893836], [-83.2848103016645, 34.823041724481584], [-83.25258080726809, 34.853481790770665], [-83.20118221425376, 34.884651654569325], [-83.14062065613307, 34.924913550184776], [-83.12437782628668, 34.95523855663302], [-83.10860565488112, 35.00065910853719], [-83.1083995671907, 35.0007131543962], [-83.0084103004384, 35.02693503404483], [-82.89755898567853, 35.056005399035946], [-82.89749875445484, 35.05602119445717], [-82.78328279986113, 35.08560020640502], [-82.76179746683117, 35.08182867663617], [-82.746430809505, 35.07913121696378], [-82.68603983035445, 35.124545189930835], [-82.57771499876613, 35.1464755196492], [-82.53255985794483, 35.155617163446394], [-82.45560887003421, 35.177425148942106], [-82.41130087764071, 35.20248313449665], [-82.35317515602719, 35.19871426981943], [-82.29535388866195, 35.194965145814244], [-82.21 , [-71.11637397664961, 42.811902363908445], [-71.14970207396352, 42.81548845733557], [-71.1861032926536, 42.79068862437042], [-71.18180246801398, 42.73758983842366], [-71.24538377999473, 42.73655530365419], [-71.25510986422499, 42.736397006205785], [-71.25560474000616, 42.73638894981506], [-71.29420470431761, 42.696989710519716], [-71.35187344499693, 42.6981534078745], [-71.636213568289, 42.70488712367854], [-71.74581719990726, 42.70728654715721], [-71.89876892526777, 42.711466044823716], [-71.92903020328167, 42.71229294704259], [-72.11105710895535, 42.71726711112805], [-72.12452576184604, 42.717635172432054], [-72.28303347974126, 42.72200957772822], [-72.45851836431149, 42.72685308244881], [-72.47761433199476, 42.76124513797913], [-72.53959970840711, 42.804831929691495], [-72.55611201513688, 42.866251595576905]]]}}, {"id": "49", "type": "Feature", "properties": {"STATE_NAME": "Arizona", "summary": "<b style='font-size:13px;'>Arizona</b><span style='font-size:10px;color:#888;'> \u2014 1 program</span><br><br>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Commercial Load Control Demand Response</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Tucson Electric Power</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Tucson Electric Power (TEP) commercial load control demand response program is currently in development as a revamped initiative within the company's virtual power plant (VPP) portfolio. Its structure involves direct coordination between the utility, customers, and third-party service providers to enroll and dispatch commercial load for the purpose of providing grid services such as peaking capacity and energy. The underlying goals of TEP's broader VPP expansion, which includes this program, are to achieve cost savings, enhance grid reliability, and mitigate 'snapback effects'\u2014where the grid undergoes stress as demand response events suddenly end\u2014by stacking and staggering distributed energy resources.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Under Rider-18, Market Pricing - Experimental - 2 (MP-EX-2), eligible medium and large general service customers or large power service customers are provided with a framework where a third-party Generation Service Provider delivers wholesale power to TEP on their behalf. Compensation and service are managed through the calculation of 'imbalance energy,' defined as the difference between the hourly energy delivered by the provider and the customer's actual hourly metered load. While specific $/kW or $/kWh incentive rates for commercial load control are not detailed for this specific rider in the provided material, the program participation is capped at 100,000 kW and requires participants to have a minimum aggregated peak demand of 3,000 kW and a 60 percent load factor.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Tucson Electric Power is currently developing a revamped commercial load control demand response program. While existing Virtual Power Plant (VPP) components include residential smart thermostats (Smart Rewards) and batteries from Enphase, SolarEdge, or Tesla (Energy Storage Rewards), specific eligible technologies and manufacturer requirements for the commercial program are not yet defined beyond its classification as a demand response program.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/12e69dd7-f463-48b6-9deb-4d27db7c0c60\" target=\"_blank\" style=\"color:#4a9fd4;font-size:1 -bottom:6px;\">The Commercial and Industrial Flexible Load Program is a collaboration between Vermont Electric Cooperative (VEC), Efficiency Vermont (EVT), and Dynamic Organics (DO) designed to manage flexible loads such as refrigeration, HVAC, energy storage, and industrial processes. Its primary goal is to deliver value to members by capturing regional network service (RNS) and forward capacity market (FCM) peak demand reductions through automated load curtailment. The program integrates building management systems with VEC data to reduce manual intervention, using a statistical baseline developed by EVT to determine compensation. Participants are compensated for measured load curtailment during peak events via two proposed options: a $5.00 per average kW reduction across all called events in a month, or a $6.00 per single hour kW reduction during the month's single peak hour. The program also includes a demand forgiveness component to mitigate charges from potential 'snap-back' load following an event.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Participants in the Vermont Electric Cooperative Commercial and Industrial Flexible Load Program are compensated through bill credits for measured load curtailment during Regional Network Service (RNS) and Forward Capacity Market (FCM) peak events, measured against a statistical baseline. There are two compensation options available: Option #1 provides a credit of $5.00 per average kW reduced across all called peak events during a month, while Option #2 provides $6.00 per single hour kW reduced based on performance during the single peak hour for the month. Additionally, the program includes a demand forgiveness component to protect participants from additional charges caused by 'snap-back' load resulting in a new coincident peak.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Eligible flexible load technologies include refrigeration, air and water heating and cooling, energy storage, industrial processes, and innovative technologies like vehicle-to-grid charging stations; the program is described as a replacement for traditional demand response (DR) programs that integrates building management systems with VEC data for automated response, requiring participation for a period of ten years and offering participants an override option for automated actions without specified non-performance penalties.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/c8818258-6b21-4c17-a97a-b559781112b4\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/96544e3d-839d-4a3d-b34c-1b96df08a8c1\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/57df1a8f-1a3a-44e2-a504-c69f74dff322\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a></div>\n</div>", "count": 1, "has_data": true}, "geometry": {"type": "Polygon", "coordinates": [[[-73.41631779182619, 44.099419760058666], [-73.39539813378343, 44.16690085381181], [-73.34988846611975, 44.2303538502015], [-73.31661759971557, 44.257766784636985], [-73.31745558925017, 44.263519977225805], [-73.32422872954741, 44.31002081156263], [-73.33463682762331, 44.35687485269185], [-73.32095392813908, 44.38266680651176], [-73.29361317964434, 44.44055669988867], [-73.31287128852385, 44.50724371554273], [-73.34798341827648, 44.54616044124375], [-73.36366028614208, 44.56353602572924], [-73.36727511997124, 44.567542559833605], [-73.38996606305804, 44.61961740403261], [-73.36556029870042, 44.700293632867144], [-73.35767141183882, let vppLayer = null;

function getMap() {
  return Object.values(window).find(v => v && v._leaflet_id && v.eachLayer && v.setView);
}

function styleFunction(feature) {
  const count   = feature.properties.count || 0;
  const hasData = feature.properties.has_data;

  let color = '#d8b4fe';
  if (hasData) {
    if      (count >= 10) color = '#3b0764';
    else if (count >= 7)  color = '#5b21b6';
    else if (count >= 5)  color = '#7c3aed';
    else if (count >= 3)  color = '#a855f7';
    else if (count >= 1)  color = '#c084fc';
  }

  return {
    fillColor:   color,
    color:       'white',
    weight:      1.5,
    fillOpacity: hasData ? 0.75 : 0.2,
  };
}

function onEachFeature(feature, layer) {
  const name    = feature.properties.STATE_NAME || '';
  const count   = feature.properties.count || 0;
  const summary = feature.properties.summary || 'No data available';

  layer.bindTooltip(
    `<b>${name}</b><br><span style="color:#555;">${count} program${count !== 1 ? 's' : ''}</span>`,
    { sticky: false, direction: 'top', className: 'vpp-tooltip' }
  );
  layer.bindPopup(summary, { maxWidth: 460, maxHeight: 420, autoPan: true });
  layer.on('mouseover', () => layer.setStyle({ fillColor: '#f0a500', fillOpacity: 0.85, weight: 2 }));
  layer.on('mouseout',  () => { if (vppLayer) vppLayer.resetStyle(layer); });
}

window.addEventListener('load', () => {
  setTimeout(() => {
    const map = getMap();
    if (!map) return;
    vppLayer = L.geoJSON(VPP_GEOJSON, { style: styleFunction, onEachFeature }).addTo(map);
  }, 800);
});
