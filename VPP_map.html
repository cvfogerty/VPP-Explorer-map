047, 34.987205684288526], [-85.04518328551717, 34.98688306536692], [-85.2650552949268, 34.98507767031918], [-85.27755625959479, 34.984975025090975], [-85.36391919535713, 34.983376585731186], [-85.38496714374081, 34.982987021991], [-85.47433888824122, 34.983673343995605], [-85.60516501577332, 34.98467800221], [-85.86394612421654, 34.987030740157756], [-86.31127400664408, 34.991097857952724], [-86.31876077223656, 34.991078443996635], [-86.46779800936257, 34.990691974949605], [-86.78362844805642, 34.99192457891524], [-86.78364843087435, 34.99192465689206], [-86.8362867127442, 34.99280257794508], [-87.21075885950805, 34.999048604931076], [-87.21668327924873, 34.99914742707215], [-87.22405392076908, 34.999230173005245], [-87.60609823760473, 35.003518994795556], [-87.62502538587923, 35.00373147070445], [-87.68870603727633, 35.00427155132183], [-87.8518864901609, 35.00565559929407], [-87.98491653223535, 35.005909873632255], [-88.00003248830959, 35.005938766348514], [-88.20295931006918, 35.00802794331506], [-88.2000643142902, 34.99563395700627], [-88.25811126042436, 34.995462999238654], [-88.36353039382186, 34.99574673209482], [-88.38049261508299, 34.99579238553686], [-88.46987698920016, 34.99603296189196], [-88.78661186853091, 34.99525188839982], [-88.82305038017918, 34.99520692878384], [-89.01712693099603, 34.99496739881203], [-89.02653991519153, 34.99495574698386], [-89.19828773859271, 34.99444956568853], [-89.3526790496305, 34.99399485339127], [-89.434953533173, 34.99375262373799], [-89.64405118231114, 34.99406495043065], [-89.70660700701086, 34.99415834655163], [-89.72431514149078, 34.99418478482058], [-89.79518646689942, 34.9942908537851], [-90.30929736863703, 34.995692170374035], [-90.30069732494718, 35.02879136410224]]]}}, {"id": "9", "type": "Feature", "properties": {"STATE_NAME": "Louisiana", "summary": "<b style='font-size:13px;'>Louisiana</b><span style='font-size:10px;color:#888;'> \u2014 2 programs</span><br><br>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Aggregated Capacity DR Offering</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Entergy Louisiana</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The proposed demand response (DR) programs are designed to address growing capacity needs from load growth and generating resource deactivations by incentivizing retail customers to shift or reduce usage away from peak times. Offered pursuant to Paragraphs 6 and 7 of the Commission's DR Rule (Order No. R-35136), the structure involves aggregating numerous small resources\u2014such as thousands of smart thermostats\u2014across the state through 'bring-your-own-device' programs for residential customers and two new programs for non-residential customers. The programs utilize third-party expertise from EnergyHub, Connected Energy, and Enel X to leverage advanced technology and achieve geographic diversity. The goals include helping participating customers save on utility bills, lowering wholesale market costs, deferring the need for new generation resources, and ensuring system reliability during high wholesale prices or emergency conditions. Per the DR Rule, benefits must be shared between participating customers and the general ratepayer base, supported by a Rate Impact Measure (RIM) test exceeding a 1.0 ratio.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Commercial and Industrial (C&I) customers participating in the Aggregated Capacity DR Offering, administered by Enel X, receive incentive payments through Entergy Louisiana (ELL) and the vendor. These payments are specified under ELL's proposed Schedule DRP. The incentive structure consists of seasonal payments based on enrolled load reduction capability: $14.00 per kW for the MISO summer and spring seasons, and $7.00 per kW for the MISO fall and winter seasons. For customers maintaining consistent load reduction capability across all four seasons, this equates to an average monthly payment of approximately $3.50 per kW.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The excerpts describe demand response programs using a technology-neutral definition including load control programs and incentives to reduce or shift load from hours with high costs or reliability risks; however, specific eligible technology types (such as smart thermostats or battery storage), manufacturers, telemetry/communication protocols, and detailed non-performance penalty structures are not specified beyond the requirement that programs must be implemented through tariffs, rate schedules, or riders and must prevent duplicative or overlapping benefits.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/460153d9-2120-4b73-a808-7b9096564846\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/0b3abf5a-289b-472a-bcd3-e1402ab2edbb\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/b4fee621-2c74-40c6-9b49-c371872bcd74\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/26ef3216-0e92-46d9-be70-db76548c0f31\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Agricultural Irrigation Load Control</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Entergy Louisiana</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Agricultural Irrigation Load Control program is one of Entergy Louisiana's proposed demand response (DR) programs intended to comply with the Commission's DR Order (General Order 05-25-2021). The program is structured to be administered by Connected Energy.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Commercial and Industrial (C&I) customers participating in the proposed aggregated capacity program (Schedule DRP) receive incentive payments and administrative payments tied to their ability to deliver load reduction capability. Alternatively, customers participating under Rider IES receive compensation in the form of an interruptible bill credit. Entergy Louisiana proposed increasing the Rider IES interruptible bill credit to equal the incentive payment available through the Schedule DRP program. While the Agricultural Irrigation Load Control program is part of the proposed demand response (DR) programs, specific $/kW or $/kWh rates for that program are not detailed in the provided materials.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Eligible technologies for the Irrigation Load Control program include irrigation pumps or wells used to irrigate crops; no specific manufacturers are listed, but load control hardware is installed at the customer location at no cost. Requirements include running pumps a minimum of 64 hours monthly during June-September and allowing the utility to power off participating wells. Controllability is managed via utility-installed hardware where participants cannot control pumps until an event concludes, though they may opt out via phone or a farmer portal; penalties for non-compliance include incentive payments being voided if customer actions interfere with an event or being reduced proportional to the percentage of opt-outs.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/460153d9-2120-4b73-a808-7b9096564846\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/241b5ab9-74ec-47d8-b8de-f1b32f6b96c3\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/26ef3216-0e92-46d9-be70-db76548c0f31\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/253f6d0d-4419-4915-b511-9052a82be3df\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a></div>\n</div>", "count": 2, "has_data": true}, "geometry": {"type": "Polygon", "coordinates": [[[-94.04305266573613, 32.69302877213226], [-94.04302681487478, 32.797475155577], [-94.0430031131636, 32.881088481335674], [-94.04296699942417, 33.01921679678163], [-93.8146011086003, 33.01938629729277], [-93.80712826123708, 33.019391847081465], [-93.72327606980733, 33.01945414724714], [-93.5209955724058, 33.018739271131416], [-93.49056117580739, 33.018631711437855], [-93.37713694503503, 33.01823083803637], [-93.23864963259099, 33.01801264865461], [-93.19740480507234, 33.01794769814727], [-92.98877878689227, 33.01724781972532], [-92.97113971512137, 33.01718863346943], [-92.72474566649497, 33.014338192549964], [-92.7235554920967, 33.014324424883306], [-92.50138526465184, 33.01215642659649], [-92.22282560086256, 33.00907932723 d #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Auto-DLM</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Central Hudson Gas & Electric Corporation</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Central Hudson Gas & Electric Corporation is one of the indicated utilities participating in the Auto-DLM program, which is structured as a competitive procurement process for load relief resources. The program aims to prevent or mitigate overload situations on the utility's electric grid and provide peak-shaving benefits. Participating eligible customers, including direct participants and aggregators, are compensated for reducing load when called upon by the company with at least ten minutes' advance notice. Resources in the Auto-DLM program are held to higher standards of availability, reliability, and response times compared to the Term-DLM program, warranting higher incentive payments. Compensation is governed by a 'program agreement' entered into following a request for proposal (RFP) process.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Not available.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Eligible technologies for Auto-DLM include distributed generation and energy storage resources (ESS), with Con Edison and O&R excluding all fossil fuel-fired sources and Central Hudson excluding diesel-fired sources; specific eligible load control technologies include electric vehicle charger adjustments and solar photovoltaic (PV) systems. The commission considers all demand response programs as virtual power plants (VPPs). Distributed generation and energy storage resources must be either currently operational or in the utility's interconnection queue. While specific manufacturer names and communication protocol details (e.g., data frequency) are not provided, programs utilize a unified approach for behind-the-meter load control technologies and may require customers to participate in available DLM programs as a condition for receiving other incentives.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/e7494701-e7ce-49b5-a1b8-3ba53da7af53\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/processes/7512c2d0-1004-4e1c-9959-8c48d632ba24\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 2</a> <a href=\"https://app.halcyon.io/processes/86b250fd-0ccd-48f4-9376-10bee009fd22\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 3</a> <a href=\"https://app.halcyon.io/processes/c4e13d5a-4af9-4978-8bd4-9c7e024095a8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 4</a> <a href=\"https://app.halcyon.io/documents/6aedfc59-e507-4dca-ab67-21646f07a0e7\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/743f1d09-e0ac-4874-9c39-fb7a3937acb9\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/9082c896-36e4-4cbf-8ed9-ea1526de81a8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a> <a href=\"https://app.halcyon.io/documents/c8607907-c329-436e-a587-62d3b2bcd51f\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 4</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Commercial System Relief Program (CSRP)</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Central Hudson Gas & Electric Corporation</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">This program is available to qualifying customers anywhere in the Central Hudson service territory. Program rules and operational parameters are included within Central Hudson\u2019s Electric Tariff PSC No. 15. The CSRP provides commercial and industrial customers the opportunity to earn incentives by committing to curtail load during peak periods when called upon by Central Hudson.\n</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The CSRP compensation structure includes two enrollment options: the reservation payment option and the voluntary payment option. Monthly Reservation Payments: These are paid to customers as applicable based on their enrollment. Event Performance Payments: These are paid based on the amount of load reduction provided during called events. Events are dispatched when forecasted system loads reach 94% of the forecasted summer peak.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">In Central Hudson's Term-DLM and Auto-DLM programs, which utilize the same minimum qualifications as the CSRP, eligible technologies include distributed generation and energy storage resources that must be operational or in the utility's interconnection queue, though diesel-fired generation is excluded; the source material does not specify eligible manufacturers, telemetry requirements, or CSRP-specific demand response penalties.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/7512c2d0-1004-4e1c-9959-8c48d632ba24\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/processes/e7494701-e7ce-49b5-a1b8-3ba53da7af53\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 2</a> <a href=\"https://app.halcyon.io/processes/86b250fd-0ccd-48f4-9376-10bee009fd22\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 3</a> <a href=\"https://app.halcyon.io/processes/c4e13d5a-4af9-4978-8bd4-9c7e024095a8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 4</a> <a href=\"https://app.halcyon.io/documents/129ce4ad-dffb-4788-b06f-4cf9ea769eac\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/9ad9f7d6-0c9f-49e0-a5f6-182e41006e75\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/c8607907-c329-436e-a587-62d3b2bcd51f\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Term-DLM</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Central Hudson Gas & Electric Corporation</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Term-DLM (Dynamic Load Management) program is a system-wide demand response initiative offered throughout the utility's electric service territory. The program is designed to provide peak-shaving benefits to the grid by compensating eligible participating customers or aggregators for reducing their load during specific conditions. Participants enter into a program agreement for a specified term of years following selection through a request for proposal (RFP) process or a fixed, published price procurement mechanism. The program is activated for peak shaving when the day-ahead system electric load forecast reaches a specified percentage of the forecasted system peak, and resources must be ready to provide load relief with no less than twenty-one hours' advance notice.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Some key differences of the new categories compared to Central Hudson\u2019s existing CSRP are: contracts\nof three-year minimums; the option for a competitive, sealed, pay-as-bid procurement process;\npayments limited to 100% resource performance; more aggressive penalty structures, and exclusion of\ndiesel generation resources.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Eligible technologies for Central Hudson's Term-DLM program include distributed generation and energy storage resources, provided they are currently operational or already in the utility's interconnection queue. Diesel-fired generation sources are explicitly excluded from participation. These programs are classified as demand response (or virtual power plants) and require participants to meet minimum qualifications equivalent to existing requirements for the Commercial System Relief Program (CSRP) and Distribution Load Relief Program (DLRP).</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/7512c2d0-1004-4e1c-9959-8c48d632ba24\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/processes/e7494701-e7ce-49b5-a1b8-3ba53da7af53\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 2</a> <a href=\"https://app.halcyon.io/processes/86b250fd-0ccd-48f4-9376-10bee009fd22\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 3</a> <a href=\"https://app.halcyon.io/processes/c4e13d5a-4af9-4978-8bd4-9c7e024095a8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 4</a> <a href=\"https://app.halcyon.io/documents/129ce4ad-dffb-4788-b06f-4cf9ea769eac\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/6aedfc59-e507-4dca-ab67-21646f07a0e7\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/c8607907-c329-436e-a587-62d3b2bcd51f\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Auto-DLM</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Consolidated Edison Company of New York</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Auto-DLM program, governed by Rider AC, is a performance-based demand response program designed to manage local distribution network contingencies and emergency conditions. It combines the capabilities of the Commercial System Relief Program (CSRP) and the Distribution Load Relief Program (DLRP) to provide load relief on not less than 10-minutes notice. To participate, aggregators bid collections of customers within a single network into a competitive procurement process for three-to-five-year contracts associated with specific 'vintage years.' Participants specify a kw load relief amount and an incentive rate ($ per kw), and are required to participate in Term-DLM peak-shaving events unless called for a separate Auto-DLM contingency event on the same day. The program targets the reduction of strain on local distribution networks and supports grid flexibility by engaging customers capable of curtailing or shifting at least 50 kw of load.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Commercial and industrial customers participating in the Auto-DLM program are compensated under the Rider AC tariff schedule. This program utilizes a competitive procurement process to determine compensation at a fixed dollar per kW value of compensation, referred to as an incentive rate. Aggregators under this rider sign multi-year contracts to provide load relief. Performance for the Auto-DLM program is measured using a Customer Baseline Load (CBL) methodology, which calculates the difference between an estimated baseline of what the customer's load would have been and their actual load during the event.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Eligible technologies include energy storage systems (ESS) with a 50 kW AC or less power rating, smart thermostats (DLC/BYOT programs), and electric vehicle charger adjustments; participants must use a brand and service provider from the list of eligible systems published on Con Edison's website. Requirements for ESS include a permanent installation, internet connectivity, and telemetry providing system power output for performance measurements. In these demand response programs, incentives are based solely on annual performance with no upfront compensation, and eligible customers must make a one-time, irreversible decision to forgo demand reduction value (DRV) and locational system relief value (LSRV) compensation in the rider r value stack tariff.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/7512c2d0-1004-4e1c-9959-8c48d632ba24\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/processes/fb3e74ee-af3a-42e1-ac8d-85b6acdec94e\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 2</a> <a href=\"https://app.halcyon.io/processes/e7494701-e7ce-49b5-a1b8-3ba53da7af53\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 3</a> <a href=\"https://app.halcyon.io/documents/15df4f36-5456-47a6-bc98-50243209cca4\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/58f71c26-7aa4-4075-9589-6475759cd085\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/9082c896-36e4-4cbf-8ed9-ea1526de81a8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a> <a href=\"https://app.halcyon.io/documents/72330581-562e-4647-badc-17056a9c4661\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 4</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Commercial Managed Charging Program (CMCP)</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Consolidated Edison Company of New York</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Commercial Managed Charging Program (CMCP) is designed to provide operating cost relief to commercial electric vehicle (EV) charging customers while encouraging grid-beneficial charging behavior. The program structure includes an off-peak incentive where 100 percent of charging energy (kWh) is eligible if the session occurs entirely during the overnight off-peak period; for sessions occurring partially during this period, incentives are prorated based on the percentage of the session duration that took place during off-peak hours. The program aims to broaden participation and improve customer experience by expanding data eligibility requirements, such as using charging session data to qualify for participation.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The compensation structure for the Commercial Managed Charging Program (CMCP) involves participation incentives set forth on the 'Statement of Managed Charging Participation Incentives,' which is filed with the Commission apart from the standard schedule (PSC NO: 10 - Electricity). For medium and heavy-duty vehicles (MHDV), the participation incentive is designed as a per-kWh equivalent based on the difference between the SC 9 Rate I demand delivery rate and the off-peak SC 9 Rate IV as-used demand delivery rate, plus the difference between the forecasted market supply charges for those respective rates. For light-duty vehicles, the incentive is similarly based on the differences between SC 1 Rate I and SC 1 Rate III delivery and supply charges. Additionally, transit fleet charging receives a use-case-specific adder under the CMCP. Specific dollar-per-kW or dollar-per-kWh values are not provided in the source material as they are filed on the separate Statement of Managed Charging Participation Incentives rather than the general tariff leaf.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Eligible technology segments for load management programs include on-site energy storage, energy storage integrated EVSE, load management software, and load management hardware. Software must provide active load management, defined as the ability to influence charging power, time, or duration to meet objectives. All eligible technology must meet specific technical specifications and industry certifications published on the Joint Utilities website. Programs can be active, where behavior is driven by direct utility signals, or passive, where participants respond to price signals.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/fcb70502-e143-4245-abc7-e7488ce213d3\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/30c1c7d6-b622-4fae-8761-8a7337354766\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/be6bfb32-3e2a-4592-85db-c8e18d8d8442\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/af7cca20-81ad-4ab2-9c21-61b407ce7b87\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a> <a href=\"https://app.halcyon.io/documents/27e9f013-0cca-4a15-8336-f2a7c1538d6d\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 4</a> <a href=\"https://app.halcyon.io/documents/d27957fc-6d45-4693-acc2-6df41eaeaf09\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 5</a> <a href=\"https://app.halcyon.io/documents/52ab9824-5da0-4dba-ae78-8b4d5d247c27\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 6</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Commercial System Relief Program (CSRP)</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Consolidated Edison Company of New York</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">While the provided documents do not provide a prose description of the Commercial System Relief Program (CSRP) specifically, the materials identify that demand response and dynamic load management programs are administered through various schedules. Participants receive compensation under Rider AC (Auto-DLM and Term-DLM), Rider L (Direct Load Control Program), and Rider T. In the Term-DLM and Auto-DLM programs under Rider AC, aggregators bid for three-to-five-year contracts to provide load relief in specific networks, specifying a per kW incentive rate and seeking a performance factor based on load reduction achieved. Additionally, energy storage systems enrolled in the direct load control program under Rider L are eligible for performance-based incentives at the end of a capability period based on average verified performance measured through telemetry.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The provided source materials do not contain information regarding the specific compensation structure, payment types (reservation or performance), $/kW or $/kWh rates, or the tariff schedule for the Consolidated Edison Commercial System Relief Program (CSRP). The excerpts focus on Central Hudson Gas & Electric Corporation's residential battery program proposals and general comments from Sunrun regarding virtual power plant programs.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Eligible technologies include Energy Storage Systems (ESS) with a nameplate capacity \u2264 50 kW AC, and other behind-the-meter load control technologies such as electric vehicle charger adjustments; all fossil fuel-fired generation sources are excluded. Participation requires the installation of a control device provided by the company, service provider, or customer that must be connected to the internet to allow the company to remotely control equipment and reduce load during events. A list of company-approved ESS models and service providers is maintained on the utility website. Each control device must include a feature allowing the customer or tenant to override the company's control.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/7512c2d0-1004-4e1c-9959-8c48d632ba24\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/processes/e7494701-e7ce-49b5-a1b8-3ba53da7af53\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 2</a> <a href=\"https://app.halcyon.io/processes/86b250fd-0ccd-48f4-9376-10bee009fd22\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 3</a> <a href=\"https://app.halcyon.io/processes/c4e13d5a-4af9-4978-8bd4-9c7e024095a8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 4</a> <a href=\"https://app.halcyon.io/documents/15df4f36-5456-47a6-bc98-50243209cca4\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/9082c896-36e4-4cbf-8ed9-ea1526de81a8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/c8607907-c329-436e-a587-62d3b2bcd51f\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Distribution Load Relief Program (DLRP)</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Consolidated Edison Company of New York</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Distribution Load Relief Program (DLRP) is a performance-based demand response program operating under Rider T. Its structure follows a market-based participation pathway using interval meter data and baseline calculations to measure performance. The program's goals include reducing system load during critical periods and managing local distribution network strain when contingencies or emergency conditions occur. Participants can enroll directly or through aggregators to provide load relief and receive fixed monthly reservation incentive rates for pledged load reductions or shifting load to off-peak hours.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Under the Term-DLM and Auto-DLM programs, participants are compensated through a combination of annual reservation payments and performance-based payments. Applicants are required to detail a desired incentive rate per kilowatt ($/kW) per capability period, which determines the annual reservation payment. Additionally, participants receive a performance payment of $1 per kilowatt hour ($/kWh) for load relief achieved during a term- or auto-DLM event, unless service is taken under Rider R. For energy storage systems (ESS), performance is calculated by comparing output during event hours to a baseline of non-event days, and payments are settled at the end of each summer capability period as a direct payment or distributed to a service provider. Compensation is governed by specific schedules, including Rider R and Niagara Mohawk Power Corporation Schedule for Electric Service P.S.C. No. 220, Rule 40.1.8.6.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Eligible technologies for Con Edison include behind-the-meter load control technologies, such as electric vehicle chargers and central air conditioners, and energy storage systems (ESS). ESS must be permanently installed with a nameplate capacity \u2264 50 kW AC, meet all applicable codes and standards, and be capable of discharging to the grid or reducing on-site load. All participating equipment must be equipped with a control device that allows for remote control by the company, is connected to the internet, and includes a manual override feature. For ESS, the model and service provider must be from a company-approved list, and fossil fuel-fired generation sources are excluded from participation. These resources are classified as demand response.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/fb3e74ee-af3a-42e1-ac8d-85b6acdec94e\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/processes/7512c2d0-1004-4e1c-9959-8c48d632ba24\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 2</a> <a href=\"https://app.halcyon.io/processes/e7494701-e7ce-49b5-a1b8-3ba53da7af53\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 3</a> <a href=\"https://app.halcyon.io/processes/86b250fd-0ccd-48f4-9376-10bee009fd22\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 4</a> <a href=\"https://app.halcyon.io/processes/c4e13d5a-4af9-4978-8bd4-9c7e024095a8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 5</a> <a href=\"https://app.halcyon.io/documents/72330581-562e-4647-badc-17056a9c4661\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/99f9e6e9-e1e5-4da1-bcd8-0e670481a9bc\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/15df4f36-5456-47a6-bc98-50243209cca4\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a> <a href=\"https://app.halcyon.io/documents/9082c896-36e4-4cbf-8ed9-ea1526de81a8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 4</a> <a href=\"https://app.halcyon.io/documents/c8607907-c329-436e-a587-62d3b2bcd51f\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 5</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Term-DLM</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Consolidated Edison Company of New York</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Term Dynamic Load Management (Term-DLM) program is a demand response initiative under ConEd's Rider AC, designed to manage local peak demand through load relief. The program's structure utilizes a competitive procurement process where aggregators bid collections of customers in a single network (aggregations) for multi-year contracts, typically three to five years in duration. Participants specify a fixed dollar per kilowatt ($/kW) incentive rate and the quantity of load relief they intend to provide for a specific 'vintage year.' Term-DLM provides load relief on not less than 21-hours advance notice, offering capabilities similar to the Commercial System Relief Program (CSRP). Participants are required to achieve pledged load reductions during peak shaving and network contingency events, with performance measured using a customer baseline load (CBL) methodology. Participants receive performance-based compensation under the Rider AC tariff.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Under the Rider AC program, which includes Term Dynamic Load Management (Term-DLM), compensation is structured through a competitive procurement process where aggregators sign multi-year contracts at a fixed dollar per kilowatt ($/kW) incentive rate. The incentive rate is designed to balance program cost-effectiveness with meaningful amounts to encourage participation. For energy storage systems (ESS), proposed performance-based incentives are calculated by multiplying the incentive rate (e.g., $50/kW-year) by the summer capability period average performance (e.g., 3-kW), resulting in an annual payment (e.g., $150). Performance is measured against a customer baseline load (CBL) methodology, and payments are issued at the end of each summer capability period as a direct payment or distributed to a service provider. Commercial and industrial eligibility typically requires a minimum load relief capability of at least 50 kW, either individually or via an aggregator.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Eligible technologies include distributed generation, energy storage resources, electric vehicle chargers, and a wide range of behind-the-meter load control technologies; however, Consolidated Edison excludes all fossil fuel-fired generation sources. For residential energy storage systems (ESS), units must be permanently installed with a nameplate capacity \u2264 50 kW AC, meet all codes and standards, and be from a list of company-approved models and service providers. These systems must utilize a control device connected to the internet that allows the company to remotely control equipment to reduce load, though customers retain override capability. Participants must meet minimum qualifications equivalent to CSRP and DLRP programs, and those in Auto-DLM programs may face negative performance factors for failing to meet obligations.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/fb3e74ee-af3a-42e1-ac8d-85b6acdec94e\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/processes/7512c2d0-1004-4e1c-9959-8c48d632ba24\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 2</a> <a href=\"https://app.halcyon.io/processes/e7494701-e7ce-49b5-a1b8-3ba53da7af53\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 3</a> <a href=\"https://app.halcyon.io/processes/86b250fd-0ccd-48f4-9376-10bee009fd22\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 4</a> <a href=\"https://app.halcyon.io/processes/c4e13d5a-4af9-4978-8bd4-9c7e024095a8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 5</a> <a href=\"https://app.halcyon.io/documents/72330581-562e-4647-badc-17056a9c4661\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/15df4f36-5456-47a6-bc98-50243209cca4\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/58f71c26-7aa4-4075-9589-6475759cd085\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a> <a href=\"https://app.halcyon.io/documents/c8607907-c329-436e-a587-62d3b2bcd51f\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 4</a> <a href=\"https://app.halcyon.io/documents/9082c896-36e4-4cbf-8ed9-ea1526de81a8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 5</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Auto-DLM</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">National Grid</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Auto-DLM program is a demand response initiative designed to provide both peak-shaving benefits and reliability services in specified areas within National Grid's electric service territory. The program is structured to be activated under two conditions: (1) to prevent or mitigate overload situations on the utility's electric grid, and (2) for peak-shaving purposes when the day-ahead system electric load forecast reaches a specified percentage of the forecasted system peak. Resources in this program are held to higher standards of availability, reliability, and response times (no less than ten minutes' notice) compared to Term-DLM, which warrants higher corresponding incentive payments. Participating eligible customers or aggregators receive compensation for reducing load under these conditions for a specified term of years, as established in a program agreement following a competitive request for proposal (RFP) process.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">National Grid's Auto-DLM program utilizes a compensation structure consisting of reservation payments and performance payments. Reservation payments are determined through an annual procurement process via a competitively procured bid (RFP) and are defined as a contracted rate; selected participants receive a contract for 3-5 or more years at their awarded participation rate. Performance payments are set at a rate of $0.10/kWh for events. The specific structure of these incentives is publicly available through Rule 65 of the tariff, while specific contract prices remain confidential.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Eligible technologies for National Grid include distributed generation and energy storage resources that are either currently operational or in the utility's interconnection queue, excluding diesel-fired generation. The Auto-DLM program requires resources to meet higher standards for availability and reliability with response times of no less than ten minutes' notice. While specific manufacturers or penalty amounts for non-performance are not detailed in the provided documents, resources must be in-service by May 1st of the capability period and enter into a program agreement following a competitive procurement process.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/7512c2d0-1004-4e1c-9959-8c48d632ba24\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/processes/18449bce-fbcc-4f12-af67-107254cb3fc8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 2</a> <a href=\"https://app.halcyon.io/processes/e7494701-e7ce-49b5-a1b8-3ba53da7af53\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 3</a> <a href=\"https://app.halcyon.io/processes/86b250fd-0ccd-48f4-9376-10bee009fd22\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 4</a> <a href=\"https://app.halcyon.io/processes/c4e13d5a-4af9-4978-8bd4-9c7e024095a8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 5</a> <a href=\"https://app.halcyon.io/documents/22e8fc95-70ca-47ac-a090-8858d1d57aea\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/6aedfc59-e507-4dca-ab67-21646f07a0e7\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/c8607907-c329-436e-a587-62d3b2bcd51f\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Commercial System Relief Program (CSRP)</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">National Grid</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Commercial System Relief Program (CSRP) is a demand response program designed to handle annual fluctuations in customer enrollment. Unlike the Term-DLM and Auto-DLM programs, which use fixed multi-year contracts for load relief, the CSRP is structured to allow for incentive payment rates and load relief amounts that may differ from year to year.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">National Grid compensates residential and small commercial customers through a performance incentive based on average power output delivered during dispatched events. Performance is measured by comparing energy storage system (ESS) output during event hours against a baseline of output on non-event days. The seasonal performance, defined as the average of the customer\u2019s hourly delivered kW for each event within a season, is multiplied by an annual per-kW incentive rate. National Grid plans to offer an incentive of $50/kW-year for participants. Customers may also elect to assign this incentive directly to their service provider to offset financing or leasing costs. While the excerpts discuss dynamic load management and 'bring your own' device models, they do not identify a specific tariff schedule name such as the 'Commercial System Relief Program' for National Grid or provide separate reservation versus performance payment rates for C&I customers.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Eligible technologies include energy storage systems (ESS) through 'bring your own battery' (BYOB) programs and distributed generation resources (excluding diesel-fired generation sources), which are classified as demand response. For National Grid's CSRP, the utility imposes a performance penalty where the monthly performance factor is set to zero if it falls below or equal to 25 percent.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/7512c2d0-1004-4e1c-9959-8c48d632ba24\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/processes/18449bce-fbcc-4f12-af67-107254cb3fc8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 2</a> <a href=\"https://app.halcyon.io/processes/cf033573-537c-4d41-883a-1803d2b8e9c1\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 3</a> <a href=\"https://app.halcyon.io/processes/0e1394da-ba11-43b4-92e7-025e3af9faf9\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 4</a> <a href=\"https://app.halcyon.io/processes/b80df85d-e2b4-495f-b541-e4333d13dd0c\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 5</a> <a href=\"https://app.halcyon.io/processes/46070060-1b8a-4b99-830a-4866d409a4b1\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 6</a> <a href=\"https://app.halcyon.io/processes/04946163-22b2-4568-8fd1-bc8f84aacf60\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 7</a> <a href=\"https://app.halcyon.io/processes/c5c5277a-9dd5-46b0-af02-a99ee3589313\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 8</a> <a href=\"https://app.halcyon.io/processes/e7494701-e7ce-49b5-a1b8-3ba53da7af53\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 9</a> <a href=\"https://app.halcyon.io/processes/86b250fd-0ccd-48f4-9376-10bee009fd22\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 10</a> <a href=\"https://app.halcyon.io/processes/c4e13d5a-4af9-4978-8bd4-9c7e024095a8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 11</a> <a href=\"https://app.halcyon.io/documents/e574c75a-77ac-4dc8-b441-889c089ae361\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/2887f7c6-9abf-4c97-928a-ade4717de874\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/c8607907-c329-436e-a587-62d3b2bcd51f\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a> <a href=\"https://app.halcyon.io/documents/9082c896-36e4-4cbf-8ed9-ea1526de81a8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 4</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Distribution Load Relief Program (DLRP)</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">National Grid</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Term- and Auto-DLM programs (collectively the Distribution Load Management programs) are structured as long-term contracted programs utilizing fixed multi-year contracts that specify load relief amounts in kW and compensation rates to provide stability and predictability. The Term-DLM program is offered system-wide for peak shaving and is activated when the day-ahead system electric load forecast reaches a specified percentage of its forecasted peak, requiring at least 21 hours' notice. The Auto-DLM program is offered in specified areas to prevent or mitigate grid overload or for peak shaving; it requires higher standards of availability and response times (no less than 10 minutes' notice) and receives higher incentive payments. Participants, which include direct participants or aggregators selected through a Request for Proposal (RFP) process, are compensated for reducing load under certain conditions in accordance with a 'Program Agreement'.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Under National Grid's demand response and dynamic load management programs, customers are compensated based on their average performance across all events in a season. Performance is measured by comparing energy storage system (ESS) output during event hours to a baseline of output on non-event days. The seasonal performance, defined as the average of hourly delivered kW across all events, is multiplied by an annual per kW incentive rate. National Grid plans to offer an incentive of $50/kW-year. The provided documentation does not specify the names of the tariff schedules or riders for commercial and industrial customers, nor does it provide $/kWh rates.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">National Grid allows participation through the DLRP for customers who have interval metering installed and operational meter communications. While specific manufacturers are not listed, eligible resources include behind-the-meter load control technologies and energy storage systems (ESS); however, diesel-fired generation sources are specifically excluded from participation. For programs like the CSRP and DLRP, customers may commence participation on various dates (May 1, June 1, or July 1) provided that interval metering is installed and communications are operational at least one month prior. Under similar DLM program structures, technologies such as electric vehicle chargers and 'bring your own thermostat' (BYOT) options are also utilized as load control technologies.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/7512c2d0-1004-4e1c-9959-8c48d632ba24\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/processes/18449bce-fbcc-4f12-af67-107254cb3fc8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 2</a> <a href=\"https://app.halcyon.io/processes/e7494701-e7ce-49b5-a1b8-3ba53da7af53\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 3</a> <a href=\"https://app.halcyon.io/processes/cf033573-537c-4d41-883a-1803d2b8e9c1\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 4</a> <a href=\"https://app.halcyon.io/processes/0e1394da-ba11-43b4-92e7-025e3af9faf9\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 5</a> <a href=\"https://app.halcyon.io/processes/b80df85d-e2b4-495f-b541-e4333d13dd0c\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 6</a> <a href=\"https://app.halcyon.io/processes/46070060-1b8a-4b99-830a-4866d409a4b1\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 7</a> <a href=\"https://app.halcyon.io/processes/04946163-22b2-4568-8fd1-bc8f84aacf60\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 8</a> <a href=\"https://app.halcyon.io/processes/c5c5277a-9dd5-46b0-af02-a99ee3589313\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 9</a> <a href=\"https://app.halcyon.io/processes/86b250fd-0ccd-48f4-9376-10bee009fd22\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 10</a> <a href=\"https://app.halcyon.io/processes/c4e13d5a-4af9-4978-8bd4-9c7e024095a8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 11</a> <a href=\"https://app.halcyon.io/documents/e574c75a-77ac-4dc8-b441-889c089ae361\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/6aedfc59-e507-4dca-ab67-21646f07a0e7\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/2887f7c6-9abf-4c97-928a-ade4717de874\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a> <a href=\"https://app.halcyon.io/documents/c8607907-c329-436e-a587-62d3b2bcd51f\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 4</a> <a href=\"https://app.halcyon.io/documents/d4cfe5db-9219-4b09-abb1-809c460f45d0\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 5</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Term-DLM</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">National Grid</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Term-DLM program is a demand response initiative designed to provide system-wide peak-shaving benefits within National Grid's electric service territory. The program's structure allows eligible commercial and residential customers, or aggregators selected through a request for proposal (RFP) process, to be compensated for reducing electric load under specific conditions for a term of a specified number of years. Performance is governed by a program agreement or tariff revisions. The program is generally activated when the day-ahead system electric load forecast reaches a company-specified percentage of the forecasted system peak, and participants are provided with no less than twenty-one hours' advance notice for an event.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Under the Term-DLM and Auto-DLM programs, compensation is shifting toward a fixed, published pricing structure to streamline procurement and encourage energy storage participation. Performance incentives for energy storage systems (ESS) are calculated by comparing output during event hours against a baseline output from non-event days, including net exports. For residential and small commercial customers, National Grid and Con Edison have proposed an incentive rate of $50/kW-year, though this rate may be updated based on benefit-cost analyses and the outcome of the Value of Distributed Energy Resources (VDER) proceeding. Annual incentive payments are determined by multiplying this $/kW rate by the average summer capability period performance. Customers may receive these payments directly or, at their discretion, distribute them to a service provider to offset leasing or financing costs. While specific schedules or riders for C&I customers are not explicitly named for National Grid, participants in these programs generally engage through the Commercial System Relief Program (CSRP) and the Distribution Load Relief Program (DLRP). Compensation structures may be updated to reflect Demand Reduction Value (DRV) and Locational System Relief Value (LSRV) methodologies established in the VDER proceeding (Case 15-E-0751).</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Eligible technology types for National Grid's Term-DLM program include distributed generation and energy storage resources that are currently operational or in the interconnection queue, while diesel-fired generation is specifically excluded. For demand response classification, the program accommodates a wide range of behind-the-meter load control technologies and requires resources to be in-service by May 1st of the capability period. National Grid requires Term-DLM resources to respond to peak-shaving activations with no less than twenty-one hours' advance notice; however, specific telemetry requirements and demand response penalty details are not further specified in the provided documents.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/7512c2d0-1004-4e1c-9959-8c48d632ba24\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/processes/fb3e74ee-af3a-42e1-ac8d-85b6acdec94e\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 2</a> <a href=\"https://app.halcyon.io/processes/e7494701-e7ce-49b5-a1b8-3ba53da7af53\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 3</a> <a href=\"https://app.halcyon.io/processes/18449bce-fbcc-4f12-af67-107254cb3fc8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 4</a> <a href=\"https://app.halcyon.io/processes/86b250fd-0ccd-48f4-9376-10bee009fd22\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 5</a> <a href=\"https://app.halcyon.io/processes/c4e13d5a-4af9-4978-8bd4-9c7e024095a8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 6</a> <a href=\"https://app.halcyon.io/documents/9082c896-36e4-4cbf-8ed9-ea1526de81a8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/72330581-562e-4647-badc-17056a9c4661\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/e574c75a-77ac-4dc8-b441-889c089ae361\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a> <a href=\"https://app.halcyon.io/documents/6aedfc59-e507-4dca-ab67-21646f07a0e7\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 4</a> <a href=\"https://app.halcyon.io/documents/743f1d09-e0ac-4874-9c39-fb7a3937acb9\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 5</a> <a href=\"https://app.halcyon.io/documents/c8607907-c329-436e-a587-62d3b2bcd51f\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 6</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Auto-DLM</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">New York State Electric & Gas Corporation</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Auto-DLM program is a dynamic load management initiative where participants are compensated for reducing load to support system reliability and peak shaving. The program is activated to prevent or mitigate overload situations on the electric grid or for peak-shaving purposes when the day-ahead system electric load forecast reaches a specified percentage of the forecasted system peak. Resources in this program are held to higher standards of availability and reliability compared to Term-DLM, requiring faster response times (no less than ten minutes' notice) in exchange for higher incentive payments. NYSEG, along with other utilities, utilizes a fixed, published pricing structure for Auto-DLM programs to streamline procurement and encourage energy storage participation.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Under the Dynamic Load Management (DLM) programs in New York, including the Auto-DLM and Term-DLM programs, NYSEG is transitioning to a fixed, published pricing structure to streamline procurement and encourage energy storage participation. While specific dollar-per-kW rates for NYSEG are not explicitly detailed for C&I customers in the source material, the general compensation structure for similar energy storage system (ESS) participation involves incentives based on performance during the summer capability period. Performance is measured by comparing ESS output (including net export) during event hours to a baseline of output on non-event days. Incentives are calculated by multiplying an annual per-kW incentive rate (for example, $50/kW-year as proposed by other utilities in the same proceedings) by the average performance across all seasonal events. Payments are typically issued at the end of the summer capability period as a direct payment or, at the customer's discretion, distributed to a service provider. Additionally, there are recommendations to align compensation with Demand Reduction Value (DRV), Locational System Relief Value (LSRV), and Installed Capacity (ICAP) values derived from the Value of Distributed Energy Resources (VDER) proceeding.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">NYSEG Auto-DLM programs are a form of demand response that include energy storage resources, curtailment, onsite generation, and distributed generation, though diesel-fired and all fossil fuel-fired generation are excluded; while specific manufacturers are not listed, eligible technologies must be currently operational or in the utility's interconnection queue and must be capable of providing load relief for 4 hours with at least 10 minutes notice, eighteen hours per day, seven days per week.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/fb3e74ee-af3a-42e1-ac8d-85b6acdec94e\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/processes/7512c2d0-1004-4e1c-9959-8c48d632ba24\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 2</a> <a href=\"https://app.halcyon.io/processes/e7494701-e7ce-49b5-a1b8-3ba53da7af53\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 3</a> <a href=\"https://app.halcyon.io/processes/18449bce-fbcc-4f12-af67-107254cb3fc8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 4</a> <a href=\"https://app.halcyon.io/processes/86b250fd-0ccd-48f4-9376-10bee009fd22\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 5</a> <a href=\"https://app.halcyon.io/processes/c4e13d5a-4af9-4978-8bd4-9c7e024095a8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 6</a> <a href=\"https://app.halcyon.io/documents/72330581-562e-4647-badc-17056a9c4661\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/e574c75a-77ac-4dc8-b441-889c089ae361\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/6aedfc59-e507-4dca-ab67-21646f07a0e7\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a> <a href=\"https://app.halcyon.io/documents/c8607907-c329-436e-a587-62d3b2bcd51f\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 4</a> <a href=\"https://app.halcyon.io/documents/9526891a-100e-41bf-9839-d8de81162381\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 5</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Commercial System Relief Program (CSRP)</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">New York State Electric & Gas Corporation</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The goal of the program, as part of the broader Earnings Adjustment Mechanisms (EAMs), is to align utility incentives with state policy goals by encouraging performance and innovation in targeted areas such as demand response.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Not available.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">NYSEG excludes diesel-fired generation sources from participating in the Term-DLM and Auto-DLM programs (programs associated with the CSRP), and requires that distributed generation and energy storage resources must be either currently operational or already in the utility\u2019s interconnection queue to be eligible.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/7ab931fa-b353-4953-acbc-77a44d7d448c\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/processes/e2b691ea-cc8b-47ad-b4aa-4bec11f34572\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 2</a> <a href=\"https://app.halcyon.io/processes/aa09656e-51d3-4906-a8e3-9ea949cf54de\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 3</a> <a href=\"https://app.halcyon.io/processes/e47acdbc-6d91-412a-a938-ee194e0f6d4c\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 4</a> <a href=\"https://app.halcyon.io/processes/e7494701-e7ce-49b5-a1b8-3ba53da7af53\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 5</a> <a href=\"https://app.halcyon.io/processes/86b250fd-0ccd-48f4-9376-10bee009fd22\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 6</a> <a href=\"https://app.halcyon.io/processes/c4e13d5a-4af9-4978-8bd4-9c7e024095a8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 7</a> <a href=\"https://app.halcyon.io/documents/19cf8420-7834-4029-9b13-fd275dd40a39\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/c8607907-c329-436e-a587-62d3b2bcd51f\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Distribution Load Relief Program (DLRP)</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">New York State Electric & Gas Corporation</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Under the proceedings for New York State Electric & Gas Corporation (NYSEG) and related utilities, participants in the Distribution Load Relief Program (DLRP) receive compensation under the terms of Rider T. This program is part of a demand response portfolio intended to provide comprehensive load relief, with Rider T specifically combining elements formerly under separate distribution load relief structures.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">For participation in the Distribution Load Relief Program (DLRP) and the Commercial System Relief Program (CSRP), customers (modeled on a 1 kW load relief example) can earn up to $120 in reservation payment incentives per year. In addition to reservation payments, participants may also earn performance payment incentives for load relief provided during called events. However, the specific $/kW or $/kWh rates for these performance payments, as well as the specific tariff schedule or rider name for NYSEG, are not explicitly provided in the source material.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Eligible technologies for NYSEG demand response include behind-the-meter load control technologies such as electric vehicle charger adjustments and energy storage systems (ESS), though diesel-fired generation is specifically excluded. Programs are classified as demand response and require participants to provide reliable load relief even under short-notice event dispatch, with utility-imposed conditions requiring participants to supply the specific kilowatt load relief they are contracted for or face a lack of compensation for services they are unwilling or unable to provide.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/7512c2d0-1004-4e1c-9959-8c48d632ba24\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/processes/e7494701-e7ce-49b5-a1b8-3ba53da7af53\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 2</a> <a href=\"https://app.halcyon.io/processes/86b250fd-0ccd-48f4-9376-10bee009fd22\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 3</a> <a href=\"https://app.halcyon.io/processes/c4e13d5a-4af9-4978-8bd4-9c7e024095a8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 4</a> <a href=\"https://app.halcyon.io/documents/9082c896-36e4-4cbf-8ed9-ea1526de81a8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/9ad9f7d6-0c9f-49e0-a5f6-182e41006e75\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/c8607907-c329-436e-a587-62d3b2bcd51f\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Term-DLM</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">New York State Electric & Gas Corporation</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Term-DLM program is a peak-shaving initiative offered system-wide within New York State Electric & Gas Corporation\u2019s service territory. The program is designed to compensate eligible customers\u2014either direct participants or those managed by an aggregator\u2014for reducing electric load during specific conditions. The program is activated when the day-ahead system electric load forecast reaches a pre-specified percentage of the forecasted system peak. Participants are selected through a request for proposal (RFP) process and enter into an agreement for a term of a specified number of years. Resources enrolled in the program must provide peak-shaving benefits to the system and are required to respond to activation events with no less than twenty-one hours' advance no
