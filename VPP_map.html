1891772649, 37.93856057137899], [-82.46498582788128, 37.97685705048072], [-82.54940590133833, 38.06306106351751], [-82.62618090556973, 38.13483312887942], [-82.59886299568518, 38.201005061207994]]]}}, {"id": "26", "type": "Feature", "properties": {"STATE_NAME": "Indiana", "summary": "<b style='font-size:13px;'>Indiana</b><span style='font-size:10px;color:#888;'> \u2014 4 programs</span><br><br>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Interruptible Demand Response Program</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">AES Indiana</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">AES Indiana's Commercial and Industrial Interruptible Demand Response (IDR) program is designed to establish approximately 40 MW of customer-controlled interruptible capacity over three years to address projected load growth from data center development and electrification. Eligible participants include C&I customers with at least 100 kW of curtailable load, with a special agreement option for those with controllable capacity exceeding 150 MW. The program structure allows participation from all C&I customers, including those who have opted out of the DSM Rider 22. Participants enter into agreements to curtail load during events called for MISO reliability or economic reasons, typically receiving at least two hours' notice for company-initiated events. The program's goals include reducing the need for future generation capacity and avoiding wholesale capacity costs. Under this program, participants are compensated via monthly capacity incentive payments based on committed load-reduction capability and energy incentive payments for actual curtailment.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">AES Indiana compensates commercial and industrial customers for load curtailment through various tariff offerings, including Rider 14: Interruptible Power, Rider 17: Curtailment Energy, and Rider 19: Interruptible Tariff. Under these programs, customers are typically called upon to operate emergency generation equipment to reduce load. Incentives provided to participants are adjusted annually to reflect changes in power market conditions. Additionally, a proposed Interruptible Demand Response (IDR) program under Rider 19, filed via an alternative rate plan in July 2025, remains pending authorization by the IURC as of May 21, 2026.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Under the Residential Demand Response program (Coolcents\u00ae), eligible technology types include residential cooling equipment (air conditioners) and electric water heaters controlled via smart thermostats, direct-load air conditioner control switches (one-way and two-way), direct-load control water heater switches, and smart electric water heaters. These devices are categorized as demand response and must be capable of being remotely communicated with by the utility to reduce peak demand. Participants are acquired through direct-install, rebates, or customer bring-your-own device channels.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/16c18109-df1f-4da8-a585-0c5ba60d5f5e\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/processes/f97437a1-47db-40f4-92c2-c607a07bf686\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 2</a> <a href=\"https://app.halcyon.io/documents/883adaf4-2779-46ee-9fe4-5905c71d5fd6\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/83d1358b-bbba-44b7-8a68-37010b8e1042\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/6baf019f-ec65-4ab4-8663-1db6406e32db\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a> <a href=\"https://app.halcyon.io/documents/6625a5ee-8dae-49fa-be57-3b2e73ba6394\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 4</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Power Manager for Business</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Duke Energy Indiana</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Power Manager for Business program is a non-residential demand response initiative designed for small-to-medium sized business customers who have qualifying air conditioning systems, summer weekday energy usage, and broadband/Wi-Fi internet. The objective of the program is to provide customer bill savings by reducing energy usage during periods of high system loads or high wholesale energy prices, which provides a cheaper capacity option for the utility than building new generation. </div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Customers participating in this Program receive an incentive based on upon the level\nof demand response cycling they select:\n30% cycling: $50 per DR summer season (per device)\n50% cycling: $85 per DR summer season (per device)\n75% cycling: $135 per DR summer season (per device\nThe incentive will be paid out after installation of the device(s) and then annually.\nDevices are installed at the customer premise at no charge to the customer.\nBring Your Own kW - This option allows customers to reduce their energy usage when\nasked by the Company and in return the customer will receive $30 per KW average\nreduction during the summer season. The customer can accomplish these reductions\nby making manual adjustments to their equipment or by connecting their equipment to\nreceive communications from the Company.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Qualifying air conditioning systems include:\nIndividual split air conditioning systems\nRooftop Units\nPackaged terminal air conditioners (\u201cPTACs\u201d).</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/9c2ac1d5-41e0-4dc2-b7fd-8e867f3b8372\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/90583eac-6691-4d4d-bd29-59a144524b6a\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Voluntary Curtailment Service Program</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Indiana Michigan Power Company</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Voluntary Curtailment Service was a component of Indiana Michigan Power's (I&M) demand response portfolio in 2025. During the period from January 2025 through December 2025 (PY2025), the program had no enrollments, and as a result, evaluation, measurement, and verification activities were not performed for this specific service.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Under the Voluntary Curtailment Service Program, Indiana Michigan Power (I&M) compensates commercial customers via curtailment credits for reducing usage during requested events. The credit amount is calculated as the product of the curtailed demand, the number of event hours, and a voluntary curtailment price, summed for each event in a calendar month. Curtailed demand is defined as the difference between the customer's average on-peak demand (specified in a contract addendum for service under this rider) and the maximum 60-minute integrated demand in kW during the event. While specific $/kW or $/kWh rates are not listed, the program is identified as a 'rider' and is associated with the 'Commercial Time-of-Use 5-5' category.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The program is available to commercial customers with a curtailable usage of at least 1,000 kW for a single account; however, specific technology types (such as smart thermostats or battery storage), manufacturers, and telemetry or controllability requirements are not specified. It is a demand response program where the customer has the option, but not the obligation, to curtail usage, meaning there are no penalties for non-performance.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/454ebb22-a75d-43c0-a869-79bb7ef55447\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/b09ebd62-d11b-455a-a21b-f5a484039c0c\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Business DR Program</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Northern Indiana Public Service Company</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The objective of the Northern Indiana Public Service Company (NIPSCO) Business Demand Response (DR) Program is to achieve demand savings and establish a capacity resource through MISO to ensure long-term system reliability and customer affordability. Managed by the administrator Enel, the program engages Commercial and Industrial (C&I) customers with curtailable loads to reduce energy usage during periods of peak demand identified by MISO. Each participant receives a customized load curtailment strategy for loads such as lighting, HVAC, and processing equipment, utilizing either direct load control or manual response strategies. Incentives are set at $14,000 per MW per season, paid by check following each MISO season based on the lesser of registered or delivered capacity. Eligible participants include C&I customers taking service under Rates 620, 621, 622, 623, 624, 625, 626, 631 Tier 1, 632, and 633.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The provided documents do not contain information regarding a 'Business DR Program' or the specific compensation rates ($/kW or $/kWh) for demand response. For the NIPSCO Business Energy Efficiency (EE) program, the C&I New Construction program offers financial incentives to owners, designers, and architects for exceeding the 2010 Indiana Energy Conservation Code. The Small Business Direct Install program, for customers with billing demands not exceeding 200 kW, pays incentives on a 'per-unit basis' with higher rates than the prescriptive program to encourage investment. The C&I Online Marketplace provides 'instant incentives' applied at the time of purchase. While the documents mention Rider 683 and the DSM mechanism tracker (Cause No. 43618-DSM-X), these are discussed in the context of utility cost recovery, lost revenues, and financial incentives for energy efficiency measures rather than specific participant compensation schedules for demand response.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Eligible loads include lighting, HVAC, chillers, motors, and processing equipment, which can be managed via direct load control or manual response. All participants must be enabled with Enel\u2019s site service device, which connects to Enel\u2019s software system to enable dispatching, real-time monitoring, and reporting of post-event curtailment results. The program must conform to minimum MISO LMR qualification requirements, and participants must not be currently registered with MISO as an LMR.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/7a385c45-bc3b-4307-807b-4ea434328dfb\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/89a46aa8-92ef-4a6d-8501-0c1e0e4ed69d\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/550df0f3-3434-4a62-99f6-c77e98444307\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a></div>\n</div>", "count": 4, "has_dat 45.94529540054708], [-103.66078131334898, 45.945245751629315], [-104.04544629909867, 45.94531523591661], [-104.0454685294727, 46.28008535263733], [-104.04547154459168, 46.32454905584065], [-104.04504740589287, 46.50979067190314], [-104.0451276245238, 46.540863450028276], [-104.04538744642643, 46.64150571359284], [-104.04557429667013, 46.71388229185438], [-104.04554347076531, 46.93388782540014], [-104.04478865834511, 47.12743037842616], [-104.04530838602665, 47.3301401796678], [-104.04531304200435, 47.331955053909624], [-104.04497668460542, 47.397064789436385], [-104.04391236837996, 47.6032292700678], [-104.04238500479711, 47.80325635248097], [-104.04393348314073, 47.971514909130285], [-104.04409351240176, 47.996081523993126], [-104.04409361994267, 47.996098032890664], [-104.0456928733049, 48.241415241979645], [-104.04678300890187, 48.38929832595659], [-104.04755584869594, 48.49414026525481], [-104.04808780941191, 48.63391057337452], [-104.04890024648031, 48.84738699433172], [-104.04873594609145, 48.99987677654896]]]}}, {"id": "30", "type": "Feature", "properties": {"STATE_NAME": "Arkansas", "summary": "<b style='font-size:13px;'>Arkansas</b><span style='font-size:10px;color:#888;'> \u2014 2 programs</span><br><br>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Agricultural Irrigation Load Control</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Entergy Arkansas</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Agricultural Irrigation Load Control (AILC) program is a voluntary demand response offer designed to allow Entergy Arkansas to curtail participating irrigation pumps during peak summer months (weekdays from 12:00 noon to 9:00 p.m. in June, July, and August). The program utilizes cellular-enabled load control switches and metering devices installed directly on irrigation pump control panels to facilitate interruptions. Its primary goals include achieving lower system costs and improving regional air quality by reducing the need for peaking units that emit higher levels of pollutants. Participants receive compensation at varying levels based on the kilowatt (kW) load of the enrolled pump motor. Curtailment events are limited to a maximum of four continuous hours, no more than twice per week, and ten times per season, with exceptions for grid operational emergencies.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Agricultural Irrigation Load Control program is a peak load control program that provides incentives to qualified agricultural customers, including agricultural-industrial customers with connected loads less than 1 MW. Participants receive incentives for allowing the company to interrupt electric service to well pumps during the summer using cellular technology through load control devices. While the program is described as providing incentives, the specific payment format (such as bill credits or direct payments), the precise $/kW or $/kWh rates, and the name of the specific tariff schedule for compensation are not provided in the source material.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The program is identified as a demand response program. For residential demand response, Entergy Arkansas plans to phase out one-way switch technology by 2028 and explore alternative demand response technologies. While specific manufacturers and telemetry requirements for the Agricultural Irrigation Load Control (AILC) program are not detailed in the provided materials, the program utilized 916 participants to provide capacity in the Midcontinent Independent Service Operator, Inc. (MISO).</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/a370a870-1978-428f-acb1-71319860c2ad\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/93776920-027d-49d6-95a5-cf9c885f6089\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/3cb0212a-d021-4a4a-80df-95e4251e5c09\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Load Management Standard Offer Program</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Southwestern Electric Power Company</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Load Management Standard Offer Pathway is a demand response program within the Southwestern Electric Power Company (SWEPCO) Business/Industrial Solutions portfolio. Its goal is to contribute to demand reduction (measured in MW) through demand-only objectives, which typically result in lower load factors. For the 2022 program year, SWEPCO's load management programs were part of a portfolio that targeted a net evaluated demand reduction of 15.09 MW.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Load Management Standard Offer Program (LMSOP) is a non-tariff based demand response program for large commercial and industrial customers with a minimum peak demand of 175 kW. Participants are compensated through monetary incentives based on two performance metrics: a demand reduction payment of $20/kW calculated on the average kW reduction during the program period, and an energy reduction payment of $0.25/kWh for energy reduced during specific curtailment events. These payments are characterized as monetary incentives rather than bill credits, and the program is described as non-tariff based.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The technology types recommended for program changes include advanced rooftop controls, air leak detection, and seasonal tune-ups, though the source does not list comprehensive eligibility, specific manufacturers, telemetry requirements, or performance penalties.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/644effed-5f61-4795-b2f7-b4577bfce474\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/4e4a8dd1-7fb8-4302-a7db-cac16ec64b52\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/15722e0d-375b-4323-baa3-bb05a440ab62\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/2506660b-3088-4414-a105-53461f718e24\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a></div>\n</div>", "count": 2, "has_data": true}, "geometry": {"type": "Polygon", "coordinates": [[[-94.61791834329128, 36.49941016133126], [-94.36120214615703, 36.499596333679456], [-94.07708774983688, 36.4989725288362], [-93.9591897176856, 36.49871365331378], [-93.86668895000446, 36.49886294968404], [-93.70017100376167, 36.49913184294947], [-93.58426309452308, 5], [-91.63694350442782, 30.99941114263908], [-91.62825880308759, 31.005092165571853], [-91.56036650349976, 31.049503339272405], [-91.59469441463236, 31.09143935078848], [-91.62167232412752, 31.13686537293348], [-91.59099517376094, 31.191994083946945], [-91.59005227944202, 31.1936885228679], [-91.6443571592431, 31.234409472120813], [-91.62135915279069, 31.267806570182156]]]}}, {"id": "32", "type": "Feature", "properties": {"STATE_NAME": "Colorado", "summary": "<b style='font-size:13px;'>Colorado</b><span style='font-size:10px;color:#888;'> \u2014 3 programs</span><br><br>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Aggregated Virtual Power Plant (AVPP)</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Public Service Company of Colorado</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Aggregator Virtual Power Plant (AVPP) program is designed to enable third-party aggregators to enroll customers with distributed energy resources (DERs)\u2014such as rooftop solar and battery storage\u2014and other manageable loads like programmable thermostats, heat pump water heaters, and managed electric vehicle charging. The program's structure allows these aggregators to dispatch enrolled devices to deliver capacity to the system when called by the utility. Operating on a pay-for-performance model, the program compensates aggregators based on the amount of capacity delivered, with compensation calculated at 90% of the avoided cost of traditional capital investment (including generation, transmission, and potentially distribution components). Aggregators are then responsible for passing a portion of this compensation to the participating customers. Participants are restricted to enrolling a specific resource in only one managed load program at a time.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The AVPP program utilizes performance-based compensation where payments are entirely dependent on the amount of capacity called and subsequently delivered. Compensation is calculated based on the average capacity actually delivered over a given quarter. While specific dollar-per-kilowatt values for C&I customers are not explicitly detailed for the AVPP program in the provided text, the marginal cost of dispatching an AVPP resource is described as zero or near zero once a resource is dispatched for the first time. The text contrasts this performance-based structure with the RBC program, which offers a $350/kW upfront incentive and a fixed $100 annual credit. There is a proposal to transition RBC dispatch to the AVPP program, though Staff recommends that any new RBC offering for C&I customers should remain an upfront incentive-only program if approved.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Eligible technologies include battery energy storage systems (standalone or paired with on-site renewable generation), controllable thermostats, controllable air source heat pumps, smart water heaters, electric vehicles, smart panels, linear generators, demand response, demand flexibility, microgrids, and fuel cells; methane-based and hydrogen-based resources are excluded. The program requires aggregators to have remote control interface (e.g., API control) and use of the customer's DER to monitor and dispatch aggregations 24/7/365. For interconnection resources, technical requirements specified in IEEE 1547-2018, Clause 10 must be met, including interoperability and installer protocols. Inverter-based DERs must supply revenue-grade metering data, or if unavailable, AMI interval data. Aggregators must accommodate load control events determined by the utility equal to the total capacity obligation; specific manufacturers and penalty amounts for non-performance are not listed.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/0531cb8d-9e98-422a-907b-298adcafe92f\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/processes/da4fa618-4e35-4f92-ade8-e5c9f1bad1bd\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 2</a> <a href=\"https://app.halcyon.io/processes/a3d5d293-6a4a-481c-8349-c383baf3f5fb\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 3</a> <a href=\"https://app.halcyon.io/processes/f79c7421-b56f-4138-b116-c35572339d33\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 4</a> <a href=\"https://app.halcyon.io/documents/46eb7b30-16b9-41fb-af9a-8a6a4482ed1a\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/1bac9149-2cd4-4076-acec-1d62e2fa53d0\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/4f13675a-cd1c-43be-97d4-d2d30e66e267\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a> <a href=\"https://app.halcyon.io/documents/b4265aa1-2b4d-48b8-a3ff-ee1db545f126\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 4</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Interruptible Service Option Credit</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Public Service Company of Colorado</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Interruptible Service Option Credit (ISOC) is a product offered by Public Service Company of Colorado (PSCo) to its business customers designed to manage electricity demand during critical periods. The primary objectives of the ISOC product include:\nPeak Demand Reduction: Reducing the amount of electricity needed during periods of peak demand, such as hot summer days. .Grid Reliability: Helping PSCo meet electric system requirements during critical times triggered by capacity or contingency constraints.\nEconomic Load Management: Managing economic constraints through interruption periods, which may include a buy-through option for the customer. \nCapacity Planning: Utilizing controllable load for planning reserves to ensure the system has more power than is normally available during stress events.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The provided materials do not contain the compensation details for the Interruptible Service Option Credit (ISOC) specifically. However, for a related demand response product, the Peak Partner Rewards (PPR), commercial and industrial customers receive compensation through two primary mechanisms: a reservation incentive for contracted load reduction and a performance incentive for actual load reduction during event days. PPR is available to customers on general service rate schedules SG, PG, or TG who can commit to reducing electric load by at least 25 kW. For another offering, 'Optimize Your Charge' (static charging optimization), light-duty fleet commercial customers can receive a $50 bill credit for participating and meeting a 25% performance minimum. Numerical values for ISOC $/kW or $/kWh rates are not provided in the source material.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Interruptible Service Option Credit (ISOC) is classified as an interruptible tariff demand response product. While the source does not list specific eligible technology types or manufacturers like battery storage or inverter brands, it requires participants to have a Contract Interruptible Load (CIL) of at least 300 kW during summer peak months and utilizes Remote Terminal Units (RTUs) for tracking. Participants must provide electrical load relief in less than 10 minutes to act as operating reserves. As a dispatchable demand response product, there is a fee associated with non-compliance during a control event.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/29a44464-ebff-40c3-acdd-221c5b2a276f\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/a8f20a24-c29e-4eec-b232-04a4022a3312\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/6e390009-6bdf-45a9-b0b3-29e4296fc81f\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/7d5d2016-8c15-49d4-a051-60c4aa78fa1a\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a> <a href=\"https://app.halcyon.io/documents/6b4654e0-f175-4244-886d-a02a1552371b\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 4</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Renewable Battery Connect (RBC)</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Public Service Company of Colorado</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Renewable Battery Connect (RBC) program provides incentive levels to participants for storage resources, with the goal of responding to customer demand and interest in battery storage. While specific tariff names or detailed structures are not fully enumerated, the program involves annual incentives for participants. Public Service Company of Colorado proposed to maintain incentive levels and increased budget and capacity previously approved in Decision No. C24-0894. There are also proposals to allow RBC participants to voluntarily elect participation in a future Aggregated Virtual Power Plant (AVPP) program, where they would forgo their RBC annual incentive in favor of AVPP aggregator enrollment and compensation.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Renewable Battery Connect (RBC) program compensation structure primarily consists of upfront incentives, which constitute the vast majority of the program's costs. Participants also receive a fixed annual credit of $100. This $100 credit remains constant regardless of the actual capacity called by the company or the amount delivered by the customer. Unlike performance-based models such as the AVPP program, the RBC program's marginal cost of dispatch is essentially zero because payments are not dependent on the number of dispatch events or the volume of delivered capacity. The excerpts do not identify a specific tariff or rider schedule name for participant compensation.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Recipients of upfront rebates under the Renewable Battery Connect program must participate in company-managed dispatch for a period of five years; program requirements include a 20 percent energy reserve requirement, but specific eligible technology types (e.g. standalone vs solar-plus-storage) and manufacturers are not detailed in the provided documents.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/0531cb8d-9e98-422a-907b-298adcafe92f\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/46eb7b30-16b9-41fb-af9a-8a6a4482ed1a\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/ef85387a-b670-4a56-a2b8-b7286c0a6e4c\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/df73c8dd-ea6b-4cdd-a3cb-aa7cd0ba49be\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a> <a href=\"https://app.halcyon.io/documents/1bac9149-2cd4-4076-acec-1d62e2fa53d0\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 4</a></div>\n</div>", "count": 3, "has_data": true}, "geometry": {"type": "Polygon", "coordinates": [[[-109.05996208888902, 38.49998888274717], [-109.05996156429742, 38.50002775679579], [-109.05151318470472, 39.126100547198], [-109.05122565840635, 39.36668289308114], [-109.05106953199966, 39.49774475000463], [-109.05087599683874, 39.66047904541875], [-109.05061932372621, 39.87497642674386], [-109.0509769313621, 40.1808536254833], [-109.05073607155738, 40.2226598310235], [-109.04825190697785, 40.65360557771244], [-109.04826263784173, 40.662606406063084], [-109.04845860887872, 40.826085838416965], [-109.0500 s with goals and targets in the 2025 budget and savings forecast for wattsmart Business. The program's structure includes the Small and Medium Business Express offering (a restructuring of the small business enhanced program), which focuses on lighting and lighting controls for customers with monthly demand up to 200 kW. Key goals and structural changes include shifting market incentives to distributors to influence stocking practices, adjusting whole building construction incentives to distinguish between all-electric and other HVAC systems, and adding offerings for green building certification. Participation in the Small and Medium Business Express requires installation by approved trade allies and includes a project cap (initially 75% of total project cost) requiring a minimum 25% customer co-pay.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Commercial and Industrial customers are compensated under Electric Service Schedule No. 140. Financial incentives include energy efficiency incentive payments, bill credits, and energy management payments. Available unit values include $0.15 per annual kWh savings for custom non-lighting incentives, $0.02 per annual kWh savings for energy management, and $0.025 per annual kWh savings for energy project manager co-funding. Lighting retrofits offer incentives such as $0.05/kWh for controlled environment agriculture or custom rates based on wattage reduced (up to $1.50/W) or installed (up to $3.50/W). Major lighting renovations receive $0.04/kWh to $0.14/kWh depending on control types. Bill credit options provide 80% of eligible project costs for customers with a minimum 1 MW peak or 5,000,000 kWh annual usage. Incentives are generally capped by a 1-year simple payback requirement, meaning incentives will not reduce the simple payback of a project below one year.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Eligible technologies include interior and exterior lighting (new fixtures, retrofit kits, and controls), lighting controls commissioning, troffers, and linear ambient fixtures. Requirements for these technologies are based on control levels: no controls, basic controls, plug-and-play control ready, networked lighting controls (NLCs) at the area or circuit level, advanced networked lighting controls (ANLCs), luminaire-level lighting controls (LLLCs), basic exterior dimming, and advanced networked dimming. Specific manufacturers, telemetry requirements, demand response classifications, and associated penalties are not provided in the source material.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/c2615cfb-8790-475e-8272-709b9da25b12\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/5acb7f2a-8bd1-4f5a-8b55-bcd447783350\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/ad8fe018-f45e-42c7-8981-58cd50fcef45\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a></div>\n</div>", "count": 1, "has_data": true}, "geometry": {"type": "Polygon", "coordinates": [[[-114.05247179422487, 37.60477774491807], [-114.05172754352763, 37.74599903066414], [-114.04965713383788, 37.88137015665746], [-114.04990218805514, 38.14860320936064], [-114.04990256420814, 38.14876523597496], [-114.05013742346719, 38.249962166265014], [-114.050119617387, 38.40453794155122], [-114.05015445751849, 38.57292212458413], [-114.0501540788741, 38.572977337832384], [-114.04943822848267, 38.677365037356836], [-114.04805460948894, 38.878695062418906], [-114.04910304591324, 39.0 109.05073607155738, 40.2226598310235], [-109.0509769313621, 40.1808536254833], [-109.05061932372621, 39.87497642674386], [-109.05087599683874, 39.66047904541875], [-109.05106953199966, 39.49774475000463], [-109.05122565840635, 39.36668289308114], [-109.05151318470472, 39.126100547198], [-109.05996156429742, 38.50002775679579], [-109.05996208888902, 38.49998888274717], [-109.06006209050567, 38.275491286636786], [-109.04176211542567, 38.16469227927641], [-109.04179672808304, 38.153034580929116], [-109.04260419559428, 37.881086702452485], [-109.04378021082474, 37.48482045121824], [-109.0452220229491, 36.99908516713863], [-109.49533709707025, 36.99910636192628], [-110.00067683223675, 36.99796872139528], [-110.47019009588625, 36.99799752948285], [-110.75069032629202, 37.00319791711757], [-111.06649622943971, 37.002390522537205], [-111.25076146941052, 37.000716982140865], [-111.27828544516788, 37.00046688510211], [-111.40586844707802, 37.001482621357525], [-111.41301343446115, 37.00147918365635], [-112.35769051712774, 37.00102506229384], [-112.53857175748671, 37.00074468261358], [-112.5450947443048, 37.00073456165598], [-112.82950202105441, 37.00038740301284], [-112.89919075222966, 37.00030239753214], [-112.96647064012362, 37.00022033029617], [-113.96590707809193, 37.000025895355535], [-114.0506000275006, 37.00039676502365], [-114.05174901830406, 37.08843500645157], [-114.05197380680346, 37.28451224592841], [-114.05270097349418, 37.492015522374935], [-114.05247179422487, 37.60477774491807]]]}}, {"id": "35", "type": "Feature", "properties": {"STATE_NAME": "Hawaii", "summary": "<b style='font-size:13px;'>Hawaii</b><span style='font-size:10px;color:#888;'> \u2014 3 programs</span><br><br>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Battery Bonus</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Hawaiian Electric</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Battery Bonus program is classified as a grid service program, specifically referred to as the Scheduled Dispatch Program (SDP). The underlying structure and goals of the Hawaiian Electric companies' customer energy resources (CER) programs are guided by seven objectives: (1) promoting significant enrollment and participation; (2) providing fair, cost-effective compensation; (3) offering opportunities for customers not reached by existing distributed energy resource (DER) programs; (4) mitigating bill impacts to non-participating ratepayers; (5) enabling DERs to contribute to renewable portfolio standards and decarbonization; (6) incentivizing customer behavioral change to align with grid needs; and (7) promoting a positive customer experience. The programs aim to contribute to the electric grid's operation while being evaluated for cost-effectiveness and impact during the year they are borne by customers.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Hawaiian Electric Battery Bonus program is identified as the Scheduled Dispatch Program (SDP), which is categorized as a grid service program. The program is designed to provide fair, cost-effective compensation for participation, with a focus on evaluating the impact of existing programs on the electric grid. While the Companies agree that a program's payment should be performance-based and occur more frequently than once a year, specific incentives for the Battery Bonus/SDP for Commercial and Industrial (C&I) customers are not detailed in terms of current schedule names or specific $/kW and $/kWh rates within the provided excerpts. General modeling for DER fixed avoided costs was noted at $104 per kW and operations avoided costs at $0.05 per kWh or $3.00 per kW (assuming 30 events at 2 hours each), but these are presented as recommended values or modeling data rather than the final compensation schedule for the Battery Bonus program.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Eligible technologies include traditional demand response (DR) technologies, solar, solar-plus-storage systems, and all other customer-sited renewable energy generation devices capable of interconnecting under Rule 14H requirements. While the reporting framework covers traditional DR and current distributed energy resources (DER), specific manufacturers like Tesla or LG and detailed telemetry communication standards or performance penalties are not specified in the provided text.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/5e0c8d70-56b4-4aa9-9e43-92a4e9e905b1\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/d59f2dd9-a687-476b-af4a-e27a32ce3818\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/7efbef92-b19b-4a12-899a-f5ed0e7c03be\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/791190c3-3017-4a99-b71e-a8366717fa94\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Bring Your Own Device (BYOD) Plus</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Hawaiian Electric</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Classified as a grid service program, the BYOD Plus program is part of a portfolio of Customer Energy Resources (CER) and Distributed Energy Resources (DER) programs administered by the companies or through contracts with aggregators. The program's goals align with seven primary objectives: 1. Promoting significant program enrollment and participation; 2. Providing fair, cost-effective compensation; 3. Providing opportunities for customers not reached by existing programs; 4. Mitigating bill impacts to non-participating ratepayers; 5. Enabling DERs to contribute to renewable portfolio standards and decarbonization; 6. Incentivizing customer behavioral change to align with grid needs; and 7. Ensuring program transparency.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Under the Bring Your Own Device (BYOD) Plus program (Rule 33), commercial customers are compensated through a combination of a one-time upfront incentive and monthly export credits. The upfront incentive for new battery systems is $400/kW of committed capacity for standard customers and $800/kW for qualifying low-moderate income (LMI) commercial customers, such as affordable housing developments. Monthly compensation consists of a Grid Service Export Credit, which is the equivalent of the retail rate or the underlying tariff rate, whichever is higher. For customers with a non-NEM (Net Energy Metering) underlying tariff, a fixed monthly export credit is calculated based on an assumed export during the 2-hour daily dispatch window using the following formula: (Retail Rate \u2013 non-NEM DER Tariff Export Rate ($/kWh)) x Committed Capacity (kW) x 70% x 2 hours x 30 days. Additionally, a check for the equivalent dollar value of accumulated grid service export credits, capped at 300 kWh multiplied by the BYOD rate, is issued annually. Participants are compensated under the Rule 33 Bring Your Own Device Program rider, specifically the BYOD Plus program which utilizes a methodology consistent with the Scheduled Dispatch program.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Eligible technologies for grid services programs include water heaters, air conditioners, stand-alone generators, batteries, and load curtailment, with the utility actively evaluating smart thermostats as a replacement for residential air conditioner control devices. For the BYOD Plus program specifically, the companies are awaiting commission guidance on updated rules and incentive structures, but intend to transition existing participants using technologies such as batteries (currently 0.009 MW executed) into the program. Requirements for performance and reliability involve resolving communication issues, upgrading communication end devices, and addressing challenges in triggering load-reduction schemes.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/5e0c8d70-56b4-4aa9-9e43-92a4e9e905b1\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/11c67526-a8d6-49b5-a98c-ae7b1d609061\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/ed2b2915-7ff0-4cdd-b984-0b8c16cc85ed\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/08dc16ca-1c29-4816-96dd-073f0d9f05f2\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Scheduled Dispatch Program (SDP)</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Hawaiian Electric</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Scheduled Dispatch Program (SDP), also referred to as \"Battery Bonus,\" is categorized as a grid service program. The program is designed to operate as a customer-sited resource that requires interconnection approval. Its structure and underlying goals are aligned with seven broader objectives for customer energy resources (CER): 1) promoting significant program enrollment and participation; 2) providing fair, cost-effective compensation; 3) providing opportunities for underserved customers, including low-to-moderate income (LMI) individuals and renters; 4) mitigating bill impacts to non-participating ratepayers; 5) enabling distributed energy resources (DERs) to contribute to renewable portfolio standards and decarbonization; 6) incentivizing customer behavioral change to align with grid needs; and 7) promoting a positive customer experience. The program is evaluated based on achieved megawatts (MW), actual expenditures, and its impact on the operation of the electric grid in each service territory.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Scheduled Dispatch Program (SDP), also known as \"Battery Bonus,\" is a company-administered grid service program that provides compensation to commercial and industrial (C&I) customers for load reduction and discharging from battery storage. Compensation consists of an upfront $ /kW incentive for new device installations and a fixed monthly incentive based on grid services. For large C&I customers, this includes a $0.5/kWh energy reduction incentive and a $5/kW capacity reduction incentive. Participants in the SDP are compensated through the Scheduled Dispatch Program rider, which is categorized alongside other programs like the Bring Your Own Device (BYOD) level 1 and Grid Service Purchase Agreements (GSPA).</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Scheduled Dispatch Program (SDP) allows for the enrollment of battery technology. While specific manufacturers are not listed, current program enrollment includes 6,685 participants representing 49.34 MW. Research is underway for electric vehicle (EV) storage to participate in grid services using the IEEE 2030.5 communication protocol, though this is presently described as a conceptual pilot opportunity. No specific demand response penalty conditions or hardware-specific telemetry requirements for the SDP are provided.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/5e0c8d70-56b4-4aa9-9e43-92a4e9e905b1\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/d59f2dd9-a687-476b-af4a-e27a32ce3818\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/c58f6ef1-f346-435b-a787-c016abf1b9e3\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/a9e1a394-a64e-4655-8386-2790ab7447f3\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a></div>\n</div>", "count": 3, "has_data": true}, "geometry": {"type": "MultiPolygon", "coordinates": [[[[-156.04964606429522, 19.78045258553811], [-156.00626249937505, 19.817581145288862] "<b style='font-size:13px;'>New Mexico</b><span style='font-size:10px;color:#888;'> \u2014 1 program</span><br><br>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Peak Saver</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Public Service Company of New Mexico</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Public Service Company of New Mexico (PNM) proposes the 2027 electric energy efficiency and load management program plan, which includes a continuation of all programs approved in its previous energy efficiency case (Case No. 23-00138-UT). The goals of the plan are to implement cost-effective energy efficiency (EE) and load management (LM) programs in calendar years 2027, 2028, and 2029. Participants receive compensation or incentives as defined by the commission-approved program performance, while PNM recovers incremental program costs and a profit incentive through the 33rd revised Tariff Rider No. 16. The profit incentive is based on a sliding scale mechanism and is capped at the weighted average cost of capital multiplied by program costs.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Peak Saver program compensates non-residential participants with peak load contributions of at least 50 kW for reducing electric load upon dispatch during periods of high system load. The program is implemented by Itron, which handles enrollment, dispatch, and settlement with participating customers. While the source documentation specifies that the program's overall costs and profit incentives are recovered through 'PNM Energy Efficiency Rider for PNM Electric Services No. 16' (Rider No. 16) at a rate of 3.904% of each bill for 2027, the provided excerpts do not specify individual demand reduction credits, performance payments, or specific $/kW or $/kWh rates paid to participants.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Peak Saver program is a demand response program for non-residential customers with peak load contributions of at least 50 kW or 150 kW (depending on the segment); while specific manufacturer names are not listed for this program, it is implemented by Itron and requires participants to reduce electric load upon dispatch during periods of high system load, with no penalty for non-participation and potential future improvement via advanced metering infrastructure (AMI) telemetry.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/a63f8c0b-97ab-44d1-a56a-674065c19fcf\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/6c12cb10-75d9-40bf-841f-c0e91c88d99c\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a></div>\n</div>", "count": 1, "has_data": true}, "geometry": {"type": "Polygon", "coordinates": [[[-109.04919751204066, 31.796551080147328], [-109.04829670066489, 32.08409372269792], [-109.04761247148485, 32.42637845273027], [-109.04711688640391, 32.77757146036835], [-109.04711694897496, 32.777795460941064], [-109.04723720659476, 33.20889566199532], [-109.04723722609376, 33.208965661144006], [-109.0472980596231, 33.409783550663235], [-109.04660843894702, 33.777407157801875], [-109.0464250908658, 33.87505232805716], [-109.04618001486813, 34.5223929072541], [-109.04613697334015, 34.57929096240392], [-109.0458505492812, 34.95971904884345], [-109.04585078515446, 34.95981956514763], [-109.04635580174114, 35.1755079631 adding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Business Demand Response</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Evergy Kansas Central</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Business Demand Response program is a demand response initiative designed for a specific target population and participant eligibility criteria. Its structure involves an incentive framework where compensation is distributed to specific entities at various stages of a project. The program requires detailed documentation regarding expected costs, energy savings, and peak impacts, as well as the calculation of effective useful life (EUL) for intervention strategies. Methodologies employed within the program include weather normalization, calculation of hourly load shape impacts, and adjustments for non-routine events to determine gross and net savings from installed energy efficiency measures. For large treatment groups, the program utilizes a selection process for treatment and representative control groups, which may include randomized controlled trials (RCTs).</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The compensation structure for the demand response program includes annual incentives based on enrolled capacity and performance achievements. For a one-year agreement, the incentive is calculated as $28 per kW enrolled multiplied by the percentage of enrolled kW achieved. For multi-year agreements, the incentive rate increases to $30 per kW enrolled multiplied by the percentage of enrolled kW achieved. Additionally, participants must meet 90 percent performance to remain eligible for a multi-year agreement bonus.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Eligible measures include lighting and controls, motors, pumps, variable frequency drives, air compressors, HVAC, food service, and refrigeration, as well as operations and maintenance measures under retro-commissioning. For behavioral, retro-commissioning, and O&M measures to be permissible, programs must include training in repair and maintenance and participants must commit to a minimum three-year repair and maintenance plan including a signed customer agreement, detailed plans for sustaining savings, communication plans with continuous feedback, and a data tracking plan; specific manufacturers, demand response telemetry or controllability requirements, and penalty conditions are not specified.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/e7a21c20-9cea-4430-bdb1-6b7dcda69352\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/6325d33b-ad9a-40c4-b6fe-c6c2be1627fe\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/04983800-71b1-4213-b7e9-11f59eb084fe\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/4af42153-36b4-4a3e-9b5a-ba44d8fa1446\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Business Demand Response</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Evergy Kansas Metro</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Business Demand Response program is a utility initiative targeting specific populations and participant eligibility criteria. The program's structure includes a defined incentive framework specifying which entities receive compensation at various project stages. Performance and goals are managed through a Measurement and Verification (M&V) plan that tracks expected costs, energy savings, peak impacts, and the effective useful life (EUL) of intervention strategies. The program employs normalized metered energy consumption (NMEC) and weather normalization to calculate gross and net savings, as well as hourly load shape impacts resulting from energy efficiency measures.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">For participants in the program, compensation is based on a structured incentive formula. A one-year incentive is calculated as $28 multiplied by the kW enrolled and the percentage of enrolled kW achieved. For multi-year agreements, the rate increases to $30 multiplied by the kW enrolled and the percentage of enrolled kW achieved. To maintain eligibility for the multi-year agreement bonus, participants must meet a 90 percent performance threshold. While the source confirms participants receive compensation based on these $/kW performance metrics, it does not specify the delivery method (e.g., bill credits vs. direct payments) or the specific tariff/rider schedule name.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Eligible technology types for business efficiency programs include lighting and controls, motors, pumps, variable frequency drives, air compressors, HVAC, food service, and refrigeration, though specific manufacturers are not listed in the documents. Data collection requirements for programs include the use of AMI data, metered data, sub-metered data, building energy management system data, and logger data for evaluation and monitoring. While midstream incentives are suggested for HVAC and retail products to influence demand, the provided materials do not detail specific demand response penalty conditions, performance mandates, or non-performance fees for a dedicated Business Demand Response program beyond the whole business efficiency and retro-commissioning frameworks.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/e7a21c20-9cea-4430-bdb1-6b7dcda69352\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/6325d33b-ad9a-40c4-b6fe-c6c2be1627fe\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/04983800-71b1-4213-b7e9-11f59eb084fe\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/fe3232f4-b2de-46e9-a685-f8ee215f3be5\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a> <a href=\"https://app.halcyon.io/documents/26a9e427-d8c4-40dc-b5e5-c8a93783e192\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 4</a></div>\n</div>", "count": 2, "has_data": true}, "geometry": {"type": "Polygon", "coordinates": [[[-102.05174421855092, 40.00307791322416], [-101.83216100010567, 40.00293311876317], [-101.54227261356671, 40.00260909749039], [-101.41102837468424, 40.00258258345213], [-101.3240352629957, 40.0025650163391], [-101.29399018446175, 40.00255894913213], [-101.06031587048126, 40.00230659526607], [-100.75882888545772, 40.00230097791839], [-100. ], [-102.04189297631686, 37.64427701889176], [-102.04187782871497, 37.72387448184033], [-102.04196743631316, 37.73854008301849], [-102.04425649205885, 38.11301035515579], [-102.04463531177873, 38.26241153660161], [-102.04465140316763, 38.26874919425987], [-102.0449450908088, 38.38441902451342], [-102.04551159894511, 38.615164650606175], [-102.04571384503059, 38.69756581887574], [-102.04657114834366, 39.04703830016964], [-102.04720091800364, 39.133147075442736], [-102.04896023934346, 39.37371231698458], [-102.04996211919143, 39.568179193363456], [-102.04999240099012, 39.574056313733706], [-102.05125433887795, 39.818992210613764], [-102.05174421855092, 40.00307791322416]]]}}, {"id": "39", "type": "Feature", "properties": {"STATE_NAME": "Rhode Island", "summary": "<b style='font-size:13px;'>Rhode Island</b><span style='font-size:10px;color:#888;'> \u2014 1 program</span><br><br>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">ConnectedSolutions</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Rhode Island Energy</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The ConnectedSolutions program is an electric demand response initiative branded by Rhode Island Energy, originally described in the company\u2019s System Reliability Procurement (SRP) Investment Proposal for Electric Demand Response. The program is designed to reduce regional coincident peak demand. Its structure is based on five major design principles: providing technologically agnostic encouragement of diffuse and diverse participation for reliable response, establishing right-sized incentives, complying with Least Cost Procurement (LCP) standards, facilitating easy participation, and creating shared value. The program features two primary tracks: a Residential and Small Business (RSB) track and a Commercial and Industrial (C&I) track, both of which include various participation pathways such as daily and targeted dispatch.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Commercial and Industrial (C&I) customers in the ConnectedSolutions program receive performance-based incentive payments calculated using metered interval data to determine seasonal average hourly load shed. Beginning in 2024, the calculation methodology includes negative event performances (where usage exceeds the baseline) which are averaged into the final result, potentially reducing the seasonal incentive. There are no monetary penalties for individual negative events; however, if the overall seasonal average performance is negative, it is assigned a value of 0 kW and the customer receives no payment. The program utilizes two primary participation pathways: Daily Dispatch and Targeted Dispatch. Participants may enroll through Curtailment Service Providers (CSPs), who facilitate the outreach and enrollment process. Specific $/kW or $/kWh rates and the names of the specific tariff or schedules for compensation are not provided in the source material.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Eligible technologies include battery energy storage, electric vehicle charging, building automation systems, complex lighting controls, and thermostats; while commercial programs are technology agnostic, residential participation is limited to a subset of thermostat and battery manufacturers and models (not specifically named) and EVs capable of automatic curtailment. Technologies must be controllable, such as batteries and thermostats that allow for automatic setbacks or dispatch; additionally, demand response participants receive incentives based on actual performance, with daily dispatch participants facing penalties for negative load shed, which is included in seasonal average calculations and can result in zero incentive payment.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/8427485e-a058-44fb-b510-ea41ced3be08\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/1e2fb3e0-eccb-4a7f-90ec-13bfcfe4b298\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/68f7012d-d3e2-4c11-a8cd-bc3c351080b3\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a></div>\n</div>", "count": 1, "has_data": true}, "geometry": {"type": "MultiPolygon", "coordinates": [[[[-71.63147156895576, 41.16667809138388], [-71.59334209660577, 41.23742775723838], [-71.54541031140765, 41.24272949955988], [-71.53408403592088, 41.181861590617906], [-71.51920992607644, 41.14962360012607], [-71.59369961103882, 41.146338955450744], [-71.63147156895576, 41.16667809138388]]], [[[-71.86051238426809, 41.320248377521295], [-71.83595057818982, 41.35393546648053], [-71.83964876299196, 41.41211952118538], [-71.797682890071, 41.41670961534131], [-71.79356846505655, 41.50575379819723], [-71.78935871485159, 41.59685269263932], [-71.78935604203849, 41.596910532188225], [-71.78967787996041, 41.724734281701636], [-71.78969531106428, 41.725198525579785], [-71.79276705900519, 41.807001173393864], [-71.79924276598844, 42.0080649807392], [-71.60669509485963, 42.01310567883574], [-71.59109718836237, 42.01351402588395], [-71.55943963024176, 42.01434280762067], [-71.49822458984453, 42.01587515132549], [-71.38140181069114, 42.01879900975251], [-71.38143212073693, 41.98508518734483], [-71.38146172110146, 41.95214199937427], [-71.38170062643641, 41.89319987621211], [-71.33929869842406, 41.89339987422495], [-71.33959759124012, 41.83200074694835], [-71.32939651891878, 41.782600644399814], [-71.31740253305736, 41.777256742181706], [-71.26139254850962, 41.75230158164373], [-71.20860109038351, 41.69030983756826], [-71.19564054697565, 41.67509059278479], [-71.13288844170877, 41.660102602746576], [-71.13598559774755, 41.62139433045365], [-71.13749246194342, 41.602561543248925], [-71.12057042818601, 41.49744841525788], [-71.1402244791756, 41.48585540235984], [-71.19302061193727, 41.457931361151694], [-71.24599279799968, 41.48130248369619], [-71.2856397520206, 41.487805500922896], [-71.31269467465633, 41.45140234785241], [-71.35109661397603, 41.45080232682395], [-71.38928455547898, 41.46060535155075], [-71.41721329666663, 41.456031632158954], [-71.42865249177174, 41.45415830472455], [-71.45537146650426, 41.40796207175272], [-71.4832954536343, 41.37172187317574], [-71.55538131700294, 41.37331604418477], [-71.62450515502915, 41.36087022887265], [-71.70163092490293, 41.33696844885463], [-71.78595664718604, 41.3257395434325], [-71.86277133992603, 41.30979136136502], [-71.86051238426809, 41.320248377521295]]]]}}, {"id": "40", "type": "Feature", "properties": {"STATE_NAME": "Michigan", "summary": "<b style='font-size:13px;'>Michigan</b><span style='font-size:10px;color:#888;'> \u2014 2 programs</span><br><br>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Business DR Contractual Program</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Consumers Energy</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Business DR program features a contracted seasonal option that allows customers to participate in demand response for all four seasons or in select seasons. This structure is designed to align with the MISO year-round market and provide customers with greater flexibility, supporting the company\u2019s strategy to expand participation and value within the demand response portfolio.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Business Demand Response (DR) customers receive incentive payments for their willingness and ability to support grid reliability through the program. In 2025, a total of $6,878,259 in customer incentive payments was distributed among 1,474 cumulative enrollments. The program features a contractual seasonal option allowing participation in all four seasons or select seasons aligned with the MISO year-round market. While the provided documentation does not specify the exact $/kW or $/kWh rates for this program, it identifies that participating business customers utilize interruptible rates GI, GI2, and EIP.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The program is classified as a business demand response (DR) contractual program; however, the provided documentation does not specify eligible technology types, specific manufacturers, telemetry requirements, hardware specifications, data frequency, or penalty conditions for non-compliance.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/0deea91a-a17b-4580-ac6d-9bb47b5399d7\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/d9a57e4a-48a3-4fa6-b388-c560921311b6\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">CoolCurrents</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">DTE Electric</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The CoolCurrents program utilizes alternative load control devices (LCDs) to manage HVAC unit power, which eliminates the need for 24v wire installations. For the 2023/2024 MISO planning year, the program represented 176 MW of installed capacity, translating to approximately 193 zonal resource credits (ZRCs). New LCDs were ordered in 2023 with installations scheduled to begin in 2024.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The CoolCurrents program, also known as Tariff D1.1, is an interruptible rate for residential and commercial customers with central air conditioning or heat pumps. Under this program, participating customers receive a reduced rate on separately metered usage for their central air conditioning or heat pump equipment.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Program participation requires a separate meter and installation of a radio control unit (RCU), which cycles the\nequipment on and off in 15-minute intervals on control days. To minimize the impact to customers, the\ninterruption does not exceed thirty minutes in any one hour or eight hours in any one day. Beginning with the\napproval requested in General Rate Case U-17767, DTE Electric has been upgrading the existing one-way RCUs\nwith the new two-way ZigBee enabled Load Control Device (LCD) that leverage the Company\u2019s Advanced\nMetering Infrastructure (AMI) network. The new switches allow DTE Electric to better leverage the program as\nboth a capacity and economic resource in the MISO market.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/0deea91a-a17b-4580-ac6d-9bb47b5399d7\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/c50d8ddd-df56-49d9-a0b1-1588decd4e14\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a></div>\n</div>", "count": 2, "has_data": true}, "geometry": {"type": "MultiPolygon", "coordinates": [[[[-84.6162203764455, 45.894472015958875], [-84.51789522803514, 45.828545034570155], [-84.41969631044252, 45.79982520038324], [-84.35602037513497, 45.77189732488568], [-84.39403820927225, 45.72762523108289], [-84.48412803568122, 45.73071203038022], [-84.58757215252409, 45.80670198520828], [-84.65078327557646, 45.85921197708858], [-84.6162203764455, 45.894472015958875]]], [[[-85.7018099141464, 45.73613016851183], [-85.65186689931947, 45.74314022613073], [-85.52444884876356, 45.829795385746294], [-85.36095267364402, 45.81755549840039], [-85.37713268006718, 45.76901447394587], [-85.50927662973717, 45.59647617597445], [-85.56163461999923, 45.5722141052804], [-85.62274166626085, 45.586029076078454], [-85.69687285671262, 45.69725113366524], [-85.7018099141464, 45.73613016851183]]], [[[-86.13809644436068, 45.04303709137321], [-86.0444311584401, 45.15958203334642], [-85.98941317647015, 45.15106913365878], [-85.9540223257799, 45.119281061156975], [-85.97688439444768, 45.06265965962978], [-86.0814884243029, 44.99009496877315], [-86.1548255370651, 45.002392812804324], [-86.13809644436068, 45.04303709137321]]], [[[-86.8248272875501, 41.76023880028115], [-86.69326603859496, 41.83540325030818], [-86.5978972008867, 41.918291207210906], [-86.5281112792301, 42.038420075526965], [-86.50131901759127, 42.0845402986459], [-86.46625880705243, 42.134406291594914], [-8
