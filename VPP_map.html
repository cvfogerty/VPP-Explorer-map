tice.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The compensation structure for residential and small commercial energy storage systems within dynamic load management programs involves a performance incentive based on measured power output during company-dispatched events. In some implementations, an annual incentive of $50/kW-year is offered, where performance is determined by the average hourly delivered kW during event hours compared to a baseline system output on non-event days. For broader programs such as the Commercial System Relief Program (CSRP), Distribution Load Relief Program (DLRP), Term Dynamic Load Management (Term-DLM) program, and Auto-DLM program, participants are required to enroll through an aggregator. These programs generally offer higher rewards in exchange for active participation and responsiveness to grid needs, though specific $/kW or $/kWh rates for C&I customers in NYSEG's Term-DLM and the names of the specific tariff schedules were not provided in the source material.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Eligible technologies for NYSEG's Term-DLM program include distributed generation and energy storage resources (excluding diesel-fired generation sources), as well as direct participants and aggregators meeting existing Commercial System Relief Program (CSRP) and Distribution Load Relief Program (DLRP) minimum qualifications.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/7512c2d0-1004-4e1c-9959-8c48d632ba24\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/processes/18449bce-fbcc-4f12-af67-107254cb3fc8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 2</a> <a href=\"https://app.halcyon.io/processes/e7494701-e7ce-49b5-a1b8-3ba53da7af53\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 3</a> <a href=\"https://app.halcyon.io/processes/86b250fd-0ccd-48f4-9376-10bee009fd22\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 4</a> <a href=\"https://app.halcyon.io/processes/c4e13d5a-4af9-4978-8bd4-9c7e024095a8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 5</a> <a href=\"https://app.halcyon.io/documents/e574c75a-77ac-4dc8-b441-889c089ae361\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/9082c896-36e4-4cbf-8ed9-ea1526de81a8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/6aedfc59-e507-4dca-ab67-21646f07a0e7\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a> <a href=\"https://app.halcyon.io/documents/743f1d09-e0ac-4874-9c39-fb7a3937acb9\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 4</a> <a href=\"https://app.halcyon.io/documents/c8607907-c329-436e-a587-62d3b2bcd51f\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 5</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Load Management Technology Incentive Program</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Niagara Mohawk Power Corporation</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Load Management Technology Incentive Program (LMTIP) is designed to remove financial barriers to the adoption of load management technologies by defraying the upfront costs of hardware and software. Its primary goals are to increase flexibility in electric vehicle (EV) charging site design, improve grid impact management, and reduce operational costs for customers. The program incentivizes load management software, hardware, and energy storage projects, including both on-site storage and storage integrated into charging equipment. These technologies are intended to lower capacity requests, which can result in reduced make-ready infrastructure costs and utility upgrades. Participants receive compensation through an incentive model based on a percentage of eligible costs rather than a prescriptive dollar-per-kilowatt amount. The program is funded using unspent money from the direct current fast charging (DCFC) per-plug incentive (PPI) program.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">In the Load Management Technology Incentive Program (LMTIP), hardware and software-based demand management technologies, including on-site energy storage and load management software, are eligible for incentives. While the program is considered nascent, the Joint Utilities, including Niagara Mohawk Power Corporation (National Grid), have suggested that the compensation structure utilize either a uniform dollar amount per project incentive cap or caps based on service territory-specific data. As of early 2025, specific $/kW or $/kWh rate values and the specific tariff or rider schedules for Niagara Mohawk's version of the program are not detailed in the provided documentation, though the program is designed to include sector-specific incentive programs and pathways similar to those for energy storage.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Eligible technologies for the Load Management Technology Incentive Program (LMTIP) include: (1) on-site energy storage, (2) energy storage integrated directly into charging equipment, (3) load management software, and (4) load management hardware such as power cabinets and switches for power-sharing. To be eligible, technologies must provide active load management with the ability to influence charging power, time, and/or duration; software must be for contracted services up to five years. While specific manufacturers are not listed in the excerpts, eligible technologies must meet technical specifications and industry certifications published on the Joint Utilities website. All technologies must be configured for load management as the primary use case and must comply with utility-specific connection standards. The excerpts do not define these technologies as demand response nor do they outline specific non-performance penalties beyond the requirement that technologies reliably balance, curtail, or defer net EV charging demand.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/fcb70502-e143-4245-abc7-e7488ce213d3\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/processes/c220c09f-46fd-4644-b376-4cefaf231c81\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 2</a> <a href=\"https://app.halcyon.io/documents/83e84d67-110a-48dc-b1ed-2373c36a4dec\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/0360a89a-9f80-4586-ac6f-a87724bbabd1\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/a98498ff-0121-415f-9668-c37b1d360272\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a> <a href=\"https://app.halcyon.io/documents/d27957fc-6d45-4693-acc2-6df41eaeaf09\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 4</a> <a href=\"https://app.halcyon.io/documents/4f5f2eae-e08e-4164-b3d7-f72380037cbd\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 5</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Auto-DLM</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Orange and Rockland Utilities</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Orange and Rockland Utilities (O&R) compensates participants in the Auto-DLM program under Rider P. The program is designed to facilitate load reduction by participating eligible customers, who may be direct participants or aggregators selected through a request for proposal (RFP) process. The primary goals of the Auto-DLM program are to prevent or mitigate overload situations on the utility's electric grid and to provide peak-shaving benefits. Auto-DLM resources are held to higher standards of availability and reliability than Term-DLM resources, requiring faster response times (no less than ten minutes' notice) in exchange for higher incentive payments. The program is offered in specified areas within O&R's service territory, and the amount of load relief procured is capped based on the specific needs of the targeted location.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">While specific details for Orange and Rockland Utilities' Auto-DLM program are not explicitly detailed in the provided excerpts, National Grid (Niagara Mohawk Power Corporation) describes a similar demand response structure under the same New York Public Service Commission proceeding (14-E-0423). In that model, customers are compensated through a performance incentive that appropriately values delivered energy. Specifically, participants receive a performance payment calculated by multiplying their average delivered kW across all events in a season by an annual per-kW incentive rate. Based on a preliminary benefit-cost analysis, the incentive rate is planned at $50/kW-year. Performance is measured using device telemetry to compare ess output during event hours against a baseline of system output on non-event days. The excerpts do not provide the specific tariff or schedule names for Orange and Rockland Utilities' Auto-DLM program, though they note that residential customers generally participate in programs like Auto-DLM, CSRP, and DLRP through an aggregator.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Auto-DLM program excludes all fossil fuel-fired generation sources, though it allows for value stack customers; however, the provided documents do not specify eligible manufacturers, telemetry/controllability requirements, or specific non-performance penalty conditions. Demand response programs are considered virtual power plants (VPPs).</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/7512c2d0-1004-4e1c-9959-8c48d632ba24\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/processes/18449bce-fbcc-4f12-af67-107254cb3fc8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 2</a> <a href=\"https://app.halcyon.io/processes/e7494701-e7ce-49b5-a1b8-3ba53da7af53\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 3</a> <a href=\"https://app.halcyon.io/processes/86b250fd-0ccd-48f4-9376-10bee009fd22\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 4</a> <a href=\"https://app.halcyon.io/processes/c4e13d5a-4af9-4978-8bd4-9c7e024095a8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 5</a> <a href=\"https://app.halcyon.io/documents/e574c75a-77ac-4dc8-b441-889c089ae361\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/6aedfc59-e507-4dca-ab67-21646f07a0e7\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/515ec0c4-3857-4b8e-b80a-20499586bc53\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a> <a href=\"https://app.halcyon.io/documents/c8607907-c329-436e-a587-62d3b2bcd51f\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 4</a> <a href=\"https://app.halcyon.io/documents/743f1d09-e0ac-4874-9c39-fb7a3937acb9\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 5</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Commercial Managed Charging Program (CMCP)</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Orange and Rockland Utilities</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Commercial Managed Charging Program (CMCP) is designed as a durable, market-reliable program with core details established within an implementation plan. The program's structure is intended to be managed through a living document, though modifications to material elements\u2014such as new or ceasing incentive types, incentive amounts, and eligible technologies\u2014require New York Public Service Commission oversight rather than unilateral utility action. The CMCP functions in conjunction with other electric vehicle initiatives, such as the Load Management Technology Incentive Program (LMTIP), to encourage the broad adoption of load management technologies paired with charging infrastructure. It is aimed at commercial customers who take electric service on a commercial rate and are using that service to power EV chargers.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Under the Load Management Technology Incentive Program (LMTIP), Consolidated Edison and Orange and Rockland Utilities provide incentives covering up to 90 percent of eligible technology costs generally, and up to 100 percent in disadvantaged communities. For hardware and battery technology, these incentives are based on engineering, procurement, and installation costs, while software-based technologies receive incentives based on one-time costs or subscription fees for up to five years. For the Managed Charging Program, compensation is detailed in the 'Statement of Managed Charging Participation Incentives.' For medium and heavy-duty vehicles (typically C&I customers), the incentive is designed not to exceed a per kWh equivalent of the difference between the SC 9 Rate I demand delivery rate and the off-peak SC 9 Rate IV as-used demand delivery rate, plus the difference between the forecast energy market supply charges for those respective rates. Specific $/kW or $/kWh values are not explicitly listed as they are subject to variable delivery rate differentials and market supply charge forecasts.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Eligible technology segments for load management include on-site energy storage, energy storage integrated EVSE, load management software, and load management hardware. To be eligible, software must provide active load management with the ability to influence charging power, time, and/or duration to meet load management objectives; hardware must support load-limiting functionality or power-sharing across ports. Participation in the Commercial Managed Charging Program (CMCP) depends predominantly on the availability of communicating interval demand metering. While the program involves load management, the provided documentation does not list specific manufacturers, classify CMCP explicitly as a demand response program with specific load shed/notification mandates, or detail penalties for non-compliance.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/fcb70502-e143-4245-abc7-e7488ce213d3\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/83e84d67-110a-48dc-b1ed-2373c36a4dec\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/be6bfb32-3e2a-4592-85db-c8e18d8d8442\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/008ffd71-0953-44c4-8b18-fed71b458aa4\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a> <a href=\"https://app.halcyon.io/documents/af7cca20-81ad-4ab2-9c21-61b407ce7b87\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 4</a> <a href=\"https://app.halcyon.io/documents/6a85b4d3-5ee9-4420-b234-30f0d2140fda\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 5</a> <a href=\"https://app.halcyon.io/documents/27e9f013-0cca-4a15-8336-f2a7c1538d6d\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 6</a> <a href=\"https://app.halcyon.io/documents/d27957fc-6d45-4693-acc2-6df41eaeaf09\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 7</a> <a href=\"https://app.halcyon.io/documents/a98498ff-0121-415f-9668-c37b1d360272\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 8</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Commercial System Relief Program (CSRP)</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Orange and Rockland Utilities</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Under the Consolidated Edison Company of New York, Inc. portfolio, which includes utilities such as Orange and Rockland Utilities, the Commercial System Relief Program (CSRP) is a demand response program that compensates eligible customers for reducing their electric load. Participants in the CSRP are compensated under Rider T. The program is part of a broader Dynamic Load Management (DLM) framework intended to provide peak-shaving benefits to the utility system. While specific program structure details for Orange and Rockland Utilities are limited, the program generally involves participants or aggregators entering into agreements to provide load relief when called upon by the company, often based on day-ahead load forecasts.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Not available.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Eligible technologies for demand response programs, including those where participation is leveraged by Consolidated Edison and Orange & Rockland (O&R), encompass behind-the-meter load control technologies such as electric vehicle charger adjustments and battery storage (Energy Storage Systems). For O&R, all fossil fuel-fired generation sources are excluded from participation. The program prioritizes customer choice and accommodates a wide range of technologies capable of reducing energy usage during events; however, specific manufacturers and specific telemetry requirements are not detailed in the provided materials.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/e7494701-e7ce-49b5-a1b8-3ba53da7af53\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/processes/7512c2d0-1004-4e1c-9959-8c48d632ba24\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 2</a> <a href=\"https://app.halcyon.io/processes/86b250fd-0ccd-48f4-9376-10bee009fd22\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 3</a> <a href=\"https://app.halcyon.io/processes/c4e13d5a-4af9-4978-8bd4-9c7e024095a8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 4</a> <a href=\"https://app.halcyon.io/documents/6aedfc59-e507-4dca-ab67-21646f07a0e7\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/9ad9f7d6-0c9f-49e0-a5f6-182e41006e75\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/9082c896-36e4-4cbf-8ed9-ea1526de81a8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a> <a href=\"https://app.halcyon.io/documents/c8607907-c329-436e-a587-62d3b2bcd51f\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 4</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Distribution Load Relief Program (DLRP)</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Orange and Rockland Utilities</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Participants in the Distribution Load Relief Program (DLRP) receive compensation under the Rider T schedule.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Not available.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Eligible technologies for demand response participation include energy storage systems (ESS), electric vehicle chargers, and a wide range of behind-the-meter load control technologies; however, Orange and Rockland Utilities (O&R) excludes all fossil fuel-fired generation sources. For term-DLM and auto-DLM programs, O&R and Con Edison propose that resources must provide services during the entire contract term to avoid penalties when participating in other projects like NWAs unless providing incremental relief, and participants are only compensated for demand response services they are willing and able to provide when called upon, particularly for short-notice event dispatch which requires participants to determine the specific kW load relief they can provide under adverse conditions.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/7512c2d0-1004-4e1c-9959-8c48d632ba24\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/processes/e7494701-e7ce-49b5-a1b8-3ba53da7af53\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 2</a> <a href=\"https://app.halcyon.io/processes/86b250fd-0ccd-48f4-9376-10bee009fd22\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 3</a> <a href=\"https://app.halcyon.io/processes/c4e13d5a-4af9-4978-8bd4-9c7e024095a8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 4</a> <a href=\"https://app.halcyon.io/documents/9ad9f7d6-0c9f-49e0-a5f6-182e41006e75\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/9082c896-36e4-4cbf-8ed9-ea1526de81a8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/c8607907-c329-436e-a587-62d3b2bcd51f\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Term-DLM</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Orange and Rockland Utilities</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Term-DLM program is a long-term contracted demand response program designed to procure peak-shaving benefits for the electric system through multi-year contracts. Unlike annual programs, it provides stability and predictability by specifying fixed load relief amounts (in kW) and compensation rates for the duration of the contract term. Eligible customers or aggregators are selected through a competitive request for proposal (RFP) process and enter into a program agreement. Participants are compensated for reducing load when the day-ahead system electric load forecast reaches a utility-specified percentage of the forecasted system peak, with no less than 21 hours' advance notice.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">While specific details for Orange and Rockland Utilities are not detailed in the provided materials, United and ACE NY have recommended that NYSEG and RG&E transition to a fixed, published pricing structure for Term-DLM programs to streamline procurement and encourage energy storage participation. They also recommended that utilities adopt the methodology for calculating the Demand Reduction Value (DRV) and Locational System Relief Value (LSRV) proposed in the Value of Distributed Energy Resources (VDER) proceeding (Case 15-E-0751) and update DLM program compensation rates accordingly. Additionally, it was recommended that Installed Capacity (ICAP) values be incorporated into benefit-cost analyses to determine incentive payment rates. No specific $/kW or $/kWh values for Orange and Rockland C&I customers or their specific tariff schedule names are available in the excerpts.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Not available.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/fb3e74ee-af3a-42e1-ac8d-85b6acdec94e\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/processes/7512c2d0-1004-4e1c-9959-8c48d632ba24\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 2</a> <a href=\"https://app.halcyon.io/processes/e7494701-e7ce-49b5-a1b8-3ba53da7af53\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 3</a> <a href=\"https://app.halcyon.io/processes/cf033573-537c-4d41-883a-1803d2b8e9c1\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 4</a> <a href=\"https://app.halcyon.io/processes/0e1394da-ba11-43b4-92e7-025e3af9faf9\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 5</a> <a href=\"https://app.halcyon.io/processes/b80df85d-e2b4-495f-b541-e4333d13dd0c\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 6</a> <a href=\"https://app.halcyon.io/processes/18449bce-fbcc-4f12-af67-107254cb3fc8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 7</a> <a href=\"https://app.halcyon.io/processes/46070060-1b8a-4b99-830a-4866d409a4b1\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 8</a> <a href=\"https://app.halcyon.io/processes/04946163-22b2-4568-8fd1-bc8f84aacf60\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 9</a> <a href=\"https://app.halcyon.io/processes/c5c5277a-9dd5-46b0-af02-a99ee3589313\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 10</a> <a href=\"https://app.halcyon.io/documents/72330581-562e-4647-badc-17056a9c4661\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/6aedfc59-e507-4dca-ab67-21646f07a0e7\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/2887f7c6-9abf-4c97-928a-ade4717de874\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Auto-DLM</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Rochester Gas and Electric</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Auto-DLM program is an automated dynamic load management program designed to provide both peak-shaving benefits and reliability services to the utility's electric grid. The program is activated to prevent or mitigate overload situations or when the day-ahead system electric load forecast reaches a specific percentage of the forecasted system peak. Resources are required to respond with no less than ten minutes' notice and are held to higher availability and reliability standards than Term-DLM resources. Participation is facilitated through a competitive procurement process, including a fixed, published pricing structure that streamlines procurement and encourages participation from distributed energy resources such as energy storage. Participants receive compensation for reducing load under specified conditions, typically through agreements entered into following a request for proposal (RFP) process or via a fixed, published price option.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Under the New York Public Service Commission proceedings, Rochester Gas and Electric (RG&E) and NYSEG have transitioned to a fixed, published pricing structure for their Automated Dynamic Load Management (Auto-DLM) and Term-DLM programs. This streamlined procurement process is intended to encourage greater participation from energy storage and other distributed resources. While specific dollar rates for commercial and industrial customers or the exact tariff schedule names are not detailed for RG&E specifically, there are recommendations to align DLM program compensation rates with the methodology for calculating Demand Reduction Value (DRV) and Locational System Relief Value (LSRV) from the Value of Distributed Energy Resources (VDER) proceeding (Case 15-E-0751).</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Eligible technologies for the RG&E Auto-DLM program include energy storage systems, curtailment, and onsite generation; any technology used to provide load relief is classified as a demand response participation strategy. Applicants must provide load relief within 10 minutes' notice for 4 hours, seven days per week, 18 hours per day, though specific manufacturers, telemetry requirements, and communication protocols are not detailed in the provided materials.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/fb3e74ee-af3a-42e1-ac8d-85b6acdec94e\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/processes/7512c2d0-1004-4e1c-9959-8c48d632ba24\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 2</a> <a href=\"https://app.halcyon.io/processes/e7494701-e7ce-49b5-a1b8-3ba53da7af53\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 3</a> <a href=\"https://app.halcyon.io/documents/72330581-562e-4647-badc-17056a9c4661\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/6aedfc59-e507-4dca-ab67-21646f07a0e7\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/63182ff9-e03a-4451-af50-c07991352fa5\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Commercial System Relief Program (CSRP)</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Rochester Gas and Electric</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Rochester Gas and Electric (RG&E) Commercial System Relief Program (CSRP) is classified as a Term-DLM (Dynamic Load Management) program. The primary goal of the program is to compensate eligible customers for reducing their electric load during peak shaving events, which are activated when the day-ahead system electric load forecast reaches a company-specified percentage of the forecasted system peak. Participants, including direct participants or aggregators selected through a request for proposal (RFP) process, enter into a program agreement to provide load relief for a specified number of years. The program is offered system-wide and requires resources to provide peak-shaving benefits with at least twenty-one hours' advance notice.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Not available.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Eligible technologies for the Commercial System Relief Program (CSRP) include energy storage solutions (ESS), electric vehicle chargers, and a wide range of behind-the-meter load control technologies. The program is classified as demand response, and participants are generally required to meet metering requirements (such as interval metering) and other eligibility criteria to be allowed to participate in distribution-level demand management programs. Specific manufacturers and communication protocols are not identified in the provided materials.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/e7494701-e7ce-49b5-a1b8-3ba53da7af53\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/processes/7512c2d0-1004-4e1c-9959-8c48d632ba24\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 2</a> <a href=\"https://app.halcyon.io/processes/b80df85d-e2b4-495f-b541-e4333d13dd0c\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 3</a> <a href=\"https://app.halcyon.io/processes/46070060-1b8a-4b99-830a-4866d409a4b1\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 4</a> <a href=\"https://app.halcyon.io/processes/0e1394da-ba11-43b4-92e7-025e3af9faf9\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 5</a> <a href=\"https://app.halcyon.io/processes/18449bce-fbcc-4f12-af67-107254cb3fc8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 6</a> <a href=\"https://app.halcyon.io/processes/04946163-22b2-4568-8fd1-bc8f84aacf60\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 7</a> <a href=\"https://app.halcyon.io/documents/6aedfc59-e507-4dca-ab67-21646f07a0e7\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/9082c896-36e4-4cbf-8ed9-ea1526de81a8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/365334be-5052-4d27-a076-a2040d37ba3f\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a> <a href=\"https://app.halcyon.io/documents/69def779-fef2-4645-9673-e25bda5e5766\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 4</a> <a href=\"https://app.halcyon.io/documents/21e76511-0b38-4a17-a8b6-2cf61e71888c\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 5</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Distribution Load Relief Program (DLRP)</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Rochester Gas and Electric</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Rochester Gas and Electric participates in the Term-DLM and Auto-DLM programs (collectively, the 'programs'). The Term-DLM program is offered system-wide and is generally activated for peak shaving when the day-ahead system electric load forecast reaches a specified percent of the forecasted system peak, requiring at least 21 hours' advance notice. The Auto-DLM program is offered in specific areas to prevent or mitigate grid overload situations or for peak-shaving, requiring at least 10 minutes' notice. These programs are structured as long-term contracted programs utilizing multi-year agreements (Program Agreements) with direct participants or aggregators selected through a Request for Proposal (RFP) process. The goal is to provide stability and predictability in load relief and incentive payment rates, which are fixed for the term of the contract.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Not available.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Eligible technologies include emergency generators, energy storage systems (ESS), and behind-the-meter load control technologies such as electric vehicle charger adjustments; participants must utilize interval metering with telecommunications capability for measurement and monthly billing, and while these programs are classified as demand response, specific utility-imposed performance penalties are not detailed in the excerpts beyond the use of reservation payment options for load relief.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/e7494701-e7ce-49b5-a1b8-3ba53da7af53\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/processes/cf033573-537c-4d41-883a-1803d2b8e9c1\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 2</a> <a href=\"https://app.halcyon.io/processes/7512c2d0-1004-4e1c-9959-8c48d632ba24\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 3</a> <a href=\"https://app.halcyon.io/processes/0e1394da-ba11-43b4-92e7-025e3af9faf9\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 4</a> <a href=\"https://app.halcyon.io/processes/b80df85d-e2b4-495f-b541-e4333d13dd0c\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 5</a> <a href=\"https://app.halcyon.io/processes/18449bce-fbcc-4f12-af67-107254cb3fc8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 6</a> <a href=\"https://app.halcyon.io/processes/46070060-1b8a-4b99-830a-4866d409a4b1\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 7</a> <a href=\"https://app.halcyon.io/processes/04946163-22b2-4568-8fd1-bc8f84aacf60\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 8</a> <a href=\"https://app.halcyon.io/processes/c5c5277a-9dd5-46b0-af02-a99ee3589313\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 9</a> <a href=\"https://app.halcyon.io/documents/6aedfc59-e507-4dca-ab67-21646f07a0e7\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/2887f7c6-9abf-4c97-928a-ade4717de874\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/9082c896-36e4-4cbf-8ed9-ea1526de81a8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a> <a href=\"https://app.halcyon.io/documents/21e76511-0b38-4a17-a8b6-2cf61e71888c\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 4</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Term-DLM</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Rochester Gas and Electric</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Term-DLM program is a system-wide peak-shaving initiative where eligible customers or aggregators are compensated for reducing electric load when called upon by the utility. The program is activated for peak shaving when the day-ahead system electric load forecast reaches a specified percentage of the forecasted system peak, with participants receiving no less than 21 hours' advance notice. The goal of these Dynamic Load Management (DLM) programs is to facilitate the aggregation of distributed resources and support peak load reduction. Under the Commission's 2018 DLM Order and subsequent 2024 modifications, RG&E transitioned to a fixed, published pricing structure for its Term-DLM procurement to streamline processes and encourage greater participation from resources such as energy storage.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">For the Term-DLM and Auto-DLM programs, RG&E (along with NYSEG) is transitioning to a fixed, published pricing structure. This shift from previous procurement processes is intended to encourage greater energy storage participation and streamline operations. While specific dollar-per-kW or dollar-per-kWh rates for RG&E are not explicitly detailed in the provided materials, participants in these programs generally receive incentive payment rates determined by benefit-cost analyses, which may incorporate installed capacity (ICAP) values. There are proposals to align this compensation with the methodology for calculating the Demand Reduction Value (DRV) and Locational System Relief Value (LSRV) used in the Value of Distributed Energy Resources (VDER) proceeding (Case 15-E-0751).</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Not available.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/fb3e74ee-af3a-42e1-ac8d-85b6acdec94e\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/processes/7512c2d0-1004-4e1c-9959-8c48d632ba24\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 2</a> <a href=\"https://app.halcyon.io/processes/e7494701-e7ce-49b5-a1b8-3ba53da7af53\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 3</a> <a href=\"https://app.halcyon.io/documents/72330581-562e-4647-badc-17056a9c4661\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/6aedfc59-e507-4dca-ab67-21646f07a0e7\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a></div>\n</div>", "count": 26, "has_data": true}, "geometry": {"type": "MultiPolygon", "coordinates": [[[[-72.0189247438397, 41.27411400614391], [-71.92680104606863, 41.29012220221077], [-71.91727992851628, 41.251333180313964], [-72.03475263228201, 41.234817976844596], [-72.0189247438397, 41.27411400614391]]], [[[-79.76195419319859, 42.26985769566458], [-79.62748671298243, 42.3246851189579], [-79.45353584249253, 42.41115769466717], [-79.38194634994936, 42.46649195388067], [-79.2833675327671, 42.511229004361866], [-79.19323472630717, 42.54588132749926], [-79.13857110230703, 42.564461793912095], [-79.13594648160853, 42.56917847068655], [-79.11136286965304, 42.613357463225086], [-79.0637614515621, 42.644757028016166], [-79.04886143018435, 42.68915685872826], [-78.97237906079647, 42.71598946364968], [-78.90484406348344, 42.74611941273116], [-78.85135593707464, 42.79175637582749], [-78.86565691217373, 42.82675637367344], [-78.86796731364204, 42.83229281614656], [-78.8825578816138, 42.86725636875971], [-78.91245889487617, 42.886555370438515], [-78.90915982544266, 42.93325535472049], [-78.92795782048842, 42.952920350200785], [-78.96176185368667, 42.957754351343894], [-79.01996494870151, 42.994 79.76195419319859, 42.26985769566458]]]]}}, {"id": "11", "type": "Feature", "properties": {"STATE_NAME": "Idaho", "summary": "<b style='font-size:13px;'>Idaho</b><span style='font-size:10px;color:#888;'> \u2014 3 programs</span><br><br>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Flex Peak</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Idaho Power Company</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Flex Peak program, governed by Schedule 82, is a voluntary demand response initiative designed to motivate commercial and industrial customers to reduce electrical load during company-initiated control events. The program's goal is to enhance demand response offerings and increase participant satisfaction while remaining cost-effective. Eligible participants must be served under Schedules 9, 19, or a special contract and be capable of a minimum load reduction of 20 kW per facility or 35 kW for aggregated sites. Operational parameters include a summer season spanning June through September, during which participants may manually reduce load or use automation devices to respond to events. Participating customers receive financial incentives in exchange for being available to reduce nominated load. Recent proposed structural changes include increasing nomination flexibility, updating baseline cap calculations, and adding incentives for system automation.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Commercial and Industrial (C&I) customers participating in the Flex Peak Program under Schedule 82 are eligible to receive financial incentives in exchange for being available to reduce their load during the months of June, July, August, and September. Compensation for participants is based upon their ability to fulfill their nominated load reduction, measured in kilowatt-hours (kWh). The program allows for a \"day-of\" adjustment (DOA) to enhance nomination accuracy, and a new process enables these nominations to go into effect as early as the next day. The program is available to customers receiving service under Schedules 9, 19, or special contract schedules, provided they can offer a minimum load reduction of 20 kW per facility or 35 kW in aggregate.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Flex Peak program is a demand response initiative for commercial and industrial customers (Schedules 9, 19, or special contracts) and irrigation pumps (Schedule 24). While specific manufacturers or device types like smart thermostats are not listed, eligible participants must utilize one or more load control devices for automatic dispatch or manually interrupt loads. Requirements include a minimum load reduction of 20 kW per facility or 35 kW for aggregated sites. Controllability is maintained through company-provided dispatchable load control devices or participant-installed devices meeting NEC and manufacturer specifications. No specific performance penalties are detailed, though participation is at the company's discretion based on site configuration and capacity.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/62e06d84-e115-43bd-8e97-8411e489ed9b\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/5482d741-ee0c-4630-9706-fc7211e8faf0\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/16c31e8e-3904-42b9-a176-d02d56022716\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/89a400b0-961c-4a31-9efd-61b3956de53f\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Peak Rewards</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Idaho Power Company</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Peak Rewards program, identified as Schedule 23, is a demand response initiative designed to reduce summer electricity demand during periods of system need. It is specifically offered to agricultural irrigation service customers (Schedule 24) within Idaho Power's service area. Participants provide load reduction capacity by turning off irrigation pumps during demand response events, using either manual or automatic dispatch options. The program's goals include enhancing system reliability and providing a cost-effective resource for capacity savings. Under this schedule, participants receive incentive payments, which include variable payments that may be adjusted based on the number of events called and the timing of participation, such as an early interruption option.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Commercial and Industrial (C&I) customers participate in Idaho Power's demand response through Schedule 82, known as the Flex Peak Program. To be eligible, customers must offer a load reduction of at least 20 kW. Compensation is determined by an incentive structure consisting of a fixed capacity payment and a variable energy payment, paid via check or bill credit within 45 days of the season's end on September 15. The fixed capacity payment is based on a participant's average season performance percentage: $3.25 per kW for 75%-120% performance; $2.44 per kW for 50%-74.99%; $1.63 per kW for 25%-49.99%; and $0.81 per kW for performance greater than 0% up to 24.99%. The variable energy payment rate is $0.20 per kWh, which does not apply to the first three load control events of the season.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The program is offered to agricultural irrigation service customers (Schedule 24) using irrigation pumps. These demand response technologies can be operated via manual or automatic dispatch options to turn off pumps during events. Under the automatic dispatch option, participants must grant the company permission to install, service, or remove load control devices on the electrical panel. Tampering with the company's ability to initiate a load control event results in program termination, reimbursement of repair costs, and reversal of all incentive payments made during the previous twelve months.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/62e06d84-e115-43bd-8e97-8411e489ed9b\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/5482d741-ee0c-4630-9706-fc7211e8faf0\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/bf26132a-254d-43f4-9772-58adac7a9426\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Wattsmart</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Rocky Mountain Power</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Wattsmart Business program is an energy-efficiency-first resource strategy designed to support system reliability, load management, and long-term cost containment. Its goals include aligning incentives with current technology and cost-effectiveness requirements while promoting energy efficiency and sustainability for Idaho businesses. In 2025, the program underwent a major structural shift in its lighting portfolio by moving from prescriptive per-fixture incentives to per-watt installed incentives under a new 'express lighting path' to better align incentives with realized energy savings. Additionally, the program expanded its small business offerings to include medium-sized customers through a rebrand to 'Small and Medium Business Express.' The program also utilizes measure realignment, such as shifting market incentives upstream to distributors and discontinuing lower-performing offerings, to ensure ratepayer funds are directed toward high-savings potential measures. It maintains a robust trade ally network to support delivery across diverse sectors, including commercial, industrial, and irrigation operations.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Wattsmart Business Demand Response program provides financial incentives to commercial and industrial (C&I) customers for reducing electricity load during company-initiated events. Participants receive incentive payments for their energy reductions, which help manage peak load and grid reliability. While specific $/kW or $/kWh rates are not detailed for the C&I demand response program, eligible customers in the related Wattsmart Batteries program receive an enrollment incentive based on the kilowatt (kW) size of their battery and participation commitment, plus ongoing annual incentives. Investments in these peak reduction resources utilize collections from Electric Service Schedule 191, the Customer Efficiency Services Rate Adjustment.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Eligible technologies include batteries and solar installations for residential customers, and curtailable loads for large commercial and industrial (C&I) and agricultural facilities. Residential battery enrollments are classified under the Wattsmart Battery program, while C&I and agricultural load reductions greater than 500 kW are classified under the Wattsmart Business demand response program. C&I requirements specify an automated dispatch without advance notice within 50 seconds for real-time events, or within 7 minutes for advanced notice events. The utility compensates these customers based on availability and verified performance, requiring targeted enrollment of high-value controllable loads that meet performance thresholds and verification standards.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/bfc153bd-d040-41a8-957f-dd07f698cfcc\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/e0e3c6ae-8b42-4fbe-b233-bce7e57904af\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/a036f530-6390-4bc7-9ddd-9f244441bf53\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a></div>\n</div>", "count": 3 0642985, 41.996103004428875], [-115.62591396659533, 41.99741500017288], [-115.87018092103266, 41.996765981172544], [-116.332762945201, 41.99728276973857], [-116.62594676504378, 41.99737848391115], [-117.01820216813668, 41.999838458210434], [-117.0261959788776, 41.99988860654704], [-117.02655070266307, 42.37855593655417], [-117.02625341156374, 42.807446469224814], [-117.02665257793046, 43.02512764849556], [-117.02688978762659, 43.596032780391944], [-117.02566432101013, 43.68029353534645], [-117.0235771987222, 43.823811007597286], [-116.98554515293957, 43.88118485188948], [-116.97602410679217, 43.89554799946534], [-116.95987103697914, 43.98292500166634], [-116.93734199922636, 44.02937599973752], [-116.97735085942203, 44.08536399457922], [-116.89785453858798, 44.15266638839544], [-116.89593086182492, 44.15429499302367], [-116.90275181424033, 44.17946699118249], [-116.96549769602613, 44.19412598565962], [-116.97195761726104, 44.2356769815304], [-117.05935160527606, 44.23724399805984], [-117.12103665053695, 44.27758502212115], [-117.17034165281642, 44.258890028505476], [-117.21697368943241, 44.288357061294874], [-117.21199519893486, 44.296451160615256], [-117.19220270855801, 44.32863007626991], [-117.21691072105982, 44.36016310800814], [-117.2430266251014, 44.39097399609951]]]}}, {"id": "12", "type": "Feature", "properties": {"STATE_NAME": "Florida", "summary": "<b style='font-size:13px;'>Florida</b><span style='font-size:10px;color:#888;'> \u2014 4 programs</span><br><br>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Curtailable Service Program</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Duke Energy Florida</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Curtailable Service Program is a manual load control program designed for commercial customers of Duke Energy Florida. The structure of the program requires participants to agree to reduce their electrical demand during periods of capacity shortages under emergency conditions. The goal of the program is to manage load during these emergency events through manual intervention by the participating commercial entities. </div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Curtailable Service Program is an indirect load-control program that reduces demand during peak or emergency conditions. Commercial and Industrial (non-residential) customers receive incentives according to the terms of the specific curtailable service rate schedules they are eligible for. While specific $/kW or $/kWh rates are not detailed in the excerpts, the program mandates that participants are billed in accordance with these applicable rate schedules. Additionally, participants who fail to meet curtailment responsibilities are subject to additional charges as specified in those schedules.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The technology types evaluated under field demonstration projects, which include home energy management technologies and high performance windows, are solely determined by Duke Energy Florida (DEF). Participation in these demonstrations requires customers to grant DEF and its contractors access to facilities for maintaining and monitoring evaluation equipment; however, specific manufacturer lists, telemetry requirements, or demand response penalty conditions are not detailed in the provided materials.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/18146d0b-e382-43d2-87c2-7600e926391c\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/a4068374-0edf-4c83-b04e-075f30adf0dd\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/9437ae2c-6743-42c9-96d2-b8bc8697be45\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/1825a37b-bcd0-4ddb-bae6-26bee7c7b14d\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Interruptible Service Program</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Duke Energy Florida</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Interruptible Service Program is a direct load control program administered by Duke Energy Florida, LLC (DEF) designed to reduce system demand during peak periods or capacity shortages caused by emergency conditions. Participation is voluntary and available to non-residential customers located within the DEF service territory who are served by a metered DEF account</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">While the provided documentation acknowledges the existence of Duke Energy Florida's Interruptible Service Program, the specific compensation structure details\u2014including incentives, payment types such as monthly demand credits, $/kW or $/kWh rates, and the names of the associated rate schedules\u2014are not available in the provided excerpts.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The source material identifies home energy management technologies, high performance windows, and unspecified field demonstration technologies evaluated by Duke Energy Florida (DEF) as eligible, but it does not list specific manufacturers, telemetry, communication protocols, hardware requirements, or demand response penalty conditions for an Interruptible Service Program.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/18146d0b-e382-43d2-87c2-7600e926391c\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/a4068374-0edf-4c83-b04e-075f30adf0dd\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/1825a37b-bcd0-4ddb-bae6-26bee7c7b14d\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Standby Generation Program</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Duke Energy Florida</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Standby Generation Program is a voluntary load-control initiative designed to reduce Duke Energy Florida (DEF) system demand by utilizing customer-owned on-site generation equipment. Participation requires a standby generation capacity of at least 50 kW. Customers are expected to operate their equipment until notified by DEF that it is no longer required. </div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Standby Generation program is a voluntary load control program available to all commercial and industrial customers with on-site generation capability who allow remote activation during capacity emergencies. Participants receive compensation in the form of monthly bill credits. These credits are provided according to the terms of the specific stand-by tariff under which the customer takes service.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Customer standby-generation capacity must be at least 50 KW and must be compliant\nwith all state and federal emissions requirements. Customer must be within the range of the Company\u2019s switch communications\ncapability. All installations must comply with all provisions of the National Electric Code (NEC)\nand any code or requirement of other authorities having jurisdiction. Where necessary, the engineering for the metering and monitoring module installation\nwill be done by a registered Florida engineer. The physical installation will be done by\na licensed Florida electrical contractor selected by DEF. Appropriate permits will be\nsecured for each installation by the contractor.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/18146d0b-e382-43d2-87c2-7600e926391c\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/9437ae2c-6743-42c9-96d2-b8bc8697be45\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/a4068374-0edf-4c83-b04e-075f30adf0dd\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/1825a37b-bcd0-4ddb-bae6-26bee7c7b14d\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Industrial Load Management (GSLM 2 & 3)</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Tampa Electric Company</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Industrial Load Management (GSLM 2 & 3) program is a load management initiative for large industrial customers.\nTarget Participants: The program is designed for large industrial customers with interruptible loads of 500 kW or greater. Objectives: The program serves as a load management tool Assessments for customer participation are conducted every six months</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Not available.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The program is available to commercial/industrial customers with interruptible loads of 500 kw or greater who sign a tariff agreement; however, specific eligible technology types, manufacturers, and telemetry or controllability requirements such as communication protocols and equipment specifications are not listed in the excerpts.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/d98e468d-6adc-4712-ae0c-7abd2e5328ce\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a h
