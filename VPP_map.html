<script>
const VPP_GEOJSON = {"type": "FeatureCollection", "features": [{"id": "0", "type": "Feature", "properties": {"STATE_NAME": "Texas", "summary": "<b style='font-size:13px;'>Texas</b><span style='font-size:10px;color:#888;'> \u2014 2 programs</span><br><br>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Interruptible Credit Option Tariff</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Southwestern Public Service Company</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The program is structured as a pilot project known as the Integrated Marketplace Demand Response Option Tariff (also referred to as the SPP IM Tariff). Under this program, participating customers are credited on their monthly bill for 75% of the net market revenue received from participation in the Southwest Power Pool (SPP) Integrated Marketplace, while the remaining 25% is used by Southwestern Public Service Company (SPS) to administer the program. Customers may submit bid parameters and quantities to SPS with a standard thirty-day notice period. The program includes provisions for southwest power pool settlement true-ups, for which customers are responsible for 75% and SPS for 25%. Participating customers' preferences regarding interruptibility are tracked and reported annually to the commission.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Commercial and industrial customers participating in the Interruptible Credit Option (ICO) tariff receive compensation in the form of a monthly credit. This Monthly Credit Rate (MCR) is calculated based on customer-specific data specified in the executed Interruptible Credit Option Agreement. Customers are eligible for compensation for energy-only load reduction when cleared and dispatched by the SPP in energy and supplemental reserve markets, or for qualifying amounts of registered and cleared capacity. Under the SPP Integrated Marketplace (SPPIM) tariff, the company retains 30% of any net SPP revenues, with the remainder provided to the customer, inclusive of true-up modifications. Eligibility for this interruptible service is available to customers on the Large General Service Transmission (LGST), Primary General Service, and Secondary General Service rate schedules. While specific $/kW credit values for the ICO are not detailed, the underlying LGST schedule includes capacity charges ranging from $1.80/kW to $6.63/kW and an energy charge of $0.006690/kWh.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Eligible technologies for the ICO Tariff and OPA Rider consist of customer load at the point of delivery that is not enrolled in other interruptible programs; for the OPA Rider, load must be controlled by automated intelligent equipment (EMS) or a company-owned switch. Requirements include a remote terminal unit (RTU) to receive/transmit signals and real-time usage information via phone or cellular communication, with load removal occurring in 10 minutes or less. No specific manufacturers are listed, and while the utility may implement waitlists or consider previous performance history for oversubscribed programs, specific demand response penalty amounts are not detailed.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/29e743a1-4527-4336-8099-29269dc84f8f\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/d3a0e71c-11b5-441e-9f27-2abdc9316500\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/4e38a75a-29bf-4af5-bfb8-4f255fc5b095\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/6bd1612f-4041-4355-b602-dd73e82c5c34\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a> <a href=\"https://app.halcyon.io/documents/d656dd5e-2b9e-4dd1-b38a-044c10044249\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 4</a> <a href=\"https://app.halcyon.io/documents/6416f775-4b2d-44a2-9037-a5f48fa96e94\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 5</a> <a href=\"https://app.halcyon.io/documents/e42b3058-61a9-4050-ad87-f9cd346a44c6\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 6</a> <a href=\"https://app.halcyon.io/documents/499ed2cc-ab8c-4f99-9db4-f492ec875ba7\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 7</a> <a href=\"https://app.halcyon.io/documents/99a8c5da-c4d3-47e2-b5fd-a519dc44688c\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 8</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Load Management Standard Offer Program</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Southwestern Public Service Company</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Load Management Standard Offer Program (LM SOP) is a commercial program that involves participant load curtailment to achieve program objectives and manage system conditions. For program year 2025, the program included eight participants and utilized specific curtailment events where sponsors and customer sites were selected based on defined requirements. Participants receive compensation or incentives as part of total program costs, which also include administrative costs, research and development, and utility proceeding expenses.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">In Docket 59702, Southwestern Electric Power Company (SWEPCO), rather than Southwestern Public Service Company (SPS), is identified as the operator of the Commercial Load Management Standard Offer Program (LM SOP). The program involves total program costs that include components such as program incentives and utility rate case expenses. For Program Year 2025, the program included eight participants who were compensated for curtailment events. The total requested Research and Development (R&D) costs for related energy efficiency programs were $108,681, with administrative and incentive calculations managed through the 'EECRF templates' and 'step 4 utility incentive calculator' workpapers. Specific $/kW or $/kWh rates and the exact tariff names for participant payments are not detailed in the provided materials.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Not available.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/8f4fef37-ca2b-4da7-b494-3063f09c64bd\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/fec4142c-9358-4c85-ac90-e8326b1acfc5\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/805343b9-e1c2-43f3-a38e-eca6265054a2\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a></div>\n</div>", "count": 2, "has_data": true}, "geometry": {"type": "Polygon", "coordinates": [[[-106.62344514833568, 31.914033064529466], [-106.63011420733348, 31.97125697625273], [-106.61848626147233, 32.00049393570099], [-106.51398650228994, 32.00081662995111], [-106.37717369898697, 32.00123916527106], [-106.20069957377568, 32.00178419263319], [-105.99797179314834, 32.00197391042724], [-105.75052781856515, 32.002205187694166], [-105.1539941049684, 32.000496549482214], [-104.91835726928356, 32.00047179306468], [-104.84774027642567, 32.00046432353813], [-104.64352642016699, 32.00044283186361], [-104.02452176571614, 32.00001026374707], [-103.98021417980894, 32.00003309285088], [-103.72288201933246, 32.00016556709259], [-103.32650099187336, 32.00036981457256], [-103.06442313348262, 32.00051792412678], [-103.06442264357925, 32.08705073594352], [-103.0644223154692, 32.145005609909454], [-103.06469659236485, 32.52219152590341], [-103.06476160775708, 32.5879814729309], [-103.0648296950474, 32.726948776742105], [-103.06488973041142, 32.84935742150911], [-103.063469711036, 32.959104898106986], [-103.06010371533726, 33.21922383414457], [-103.0564957194743, 33.388413258997964], [-103.05261116423799, 33.570573783727184], [-103.05261064768258, 33.5705980072268], [-103.04734667818997, 33.82467338305864], [-103.04351686081021, 34.079379712598254], [-103.04383738117227, 34.30264528183686], [-103.04385187894883, 34.312747165102046], [-103.04394775483588, 34.37955235616543], [-103.0430740676666, 34.61977987954666], [-103.04277106125514, 34.747359315753926], [-103.04274040900633, 34.954140648214064], [-103.0427125222728, 35.14473379919882], [-103.04261948254158, 35.183156092324246], [-103.04155447019878, 35.62248532858464], [-103.04135692713282, 35.73943176735674], [-103.04082409637077, 36.05522925515816], [-103.04192541840644, 36 6034718217, 30.801565397863577], [-105.31486361538894, 30.816959182583332], [-105.39424275494052, 30.8529769441171], [-105.39960974235876, 30.88893885022725], [-105.48802791843794, 30.94327546979142], [-105.55743106663999, 30.99022626991344], [-105.57954328235918, 31.035393221481243], [-105.62735065988159, 31.098542119490173], [-105.7094929464338, 31.136371887862516], [-105.77325901754679, 31.166893859823304], [-105.79438802955048, 31.20223691902838], [-105.86935478532068, 31.288631360175668], [-105.93845352986372, 31.318732780821527], [-105.95394348039449, 31.36474869396378], [-105.99642987862515, 31.387839826270632], [-106.00492649471121, 31.392457701129434], [-106.08025852031997, 31.398701639747777], [-106.17567540455288, 31.456278687070363], [-106.2368043059016, 31.513375715554115], [-106.28081126888218, 31.562061667863865], [-106.30353619470539, 31.620412648822665], [-106.33991995235537, 31.66973997163485], [-106.3701390673027, 31.710709584480565], [-106.41794000397411, 31.752008531603117], [-106.46764201831203, 31.759607461806905], [-106.48464200454589, 31.747808461268303], [-106.52824204511482, 31.78314735401881], [-106.5813440581826, 31.813905251714836], [-106.63588008372008, 31.871513119546147], [-106.62344514833568, 31.914033064529466]]]}}, {"id": "1", "type": "Feature", "properties": {"STATE_NAME": "California", "summary": "<b style='font-size:13px;'>California</b><span style='font-size:10px;color:#888;'> \u2014 6 programs</span><br><br>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Automated Demand Response Program</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Pacific Gas and Electric</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Pacific Gas and Electric (PG&E) Automated Demand Response Program is referenced as a precedent for providing funding to future pilots. The program aims to support desired price responsiveness and load shifting outcomes. No further details regarding its specific structure, underlying goals, or compensation schedules are provided in the source material.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Automated Demand Response Program is referenced as a precedent for funding pilot program resources. While detailed specific $/kW or $/kWh rates and particular schedule names for participant compensation are not enumerated, the program is categorized alongside other demand-side programs that include incentives based on counterfactual demand response and centralized dispatch of distributed energy resources. The broader regulatory vision discussed in the proceeding contrasts these existing structures with dynamic transactive pricing tariffs involving two-part subscription components.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The pilot involved smart appliances, electric vehicles, battery storage, and air conditioning systems, which required upgrades to smart devices to ensure technology or connectivity services as required by the pilot. Participating manufacturers of electrical equipment and consumer goods expressed limited interest during the design stage due to concerns over connectivity services and the pilot's value proposition. While automation service providers (ASPs) provided technology for most customers, specific demand response penalty conditions or categorization of specific technologies as demand response were not detailed in the excerpts.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/0b236afb-8175-43e1-920f-cf14d124ed59\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/processes/3a0d5c81-f46b-4fe4-8b3f-d93c20ae26e8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 2</a> <a href=\"https://app.halcyon.io/documents/f8c7e448-f946-4a92-b01f-330cdd23c2f7\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/66fcb6a2-87b9-4a2a-bb1c-babcb68ee98e\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Agricultural & Pumping Interruptible Program (AP-I)</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Southern California Edison</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Southern California Edison (SCE) proposed a Mass Market Demand Response (MMDR) pilot to begin in 2024 with a budget of $1.461 million. The pilot's structure is designed to evaluate various retail payment and technology rebate schemes and determine the load reduction capabilities of a single demand response program managing multiple end-use devices. Its primary goal is to inform the design of a future technology-agnostic demand response program under a single tariff, specifically for the next demand response cycle in response to increased electrification. The pilot will track customer performance and feedback and test vendor and technology capabilities. Regarding PG&E's agricultural pilot proposals in the same proceeding, PG&E proposed an Agricultural DR Pilot with two participation options: a performance-only design with no penalties and a capacity payment design with penalties. Participants would be required to be on an agricultural Time-of-Use (TOU) rate schedule and would be eligible for automated demand response (Auto DR) incentives. However, the CPUC denied funding for PG&E's agricultural pilot.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Agricultural & Pumping Interruptible Program (AP-I) is a tariffed rate schedule that operates as a rider to a customer's existing retail rate schedule. Customers enrolled in the AP-I program are eligible for program incentives as defined in the specific schedule, though the source does not provide specific $/kW or $/kWh values or specify if payments are made via bill credits or direct payments. Changes to these incentives and terms may be adjusted pursuant to Commission directives. Participants are subject to the same terms and conditions as other supply-side demand response (SSDR) program participants.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Agricultural Pumping, Interruptible program (AP-I) is classified as a demand response (DR) program; however, the provided documentation does not specify eligible technology types, manufacturers, telemetry or controllability requirements, or specific non-performance penalties beyond mentioning incentives are used in calculations and that the utility is ordered to submit updated excess energy charges.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/3a0d5c81-f46b-4fe4-8b3f-d93c20ae26e8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/processes/d684930f-d073-4329-86cb-112f51ab3639\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 2</a> <a href=\"https://app.halcyon.io/processes/b311b8ad-a83d-46cc-a281-8080df37340a\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 3</a> <a href=\"https://app.halcyon.io/processes/c3151fa0-d8df-4d76-994f-93c12529e889\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 4</a> <a href=\"https://app.halcyon.io/documents/bcf6b472-b292-40f3-9027-d0f7328d9005\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/a719171d-af8e-4e22-95a2-567028ad6ee4\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/4ac03ab5-7fcb-4bc5-a757-50a614610ef6\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Base Interruptible Program (BIP)</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Southern California Edison</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Base Interruptible Program (BIP) is a voluntary, emergency demand response program designed for Southern California Edison (SCE) customers and aggregators with demands of 200 kW and above.\nThe program is a supply-side tariffed program dispatched based on California Independent System Operator (CAISO) market awards and is bid as a Reliability Demand Response Resource (RDRR) or Proxy Demand Response (PDR) resource. Customers commit to reducing energy consumption to a Firm Service Level (FSL) when notified of an emergency or a measurement and evaluation event.\nThere are two primary participation options:\nOption A: Requires demand reduction to the FSL within 15 minutes of notice.\nOption B: Requires demand reduction to the FSL within 30 minutes of notice.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Participants receive compensation in the form of a monthly capacity bill credit in exchange for their commitment to reduce load. Unlike voluntary dynamic rates, BIP involves mandatory performance obligations backed by enforceable contracts \n. Failure to reduce load during an event results in excess energy charges ranging from $9.53 to $10.87 per kWh, potential non-performance testing, and possible removal from the program. </div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Base Interruptible Program (BIP) is a supply-side demand response program where participants commit to guaranteed, forward-committed load reductions under enforceable contracts; while specific eligible technology types or manufacturers are not listed, the program requires mandatory performance backed by excess energy charge penalties of $9.53 to $10.87 per kWh and potential removal for non-compliance.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/d684930f-d073-4329-86cb-112f51ab3639\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/processes/b311b8ad-a83d-46cc-a281-8080df37340a\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 2</a> <a href=\"https://app.halcyon.io/processes/c3151fa0-d8df-4d76-994f-93c12529e889\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 3</a> <a href=\"https://app.halcyon.io/processes/0b236afb-8175-43e1-920f-cf14d124ed59\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 4</a> <a href=\"https://app.halcyon.io/processes/3a0d5c81-f46b-4fe4-8b3f-d93c20ae26e8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 5</a> <a href=\"https://app.halcyon.io/documents/c3ea0bcf-ef92-4bff-afd2-3882f8b11430\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/4a1aaae5-69e1-4f28-aa20-7f3da4258710\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/93ae2453-e1fe-4e67-b9bc-4e41aa9a5477\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Capacity Bidding Program (CBP)</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Southern California Edison</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The primary goal of the CBP is to provide a demand response mechanism where participants can be dispatched to reduce load. For 2024, the program includes a prescribed option that aligns with California Independent System Operator (CAISO) availability assessment hours. SCE proposed several structural changes to this program to align with Resource Adequacy (RA) requirements and reduce program attrition: Increasing the maximum number of program events per month from five to six. Reducing the maximum event duration from six to five hours Adjusting the event window from 3 p.m. to 9 p.m. to a 4 p.m. to 9 p.m. window. Sunsetting the \"CBP prescribed\" program and replacing it with \"CBP elect\". Eliminating off-peak months (November through April) due to low participation, reallocating that budget to increase incentive rates during peak months (May through October).</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Energy payments under the day-ahead schedule are issued to aggregators at the settled locational marginal price (LMP) for a resource\u2019s sub-LAP for the awarded energy quantity. The penalty rate for the day-ahead program is set as the average settled LMP in the real-time market at the SCE default load aggregation point. </div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Not available.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/d684930f-d073-4329-86cb-112f51ab3639\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/bac0af5f-b470-4c04-85f5-5ecee6b0b7ea\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Emergency Load Reduction Program (ELRP)</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Southern California Edison</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Emergency Load Reduction Program (ELRP) is a pilot program structured to provide demand reductions during extreme weather events and emergency grid conditions. The program utilizes a bottom-up approach to estimate impacts across mutually exclusive and exhaustive customer segments, which are defined by subgroups, industry, solar status, and climate zones. Its goals include addressing emergency capacity needs, testing new program designs or technologies, and potentially transitioning successful results into utility-wide or statewide use. Participants are compensated based on their performance, with the Commission evaluating the program for cost-effectiveness and considering reductions to incentive levels and dispatch windows. While the specific name of the schedule or tariff for direct participant compensation and exact per-kWh or capacity payment amounts are not explicitly named in the provided text beyond references to the ELRP subgroup structure (e.g., Subgroups A.1, A.1 BIP, A.2, A.4, A.5, B.2), the program serves as a resource for load reduction when dispatched.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Emergency Load Reduction Program (ELRP) utilizes a performance-based incentive structure where customers are compensated at a rate of $2/kilowatt per hour (kWh). While some parties proposed reducing this incentive to $1/kWh starting in 2024, the current rate of $2/kWh is maintained to support customer participation and data collection during the pilot stage (2021-2025). Certain ELRP subgroups, such as A.5 (EV/VGI aggregation), are also subject to minimum dispatch requirements (e.g., 30 hours) to support nascent technologies. In contrast, the Demand Side Grid Support (DSGS) program, an alternative for customers with back-up generation, offers an energy payment of $2/kWh plus a standby payment of $0.25/kWh for hours when committed load reduction is not dispatched due to the absence of a required energy emergency alert level.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">While the provided documents do not list specific eligible technology types or manufacturers, the Emergency Load Reduction Program (ELRP) is described as a seven-year pilot (2021-2027) with eight sub-groups (A.1 through B.2). Proposed inclusions for telematics-based participation and electric vehicle best practices were noted as unvetted and out of scope in the final stage of the proceeding. Regarding controllability and penalties, certain sub-groups are subject to minimum dispatch hour requirements: A.4 has a 15-hour minimum dispatch and A.5 has a 20-hour minimum dispatch.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/d684930f-d073-4329-86cb-112f51ab3639\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/processes/b311b8ad-a83d-46cc-a281-8080df37340a\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 2</a> <a href=\"https://app.halcyon.io/processes/c3151fa0-d8df-4d76-994f-93c12529e889\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 3</a> <a href=\"https://app.halcyon.io/documents/6dd3022d-bfc9-45a5-a815-e830b6bb3377\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/c3ea0bcf-ef92-4bff-afd2-3882f8b11430\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/a2b2dfc7-3bda-4e36-aa1a-051fa9103c3d\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a> <a href=\"https://app.halcyon.io/documents/2c71cc99-f84b-4a5e-af8a-d0a7021f46ec\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 4</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Summer Discount Plan-Commercial (SDP-C)</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Southern California Edison</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Summer Discount Plan-Commercial (SDP-C) is a voluntary direct load control program for commercial customers. Its structure involves participants receiving bill credits in exchange for allowing their air conditioning units to cycle off during curtailment events. The program functions as a reliability resource available 24 hours per day, 7 days per week, designed to respond quickly to grid emergencies. A primary goal of the program is to maintain robust participation and load reduction capacity, particularly during emergency events that may occur outside the standard Resource Adequacy (RA) window, utilizing the commercial sector's ability to provide significant load reductions during their specific hours of operation.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Summer Discount Plan (SDP) provides commercial participants with monthly capacity bill credits in exchange for allowing Southern California Edison (SCE) to curtail or cycle central air conditioner usage. For commercial customers, incentive payments vary based on the selected level of commitment (30%, 50%, or 100% cycling), the a/c tonnage enrolled, and the specific program option chosen. While the source describes these as monthly capacity bill credits, it does not specify a specific schedule name or $/kW and $/kWh rates beyond the general mechanism of credits for load reduction commitment.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Southern California Edison (SCE) Summer Discount Plan-Commercial (SDP-C) is classified as a supply side demand response (DR) program that is bid into the CAISO wholesale energy market. While identified as a supply side resource, the available documentation does not specify eligible technology types, manufacturers, telemetry, or controllability requirements. Specific penalties or hardware specifications for SDP-C are not detailed in the provided materials.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/d684930f-d073-4329-86cb-112f51ab3639\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/processes/b311b8ad-a83d-46cc-a281-8080df37340a\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 2</a> <a href=\"https://app.halcyon.io/processes/c3151fa0-d8df-4d76-994f-93c12529e889\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 3</a> <a href=\"https://app.halcyon.io/documents/c3ea0bcf-ef92-4bff-afd2-3882f8b11430\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/d081d598-5bca-4111-8b86-be367ae474ab\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/93ae2453-e1fe-4e67-b9bc-4e41aa9a5477\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a></div>\n</div>", "count": 6, "has_data": true}, "geometry": {"type": "MultiPolygon", "coordinates": [[[[-118.59397016958364, 33.467197985604145], [-118.48478657013946, 33.487483152853535], [-11 66;margin-bottom:6px;\">Louisville Gas and Electric Company and Kentucky Utilities Company</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Curtailable Service Rider (CSR) is a program in which participants are ineligible to participate in the Nonresidential Demand Response program. No further information regarding the structure, underlying goals, or specific tariff schedules (e.g., CSR-1, CSR-2) for this rider is available in the provided text.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">For commercial and industrial (C&I) customers, programs utilize various incentive structures including prescriptive incentives (per-unit or savings-based), custom incentives (based on projected savings or percentage of project costs), and pay-for-performance models. In demand response program evaluations for LG&E and KU, a load reduction incentive of $32 per kW was studied, with 30% of industrial respondents indicating a willingness to participate at that level, while an incentive of $50 per kW increased potential participation to 37%. Pay-for-performance programs specifically offer performance-based incentives for large capital projects, sometimes measured via on-site metering and trued up after one year. While the excerpts detail these general industrial incentive categories and specific $/kW values used for potential modeling, they do not explicitly name the specific 'CSR' schedule or its individual bill credit mechanics.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Not available.</div>\n  <div style=\"margin-top:3px;\"><a href=\"http -89.34519424287184, 36.501342652781055], [-89.41729305374206, 36.49903258990225], [-89.53923218830384, 36.49793373247038], [-89.57148114501753, 36.53808676849728], [-89.54443411815883, 36.574509825893735]]]}}, {"id": "3", "type": "Feature", "properties": {"STATE_NAME": "Georgia", "summary": "<b style='font-size:13px;'>Georgia</b><span style='font-size:10px;color:#888;'> \u2014 2 programs</span><br><br>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Electric Transportation Vehicle-to-Everything (V2X) Pilot</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Georgia Power Company</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Electric Transportation Vehicle-to-Everything (V2X) Pilot is designed to evaluate technology that transfers energy stored in underutilized electric vehicle batteries to buildings, houses, and the grid. The pilot\u2019s structure begins with a collaboration involving public school systems and includes the installation of up to 10 chargers. The underlying goals of the project are to enhance system flexibility, resiliency, and economics by leveraging existing battery storage in the electric vehicle market, while benefiting customers and the grid as the energy landscape evolves. The provided documents do not specify a compensation schedule, tariff, or participant payment mechanism such as rebates or bill credits.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Not available.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Not available.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/a721b8a5-d9b1-4fc3-8ca7-7aead3764e35\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/processes/7d64ce6f-0d89-431c-aa08-71d509ffd7a7\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 2</a> <a href=\"https://app.halcyon.io/documents/85fcb6c9-80cf-44f9-9087-528b183069ba\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Large Customer Owned Resiliency Program</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Georgia Power Company</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Large Customer Owned Resiliency (LCOR) program is designed for qualifying commercial and industrial customers, including transmission-connected sites and data centers, that install dispatchable, behind-the-meter distributed energy resources (DER) with a firm fuel supply. The program goals include providing customers with resiliency during outages while allowing Georgia Power to call for demand reduction during periods of extreme supply and demand conditions, system-wide capacity needs, or local constraints. Under the associated Large Customer Owned Resiliency Rider (Schedule LCOR-1), participating customers receive value for demand reductions achieved during demand response events. During these events, the company notifies participants to utilize their DER to serve their own load, thereby removing that load from the electric system. Participants must enter a written LCOR agreement that defines operational parameters such as frequency and duration of events. Customers already participating in fixed pricing alternatives, curtailable load, or certain demand response credit programs are generally ineligible.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Under the Large Customer Owned Resiliency (LCOR) program, participating transmission-connected commercial and industrial (C&I) customers receive economic compensation for providing firm load reductions to the system. This is based on a shared savings model, which ensures that the cost of procuring capacity through the program is lower than traditional generation expansion. Specific incentive values in $/kW or $/kWh, or the names of the specific tariff or rider schedules used for participant payment, are not provided.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The program identifies eligible technology as dispatchable, non-emergency resources with a firm fuel supply. No information is provided regarding specific manufacturers, telemetry requirements, controllability details, or demand response classifications and penalties.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/a721b8a5-d9b1-4fc3-8ca7-7aead3764e35\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/processes/7d64ce6f-0d89-431c-aa08-71d509ffd7a7\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 2</a> <a href=\"https://app.halcyon.io/documents/4c5b9b72-880b-46c5-9d67-b416861dcc05\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/75173171-123d-4557-9c04-73f4cf8a3c52\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/75d7976c-e2c2-4263-8e7e-2c197b7154a0\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a></div>\n</div>", "count": 2, "has_data": true}, "geometry": {"type": "Polygon", "coordinates": [[[-85.60516501577332, 34.98467800221], [-85.47433888824122, 34.983673343995605], [-85.38496714374081, 34.982987021991], [-85.36391919535713, 34.983376585731186], [-85.27755625959479, 34.984975025090975], [-85.2650552949268, 34.98507767031918], [-85.04518328551717, 34.98688306536692], [-84.97985429108047, 34.987205684288526], [-84.97697406974704, 34.987219907111296], [-84.8613141549507, 34.98779104733573], [-84.81047757446603, 34.98787799281244], [-84.77583774659746, 34.98793723708182], [-84.72743404881813, 34.98802002712793], [-84.62148303744807, 34.98832903245549], [-84.50905202599199, 34.98803303869033], [-84.32186900027445, 34.988408051535245], [-84.12944691619964, 34.98794699199951], [-84.00533664895408, 34.987649602717696], [-83.93664585832728, 34.987484965443926], [-83.9364272023876, 34.987484348642795], [-83.61998460567887, 34.98659185539776], [-83.54918030925059, 34.98880307359534], [-83.48287272988908, 34.99087386230999], [-83.32276757063501, 34.99587397308174], [-83.10860565488112, 35.00065910853719], [-83.12437782628668, 34.95523855663302], [-83.14062065613307, 34.924913550184776], [-83.20118221425376, 34.884651654569325], [-83.25258080726809, 34.853481790770665], [-83.2848103016645, 34.823041724481584], [-83.32386355499997, 34.789710675893836], [-83.32005935122986, 34.759614755571604], [-83.35323499768826, 34.72864662948908], [-83.34960570575771, 34.71700917691174], [-83.34003679662978, 34.68632620869115], [-83.33868775673696, 34.68200048437254], [-83.27795878322178, 34.64485142579146], [-83.22140135639962, 34.609945245851925], [-83.15457663478774, 34.5881 54927933529832, 44.57770457038583], [-92.61802445272136, 44.612870473188664], [-92.69649063828933, 44.68943639420743], [-92.73162356932404, 44.714923116694735], [-92.79236067024014, 44.7589841450514], [-92.80528692078056, 44.768361346301646], [-92.76857422490639, 44.854368546018094], [-92.76711758677953, 44.861515748509824], [-92.76702351995407, 44.861977300807666], [-92.75080256639934, 44.941567754752185], [-92.76190482692542, 45.022467919581736], [-92.80291183140714, 45.0654039111189], [-92.7897128362521, 45.07555524098804], [-92.7405098782095, 45.113397168212735], [-92.76693298035082, 45.19511226607275], [-92.76609240505822, 45.21002300331307], [-92.76186881505393, 45.2849392953892], [-92.74826844075727, 45.29606070792124], [-92.69896728350194, 45.336375322820224], [-92.65848579008392, 45.39605933221249], [-92.64676753212107, 45.43793031414198], [-92.68679242848837, 45.472272051937], [-92.72802228399047, 45.52565285031325], [-92.75690525665559, 45.55749981728325], [-92.8015023345465, 45.56285472315523], [-92.88113548204075, 45.57340954119244], [-92.88792843616817, 45.63900664081353], [-92.88669655265299, 45.64414865449835]]]]}}, {"id": "5", "type": "Feature", "properties": {"STATE_NAME": "Oregon", "summary": "<b style='font-size:13px;'>Oregon</b><span style='font-size:10px;color:#888;'> \u2014 5 programs</span><br><br>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Flex Peak</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Idaho Power Company</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Flex Peak Program is a demand response initiative administered by Idaho Power since 2015 that utilizes commercial and industrial (C&I) customers to provide utility-scale load reduction. Eligible participants must be able to offer a load reduction of at least 20 kilowatts (kW) and can participate via manual load reduction or by using load control devices for automatic dispatch. Participants receive compensation for their performance under Schedule 76, which includes nominated incentives and variable payments for events beyond a specified threshold. The program's underlying goals are to meet system capacity needs, enhance participant satisfaction, and ensure the continued success of cost-effective resources through operational refinements like updated baseline calculations and increased nomination flexibility.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Flex Peak Program, governed by Schedule 76, provides incentives to commercial and industrial customers through a combination of fixed and performance-based payments. Incentives are calculated based on a participant's load reduction nomination and actual performance during load control events. The structure includes a variable energy payment, which is an energy-based financial incentive calculated by multiplying the 'variable program kWh' (actual kW reduction multiplied by the hours of the event) by a variable energy payment rate. Under proposed changes in Docket ADV 1659, the threshold for earning these variable incentives is moving from the fifth event to the fourth event; specifically, the variable energy payment does not apply to the first four load control events. Additionally, the program includes a reimbursement incentive for customers who choose the automatic dispatch option to automate their systems, intended to offset the cost of manual reductions.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Flex Peak program is a demand response resource for commercial and industrial customers that utilizes a variety of customer means of shedding load, including automated systems. Requirements include the installation of load control devices at the metered service point, and the utility provides reimbursement for automating systems to avoid manual reductions. For load reduction verification, a baseline is used to estimate what would have occurred in the absence of an event, calculated at 110 percent of the highest use in the prior ten days. Non-performance penalties include automatic termination and a termination fee if there is evidence of tampering or interfering with the company's ability to initiate a load control event, along with the reimbursement of repair costs and the reversal of demand or energy credits for the current year.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/cc08c102-9d37-4ff1-9486-2f7c73fda1bb\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/071d07d3-d7c4-46c7-8e1d-fb56acc487c7\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/11f43f0c-f2f4-4291-b4ee-821a013609c8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Irrigation Peak Rewards</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Idaho Power Company</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Operating since 2006, the Irrigation Peak Rewards program is a utility-scale demand response initiative designed to dispatch flexible load from the irrigation customer class to provide demand capacity. Participants receive compensation through Schedule 23. The program utilizes load control devices installed on electrical panels to initiate load control events, which the company may trigger to manage system load, though they are not applied during system emergencies governed by NERC standards or Rule J. Key operational features include a minimum of three required events per season, an option for early interruption ending at 9 pm with a reduced incentive, and manual dispatch provisions for hydraulic-connected open channel systems.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Under the Irrigation Peak Rewards program (Schedule 23), compensation consists of a fixed payment provided as a bill credit and a variable payment paid by check within 70 days after the program season. The variable incentive is triggered starting with the fourth load control event. Specific rates include a fixed demand credit of $5.25 per program kW and energy credits ranging from $0.004 to $0.021 per program kWh depending on the interruption option (Standard, Extended, or Early). For the Flex Peak program (Schedule 76), which serves commercial and industrial customers, incentives are calculated based on how well participants meet their load reduction nominations relative to a baseline. Proposed changes for Schedule 76 include moving variable incentives to the fourth event and providing reimbursement for automating systems to avoid manual reduction costs.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Irrigation Peak Rewards program is classified as demand response. Eligible technology includes dispatchable load control devices connected to electrical panels or manual control for systems with at least 1,000 cumulative hp or those limited by installation configuration. Automatic dispatch requires all pumps at a metered service point be controlled and allows the company to send signals to interrupt operation. Communication is conducted via telephone, e-mail, and/or text message. Penalties for opting out of load control events include fees of $6.25 per billing kw (standard/extended) or $3.25 per billing kw (early), with potential fees for overriding dispatch device commands.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/cc08c102-9d37-4ff1-9486-2f7c73fda1bb\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/071d07d3-d7c4-46c7-8e1d-fb56acc487c7\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/11f43f0c-f2f4-4291-b4ee-821a013609c8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Wattsmart</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">PacifiCorp</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Wattsmart Battery Program is a demand response initiative operated under the provisions of Schedule 106. Its primary structure involves aggregating individual customer batteries into a coordinated distributed battery grid management system (DBGMS) to create a virtual power plant (VPP). Through this system, PacifiCorp uses software to actively manage and call upon dispatchable batteries in real time to provide grid services at scale. The program's goals are to provide cost-effective capacity benefits to the grid as identified in the 2023 Integrated Resource Plan (IRP) update. Participants receive enrollment and annual participation incentives in exchange for integrating their batteries into the DBGMS, while typically maintaining a default battery operation mode of self-consumption to provide these capacity benefits.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Wattsmart Battery program compensates Commercial and Industrial (C&I) customers through a combination of an upfront enrollment incentive and an annual participation incentive. For customers with newly purchased batteries, the enrollment incentive is $150/kW multiplied by the commitment term (initially set at four years), capped at 70 percent of battery equipment costs. During the commitment term, participants receive an annual participation incentive of $15/kW. For existing batteries or for participation following the initial commitment term, customers may receive an increased annual participation incentive of up to $50/kW. C&I customers with custom projects or large capacity batteries may be considered for custom incentives and commitment terms at the company's discretion. The enrollment incentive is issued as a direct payment, while annual participation incentives are applied as monthly bill credits toward energy charges. Participants are compensated under the provisions of Schedule 106.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The eligible technology is battery storage systems, with an initial list of six eligible batteries that includes units from manufacturers such as those found on Energy Trust's solar + storage list (though more limited due to the utility's control system). The utility requires controllability via its battery control system to manage dispatch events (typically five-minute events) and expects batteries to operate primarily in self-consumption mode to provide capacity benefits; participants are responsible for manually adjusting settings to preserve capacity during expected system outages, though the company intends to ensure these adjustments are temporary and revert back.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/6c25a39f-edb2-4dba-919d-9fc9eede0a2a\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/8b9b60f7-7d07-4fbb-9d74-45bfcd3d9d41\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Electric School Bus Pilot</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Portland General Electric</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">No description available.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">While the source material identifies that demand response and managed charging programs exist for commercial customers to reduce or shift load, it does not provide the specific compensation structure, dollar per kilowatt or kilowatt-hour rates, or the particular tariff schedules for these incentives. Specifically, the source mentions that demand response programs incentivize commercial customers to reduce HVAC and other loads during peak need, but provides no further details on the mechanics of these payments or the specific program schedules.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Not available.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/5ba8f455-cddb-45fd-a334-312af987b8be\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/669156d8-5cd9-4ee3-8a48-b29d301f1db3\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Energy Partner</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Portland General Electric</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Energy Partner program is a flexible load activity that has progressed to program status. It is described as the first activity to include modifications that incorporate a greater spectrum of flexible load, contributing to PGE's efforts to acquire additional megawatt savings. The program is part of a broader strategy to meet multi-year flexible load savings goals identified in the Integrated Resource Plan.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Under the Energy Partner program, commercial and industrial (C&I) customers receive financial payments designed to encourage participation in flexible load events. These incentives are structured as ongoing payments and can be based on a per-season, per-event, or per-kWh basis. Additionally, upfront incentives may be provided to encourage program enrollment. For commercial programs with service level impact, such as Energy Partner, the incentive level is used as a basis to calculate the 'value of service lost' at 50% of the incentive value. In the current demand response portfolio, these incentives represent 30-50% of annual program costs. Specific $/kW rates or the names of the unique schedules used for participant compensation (excluding cost recovery mechanisms) are not detailed in the provided documentation.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Eligible technologies for the Energy Partner performance-based demand response program include smart thermostats for HVAC load curtailment and custom load curtailment strategies for nonresidential sectors; specific requirements involve smart thermostat equipment for residential and small-medium nonresidential participants, while the large nonresidential category utilizes custom load curtailment strategies and reservation capacity payments without specific equipment eligibility mandates.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/5ba8f455-cddb-45fd-a334-312af987b8be\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/5520369e-6f74-4228-a57f-15fa9dd77696\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/211f623f-8ea7-47e0-a6ca-f87c199687b7\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/b1a8076f-3332-46a0-9879-e7e5d303eedd\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a> <a href= 26224], [-123.51911190158049, 41.99917385000605], [-123.65699603279533, 41.99513883585875], [-123.82203555980267, 41.99562332112094], [-124.00118751275565, 41.996149336986704], [-124.21160291059694, 41.99846262671056], [-124.27046253209105, 42.04555569594664], [-124.3142875565844, 42.06786703867798], [-124.35153334787569, 42.12979979861043], [-124.36100710561038, 42.18075637614045], [-124.38363095433019, 42.22716492779712], [-124.41097995358625, 42.25055223148871], [-124.41055315517198, 42.307436512055716], [-124.42555058745698, 42.35187977661689], [-124.43510036272329, 42.44016926500466], [-124.39905887499751, 42.539934349136075], [-124.40091106790905, 42.59752426810116], [-124.41311122032825, 42.6579402437059], [-124.45073196524551, 42.67580443846446], [-124.44840975895742, 42.689915407748735], [-124.51000803785236, 42.734752692178255], [-124.5524301707895, 42.84057425468589]]]}}, {"id": "6", "type": "Feature", "properties": {"STATE_NAME": "Missouri", "summary": "<b style='font-size:13px;'>Missouri</b><span style='font-size:10px;color:#888;'> \u2014 2 programs</span><br><br>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Business Demand Response</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Ameren Missouri</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Ameren Missouri's demand response portfolio is governed by overarching general tariffs that provide the purpose, definitions, availability, term, and description of the programs, as well as processes for changes in measures or incentives. The program templates detail specific objectives, target markets, implementation and marketing strategies, market transformation elements, and EM&V requirements. Participants receive compensation or rebates through the individual energy efficiency and demand response program tariffs, which specify the eligible measures and incentives available for each program.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Under the Business Demand Response (BDR) program, commercial and industrial (C&I) organizations receive financial incentives and lower electric bills for voluntarily reducing or shifting electricity usage during peak periods or times of grid stress. For a 'custom DR - large C&I aggregator,' specific incentive levels are identified at $25, $50, and $100 per kW. Another identified schedule for participation is 'DR - Capacity Bidding,' which is listed with a $0 per kW incentive in certain contexts. Participation in these demand response programs involves power companies cycling equipment like air conditioners and water heaters in exchange for these incentives.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The demand response potential study identifies air conditioners (AC) with remote switches as an eligible technology for direct load control (DLC), where the system operator remotely shuts off or cycles the compressor for 7 \u00bd to 15 minutes per 30-minute period (25%-50% duty cycle). While the study identifies that market participants can provide demand response through discretely interruptible or continuously controllable loads or behind-the-meter generation, it specifies that resources must be dispatchable and measurable to qualify as demand response for MISO; rate options like TOU or CPP do not meet these specific requirements.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/04377e3f-b918-4fe4-86c0-31be347d51b3\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/7562618b-b60d-460c-aba7-f24a58c1a6f6\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/4b51b92e-b82d-4e8b-9287-b635a25c7290\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/a5d58d0f-c7ef-4e43-9ec2-679f4d00de79\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Business Demand Response</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Evergy Missouri Metro</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Evergy Missouri Metro Business Demand Response Program is designed to reduce participant electrical load during peak periods to improve system reliability, offset forecasted system peaks, and provide an economical alternative to purchasing power in the wholesale market.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\"> Load Curtailment Agreements: These provide a monetary incentive based on the performance delivered by the customer or aggregator.\nFinancial incentives for peak demand reduction: These incentives are provided to encourage participation and achieve peak demand reduction under specified conditions.\nDirect or indirect incentive payments: Defined as program costs used to encourage customer and retail partner participation.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Not available.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/a202fedc-7b1b-45e2-86ec-585455e24dc0\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/processes/469231aa-0096-4621-8034-7c9fc1deeae8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 2</a> <a href=\"https://app.halcyon.io/documents/1cafa120-e1c5-45e4-9c4d-2f1e081e9a89\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/b47808ac-85f1-40b2-b85a-ec586a75b57d\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a></div>\n</div>", "count": 2, "has_data": true}, "geometry": {"type": "Polygon", "coordinates": [[[-95.76564638223086, 40.58520600359779], [-95.53318206531245, 40.58224541427047], [-95.37392395569566, 40.58032869022389], [-95.33558660670764, 40.57986735489534], [-95.20226373419682, 40.57837227529701], [-95.06891815035392, 40.57687717981167], [-94.91489572295963, 40.57491964063513], [-94.8199769587553, 40.57371360127576], [-94.63202473579274, 40.571759754725264], [-94.53387605266035, 40.57073894928902], [-94.47120553241815, 40.570959344357455], [-94.31072188325437, 40.57152394799895], [-94.23223865336128, 40.572014577637724], [-94.09108320427451, 40.572896922229475], [-94.01549033999822, 40.574073608484035], [-93.84092871189345, 40.576791251040284], [-93.77434306202075, 40.577530853839484], [-93.59735068481933, 40.579496587603536], [-93.55689530069695, 40.57966010564206], [-93.37438469711643, 40.58039755779156], [-93.34544041431596, 40.58051449252487], [-93.13580031387698, 40.58285412224695], [-93.09728950819024, 40.583823510095456], [-92.94159301325459, 40.587742605027536], [-92.7145943 ": "Virginia", "summary": "<b style='font-size:13px;'>Virginia</b><span style='font-size:10px;color:#888;'> \u2014 2 programs</span><br><br>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">BYOD Aggregation Program</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Virginia Electric and Power Company</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Bring Your Own Device (BYOD) Aggregator Access Program is a pilot project proposed as part of Phase XIV demand response and virtual power plant (VPP) initiatives. The program is structured into four individual components: residential, commercial, industrial, and vendor-managed BYOD aggregation. Its primary goal is to allow qualified aggregators to enroll customers who possess eligible distributed energy resource technologies, including electric vehicle chargers, smart thermostats, and water heaters, into a collective demand response framework.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The BYOD (Bring Your Own Device) Aggregator Access Program is a demand response pilot program targeting commercial and industrial (C&I) customers, among others. While specific $/kW or $/kWh rates and tariff schedule names are not detailed in the provided documentation, the program is part of the Phase XIV portfolio and functions by allowing participants to receive incentives for demand response activities. For related non-residential curtailment initiatives approved in previous phases (Phase XIII), medium-sized and large C&I customers receive incentives for manually curtailing energy usage during peak system demand. The Phase XIV BYOD program specifically includes the 'Commercial BYOD Aggregation Program' and 'Industrial BYOD Aggregation Program'.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Eligible technologies for the BYOD Aggregator Access pilot include electric vehicle (EV) chargers, smart thermostats, water heaters, and battery storage. For the vendor-managed pilot, participation is capped at 1,000 smart thermostats and 167 EV chargers. All programs in the BYOD Aggregator Access pilot are classified as demand response (DR). While the records indicate devices will be adjusted during peak events to achieve load reduction, specific manufacturer brands, telemetry requirements, and performance penalties are not specified.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/ce17f489-a7d0-486b-805f-89e57e535043\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/130a3cbf-e381-4cb3-b8e5-f9591b99bc97\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Virtual Power Plant Pilot Program</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Virginia Electric and Power Company</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Virtual Power Plant (VPP) pilot program is designed as a foundational framework for demonstrating distributed energy resource (DER) aggregation and real-time optimization using a Distributed Energy Resource Management System (DERMS). Its structure incorporates a stakeholder engagement process, public webinars, and feedback portals to inform program design and participation pathways. The primary goals are to reduce system-wide energy consumption and peak demand, improve air quality by reducing reliance on high-emitting resources during peak periods, and ensure equitable access for income-qualifying customers through energy efficiency and demand response measures. The pilot is subject to a total 450 MW cap and must adhere to cost-effectiveness standards requiring net system benefits. While specific schedule or tariff names for participant compensation are not detailed, the program is designed to provide incentives and rebates for qualifying measures, including potential incentives for battery storage and 'peak time rebates.'</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The compensation structure for the VPP Pilot Program is established by implementation vendors based on program design and customer engagement strategies, rather than a direct formula including avoided generation, transmission, or distribution costs. For Commercial and Industrial (C&I) customers, the current design utilizes an 80% \"cliff\" penalty, though a proposed framework would transition to a pay-for-performance structure based on average seasonal performance and enrolled kW. While specific schedules are not named, proposed performance payments for some VPP programs include $100 per kW-year (with a recommendation to increase to $150), and residential smaller C&I customers may receive fixed incentives such as $/device per year. Specifically, a residential battery storage pilot proposed an upfront payment of $1,000 and performance payments of $100 per kW-year.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The VPP and BYOD pilots are technology-agnostic, evaluating customer-sited resources such as geothermal heat pumps, load management technologies, and curtailable loads based on their ability to provide dispatchable grid services; however, bidirectional EV charging (V2G) is currently ineligible. Specific manufacturers are not named as the program allows various tools from different manufacturers, but technologies must be customer-owned, interconnected, and capable of being reliably controlled and dispatched by an approved aggregator while supporting necessary communications, telemetry, and performance measurement. Demand response and other resources must provide measurable and verifiable load reduction, with a non-performance penalty in the BYOD C&I pilot where performance below 80% of committed capacity results in the event performance being counted as zero.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/8c030491-ec3f-436c-ae60-c6bc7ae6bf8b\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/358032c9-9551-4f03-ab4e-f3f3983ff79e\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/a944ddf1-8981-4b9f-bdb6-3bf8602db2cc\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/65c1eca6-47bf-4079-b041-8230c43a37c5\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a> <a href=\"https://app.halcyon.io/documents/58afb8c5-4644-4316-ba65-66443cc36f82\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 4</a></div>\n</div>", "count": 2, "has_data": true}, "geometry": {"type": "MultiPolygon", "coordinates": [[[[-76.02346515454528, 37.28906664313981], [-75.98711267412179, 37.3685
