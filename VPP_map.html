474832479744], [-87.3195171438898, 30.317808764778604], [-87.4198579009664, 30.297122636170926], [-87.51832265843764, 30.2804294896437], [-87.45228090251491, 30.344091598561945], [-87.43178303151927, 30.40318762584887], [-87.36660019223612, 30.436637678028294], [-87.41468413942101, 30.45728364059038], [-87.44472114788748, 30.507478620020308], [-87.43144911804616, 30.5502466002907], [-87.40118806994435, 30.604377587954822], [-87.40018799392259, 30.657195559072225], [-87.44228996116833, 30.69265550236818], [-87.52361995011823, 30.73827939229858], [-87.54226692588269, 30.76747534886002], [-87.63494176777827, 30.86585116392876], [-87.59206275578497, 30.951454125692347]]]]}}, {"id": "13", "type": "Feature", "properties": {"STATE_NAME": "Illinois", "summary": "<b style='font-size:13px;'>Illinois</b><span style='font-size:10px;color:#888;'> \u2014 3 programs</span><br><br>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">EV School Bus Virtual Power Plant (VPP) Pilot</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Ameren Illinois</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The EV School Bus Virtual Power Plant (VPP) Pilot is a formal pilot program under Ameren's Beneficial Electrification (BE) Plan 2, managed within the general pilots budget. The program is designed to test and demonstrate technical implementation of electric vehicle technologies that can benefit utility operations and customers over a three-to-five-year period. Its goals align with Sections 45(d)(5) and 45(d)(7) of the EV Act, focusing on technical demonstration efforts and providing benefits to customers through proven technologies. While the pilot follows a vetting process for stakeholder visibility regarding outcomes, the specific participant-facing compensation schedule or tariff name is not identified in the provided excerpts, which focus on the pilot's inclusion in the general pilots budget and its alignment with regulatory objectives.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Staff recommended that Ameren consider structuring financial incentives as grants or vouchers instead of rebates. Ameren agreed to explore the use of grants and rebates during the pilot design phase and to consider upfront incentives and other methods to address funding gaps in its future BE Plan 3.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The source material identifies the EV school bus VPP pilot as an eligible program but does not provide a specific list of technology types, manufacturers, telemetry requirements, controllability requirements, or demand response penalty conditions.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/b668a36e-0d08-42ad-afee-e407624fb893\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/processes/b8a9291e-ad3d-429f-8f3c-bfe852e57d18\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 2</a> <a href=\"https://app.halcyon.io/documents/1b1b8d11-7660-451a-81bf-7ba1b8b07c6b\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/d72e7d0b-e36a-4fec-aa93-8ddecc8fdbcc\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/41844206-4d18-4779-8523-d56a78dcb6e3\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Bring Your Own Device Load Reduction Program (Rider BYODLR)</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Commonwealth Edison Company</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Rider BYODLR (Bring Your Own Device Load Reduction) is designed as a Virtual Power Plant (VPP) initiative to maximize grid benefits by leveraging customer-owned distributed energy resources. The program's goals include establishing clear use cases and dispatch strategies while encouraging participation pathways for both individual customers and aggregators, including integration with existing original equipment manufacturer (OEM) initiatives. Enrollment in the program provides an incentive of $60/kW-year for the five-year period of 2027-2032, as specified in the TSLR program enrollment incentive within the Rebuttal Rider BYODLR Informational Sheet. Participants receive compensation under the terms set forth in Rebuttal Rider BYODLR, while cost recovery for the program is separately managed through proposed amendments to Rider DG Rebate Adjustment.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Under the Bring Your Own Device Load Reduction (BYODLR) Program, also known as Rider BYODLR, participating customers receive a one-time enrollment incentive of $30, with a higher rate of $50 for low-income customers. Additionally, participants receive annual performance incentives of $30 per kW of average annual peak reduction. While the excerpts mention these specific rates and the use of 'Rider BYODLR' for program terms and conditions, they do not provide specific $/kW or $/kWh rates or distinct payment mechanisms designated specifically for Commercial and Industrial (C&I) customers.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The program utilizes programmable devices that regulate a fully functional electric central heating ventilation and air conditioning (HVAC) system used as the principal air conditioning source. These devices must be approved by ComEd and must be capable of being controlled remotely via communication by ComEd or an Approved Device Load Reduction Program Provider (ADLRPP). While participants must agree to allow ComEd or an ADLRPP to control the approved devices during events, they retain manual control of the smart thermostat; there are no non-performance penalties, although certain behaviors can result in program removal and a one-year re-enrollment prohibition.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/c64830be-24f4-4aec-973c-6cc8f85c3587\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/9d9fd857-6ef7-4e83-b564-26615141493a\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/1cc2b34b-12a6-4bae-8732-2737e0e29abc\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Virtual Power Plant Program (Rider VPP)</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Commonwealth Edison Company</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Commonwealth Edison Company program, referred to as the 'Bring Your Own Device' (BYOD) VPP program or Rider BYODLR, is designed as a demand response initiative to maximize grid benefits by utilizing customer devices. Its underlying goals include establishing pathways for aggregator participation and articulating clear use cases and dispatch strategies to provide value to the grid. Participants receive compensation through enrollment and participation incentives under Rider BYODLR. These incentives are further detailed in the associated BYODLR informational sheet. The program's implementation is subject to a cost-effectiveness evaluation scheduled for late 2026, which requires that quantitative and qualitative benefits outweigh program costs.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Rider VPP incentive level is set at $10/kWh. Customers in the VPP program receive a form of capacity benefit by reducing their peak load contribution charge.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The BYODLR program initially offers smart thermostats as the eligible device for air conditioning load reduction; devices must be ComEd-approved, able to be controlled remotely by ComEd or an ADLRPP via communication, and used with central HVAC systems. Smart thermostats are classified as demand response devices distinct from the VPP program. For demand response (STLR/BYODLR), devices must be controllable by ComEd during summer events (May-October, 9 am-9 pm CPT), and while no monetary non-performance penalties exist, interference or certain behaviors can lead to program removal and a one-year re-enrollment prohibition.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/c64830be-24f4-4aec-973c-6cc8f85c3587\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/3fcb6fe5-f349-4bd6-89b2-03f9803aea62\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/9d9fd857-6ef7-4e83-b564-26615141493a\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/1cc2b34b-12a6-4bae-8732-2737e0e29abc\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a> <a href=\"https://app.halcyon.io/documents/10d38310-d9ca-4c07-af39-0329858f53c5\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 4</a></div>\n</div>", "count": 3, "has_data": true}, "geometry": {"type": "Polygon", "coordinates": [[[-91.5062611762181, 40.20015231561616], [-91.49695717028685, 40.24870103062586], [-91.49289067363893, 40.269920143730424], [-91.46965568020575, 40.322406129134556], [-91.41942171363739, 40.37826115060824], [-91.37292078051784, 40.39910518833371], [-91.37990671018835, 40.452107211725384], [-91.36787559437998, 40.51047630353836], [-91.39447435589395, 40.534540349915645], [-91.37425101338728, 40.58258760213067], [-91.33971786085493, 40.613485860334684], [-91.24784993800635, 40.63838834569882], [-91.18697905530613, 40.63729530427299], [-91.18545966264143, 40.638110121001965], [-91.12081905270568, 40.67277546954499], [-91.11822190762321, 40.699533270758536], [-91.1157338924935, 40.72516676324761], [-91.09170198372918, 40.77970683699076], [-91.09299206507245, 40.821077784152884], [-91.04465240404426, 40.86835477268676], [-90.98546174339482, 40.91213982200948], [-90.95223283490395, 40.95404582497381], [-90 .41778299983057], [-115.69293249262894, 47.45723599805641], [-115.63468652756843, 47.48175891588777], [-115.71702652549766, 47.53269202281258], [-115.72120946653791, 47.57632197418332], [-115.69428634161385, 47.62345888602884], [-115.73627239573916, 47.65476088857604], [-115.72377230473546, 47.696669823877066], [-115.83536738254533, 47.76095579654817], [-115.84547586747966, 47.81496551943606], [-115.90093590865985, 47.843062466964724], [-115.95994797166844, 47.89814032437119], [-116.03075309458235, 47.97334712269836], [-116.03856790292407, 47.98463234005621], [-116.04915504647109, 47.99992103175713], [-116.04891241983368, 48.124927134143356], [-116.0489302107317, 48.21612442724655], [-116.04894837687588, 48.309843354895904], [-116.04915418595873, 48.481243695288484], [-116.04915557797503, 48.50203921977776], [-116.0491950348983, 49.00090967152181]]]}}, {"id": "15", "type": "Feature", "properties": {"STATE_NAME": "Minnesota", "summary": "<b style='font-size:13px;'>Minnesota</b><span style='font-size:10px;color:#888;'> \u2014 5 programs</span><br><br>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Capacity Connect</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Northern States Power Company</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Capacity*Connect Phase 2 is an energy storage system pilot project and Virtual Power Plant (VPP) designed as a learning phase to assess the technical and economic effectiveness of its operations. The program's primary objective is to target and deliver bulk system benefits through participation in MISO (Midcontinent Independent System Operator). Operatively, the program utilizes distribution-connected battery energy storage systems (BESS) that are dispatched at the bulk system level. A key structural goal is the strategic siting of these BESS on feeders with peaks aligned with system peaks to capture coincident distribution benefits. The Commission approved a deployment range of 50-200 MW for this phase, with an estimated budget of $152-$430 million. To maximize learnings, the utility is required to file an interim program assessment involving independent third-party verification within 180 days of reaching 50 MW of commercial operation or two years from approval.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Under Xcel Energy's demand response initiatives, commercial and industrial (C&I) customers receive compensation through several programs. The Electric Rate Savings (Peak Control) program provides a monthly discount on demand charges, with participants saving as much as 50% annually, and is served under Peak Controlled Service and Peak Controlled Time of Day Service tariffs, with additional discounts via the Tier 1 Energy Controlled Rider. The Peak Partner Rewards program offers bill credits for reducing usage by at least 25 kW during peak periods, including additional credits for meeting agreed-upon reduction amounts. The Peak Day Partners program provides incentives through a bid-offer process for peak load reduction. The Peak Flex Credit Pilot (A28 rate) provides pricing for peak control events and buy-through options for economic control events. For the forthcoming Battery Connect program, small commercial customers will earn incentives for granting access to on-site battery energy storage systems (BESS) for demand management. While the Capacity*Connect program's budget ranges from $152 - $430 million for 50-200 MW of capacity, the source material does not specify exact $/kW or $/kWh rates for Capacity*Connect participants.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The provided documentation states that all program assets must meet characteristics and specifications set out in the relevant Project Statement of Work (PSOW) and technical specifications for each project will be provided in the applicable Statement of Work (SOW), but it does not list specific eligible technology types, manufacturers, telemetry requirements, or demand response penalty conditions.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/a517be31-f7c6-436e-9ee6-221ef5656d1c\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/f27fecde-61ad-4cb4-8c39-e33ef002705e\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/767c9205-9138-43c4-8550-ef1bbbfa834a\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/318a02a7-8ad2-439d-ab8c-bd628cdac770\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Large Peak Controlled Time of Day Service</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Northern States Power Company</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Large Peak Controlled Time of Day Service (rate code axx) is a tariff within a new 'very large customer' class designed for customers with demands of 100 MW or greater, or customers with loads of 20 MW or greater determined to be 'system intensive.' The program's structure requires participants to execute an Electric Service Agreement (ESA) and an interconnection agreement. Under this service, data center customers are exempt from the Conservation Improvement Program (CIP) but may participate in interruptible, discounted rates through revisions to the Tier 1 Energy Controlled Service rider. The goal is to allow loads to be curtailed during peak demand or high energy prices, providing discounted rates to reflect cost savings from the customer's willingness to reduce consumption. To protect other ratepayers from stranded costs, the program requires an exit fee and capacity reduction fee based on no less than 80 percent of contract capacity, and an Incremental Cost Test (ICT) is utilized to ensure revenues from the customer exceed the incremental costs of service.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Under Xcel Energy's (Northern States Power Company) proposal in Docket 25-289, the Large Peak Controlled Time of Day Service (LPCTODS) rates would initially align with general Time of Day (TOD) rates. In these initial filings, the split between demand and energy charges is calculated according to Xcel's proposal for the Commercial and Industrial (C&I) demand class. While specific $/kW or $/kWh incentive rates for the LPCTODS schedule are not detailed in the provided materials, participants are compensated or charged through a structure where sales and revenues are included in the C&I demand class revenue requirement. Subsequent cost allocations for these customers are intended to follow traditional Class Cost of Service Study (CCOSS) methods, though the proposal specifies that no costs will be directly assigned to the LPCTODS sub-class in the CCOSS, treating all resources as system resources.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">While specific manufacturers and technology types like thermostats or water heaters are not listed, the service applies to data center facilities (100 MW or greater) using information technology and network telecommunications equipment; the program requires the installation of and company control over interrupting equipment at the transmission level, with demand response objectives including economic curtailment when production costs exceed $70 per MWh or during system emergency events.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/4e9bf59b-0ded-4829-b138-b68c71d1f06e\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/e05e39a2-d8f0-493f-9d1e-dc2659b92a7a\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/2031d391-0646-49ff-afde-642ee37aa2e6\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Controlled Service Deferred</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Otter Tail Power Company</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Controlled Service - Deferred Load Rider is applicable to both residential and non-residential customers with approved, permanently connected thermal storage deferred loads. Participants in this program take service under a structure where energy is delivered only during off-peak hours between 10 p.m. and 6 a.m. The primary goal of the program is peak demand reduction, specifically focusing on reducing total winter peak load and system capacity needs. It serves as a tool for managing the electrical grid and reducing customer costs by avoiding the purchase of higher-priced energy.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Commercial and industrial customers participating in the controlled service \u2013 deferred load rider receive financial incentives through a combination of discounted rates and equipment rebates. The program is applicable to non-residential service for approved permanently connected thermal storage deferred loads. While the specific $/kW or $/kWh rates for the discount are not detailed in the provided documentation, the compensation is structured as a method for customers to avoid the purchase of higher-priced energy by allowing the company to manage the electrical system through load control.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Controlled Service \u2013 Deferred Load\nRider is applicable to both residential and non-residential service for any\napproved permanently connected thermal storage deferred loads.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/34bf9fa2-6bb9-4257-9c84-80d0680201ce\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/processes/ac3854a5-7ffe-4aee-abe2-ba90fb5ff5d8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 2</a> <a href=\"https://app.halcyon.io/documents/855215cf-d72d-4af7-a1b3-e0a90f6de524\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Controlled Service Interruptible</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Otter Tail Power Company</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Otter Tail Power Company's activities in this docket are conducted under the Energy Conservation and Optimization (ECO) program, which aims to achieve a 1.75 percent energy savings goal. The program incorporates behavioral projects where energy savings are calculated using the Average Savings Method (ASM) with a three-year minimum lifetime. Compensation and program-related adjustments are administered through the Section 13.02 Energy Conservation and Optimization (ECO) Rider rate schedule.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Under the Industrial Focused Efficiency program, Otter Tail Power funds the cost of engineering studies required to identify energy savings opportunities, with participants providing a $500 copay. Incentives for commercial and industrial participants include potential bonus incentives provided in exchange for completing efficiency measures before established deadlines. While specific $/kW or $/kWh rates for the Controlled Service Interruptible program are not detailed in the provided excerpts, the company attributes savings from efficiency measures to its commercial and industrial focused efficiency program, which may include projects traditionally accounted for under prescriptive rebate programs.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Eligible technology types for load management include electric vehicle charging and systems under qualified off-peak rates where energy is delivered only between 10 p.m. and 6 a.m.; while the program is identified as demand response, no specific manufacturers, telemetry hardware, response times, or non-compliance penalties are detailed in the provided materials.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/34bf9fa2-6bb9-4257-9c84-80d0680201ce\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/processes/ac3854a5-7ffe-4aee-abe2-ba90fb5ff5d8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 2</a> <a href=\"https://app.halcyon.io/documents/855215cf-d72d-4af7-a1b3-e0a90f6de524\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Controlled Service Off Peak</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Otter Tail Power Company</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The load management program aims to manage the electrical system and avoid the purchase of higher priced energy by targeting residential and commercial customers. Structure includes the Controlled Service \u2013 Deferred Load Rider, which is applicable to permanently connected thermal storage deferred loads for residential and non-residential service. Under this rider in 2024, customers were controlled for 40 days, totaling over 75 hours. Additional components include a Fixed Time of Service rider delivering energy between 10 p.m. and 6 a.m. for eligible electric thermal storage systems, and a qualified off-peak rate for electric vehicle charging during the same time period. Participants receive financial incentives through equipment rebates and discounted rates.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Commercial and industrial customers receive compensation through discounted rates and equipment rebates. Specific schedules identified for compensation include the 'controlled service \u2013 deferred load rider' (applicable to permanently connected thermal storage loads), the 'fixed time of service rider' (where energy is delivered only between 10 p.m. and 6 a.m.), and the 'controlled service \u2013 interruptible load self-contained and current transformer (CT) metering rider' (dual fuel riders). While the program focuses on financial incentives such as discounted rates to avoid higher-priced energy and manage system capacity, specific $/kW or $/kWh values are not provided in the source materials.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Eligible technologies for fixed time of service include electric thermal storage central or room heating, underfloor electric cable or panel, boilers associated with underfloor hydronic heat storage, and electric vehicle charging; energy for these systems is delivered only between 10 p.m. and 6 a.m. via qualified off-peak rates. Thermal storage customers take service on a controlled service - deferred load rider where loads must be permanently connected and are subject to utility control, with no specific manufacturers, telemetry hardware, or non-compliance penalties described.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/34bf9fa2-6bb9-4257-9c84-80d0680201ce\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/processes/ac3854a5-7ffe-4aee-abe2-ba90fb5ff5d8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 2</a> <a href=\"https://app.halcyon.io/documents/855215cf-d72d-4af7-a1b3-e0a90f6de524\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a></div>\n</div>", "count": 5, "has_data": true}, "geometry": {"type": "Polygon", "coordinates": [[[-97.22904108065204, 49.000689730553084], [-96.93096063243459, 48.99998591542297], [-96.4054161725976, 48.999987085590675], [-95.97539663922923, 48.999985776094825], [-95.34097089276476, 48.99874415130604], [-95.31989597343906, 48.9987625644414], [-95.15372057462129, 48.99890787325514], [-95.15332361918122, 49.18488459806597], [-95.15334803629997, 49.30929153397627], [-95.153314, 49.384358], [-95.05842311413343, 49.35317550672111], [-94.98892733662971, 49.36890320080067], [-94.95213003587043, 49.36868556510766], [-94.87847159000452, 49.33320030878934], [-94.81623882647568, 49.320994941961644], [-94.79725834585825, 49.21429210875446], [-94.77424055188615, 49.12500215383797], [-94.7502330154849, 49.09977134692506], [-94.71894187479752, 48.999999211972046], [-94.68307578908565, 48.883935999333055], [-94.68568680297739, 48.840125510085436], [-94.69431671010217, 48.789357964280306], [-94.61901303426075, 48.737379179280765], [-94.50886377280894, 48.70036656553313], [-94.44660536891213, 48.6929045047275], [-94.43020260225111, 48.69831332941942], [-94.38884920265431, 48.71194964260571], [-94.28179761212407, 48.70525962970345], [-94.2511693312241, 48.68351849934625], [-94.25019117085164, 48.65632732589921], [-94.09124382751446, 48.64367317052344], [-93.92700313984416, 48.631223946851684], [-93.84400665052196, 48.629398826953675], [-93.8052679475906, 48.57030234533919], [-93.8151756409 e Electric Distribution System Support Services (EDSSS) pilot is a two-year framework established under the DRIVE Act (PUA \u0010 7-1005). Its goal is to test new forms of electric distribution system support, encourage innovation, and attract participation from customer-side distributed energy resources, such as renewable on-site generating systems. The program is designed to compensate these resources for providing support services to the distribution system and to evaluate whether a permanent DRIVE program is in the public interest. While Baltimore Gas and Electric Company (BGE) identified Rider 15 Demand Response Service and Rider 26 Peak Time Rebate as specific schedules for their proposal to transition existing programs into the DRIVE pilot, the source materials do not provide the specific name of a compensation schedule, tariff, or payment rates for The Potomac Edison Company, noting only that its filing was 'narrower'.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The provided materials do not specify the exact $/kW or $/kWh rates or the specific schedule names for The Potomac Edison Company's EDSSS Pilot. However, the documents indicate that the DRIVE Act framework for EDSSS pilots involves providing compensation to distributed energy resources (DERs) for supporting the electric distribution system through third-party aggregators, customer incentives, and other programmatic expenditures. The framework is intended to compensate participation or services rather than financing utility-owned infrastructure. For resources potentially migrating from the EmPOWER program, it is recommended that costs be expensed in the year incurred, with any deferred amounts receiving carrying costs capped at the utility\u2019s average cost of outstanding debt.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The EDSSS Pilot includes Battery Energy Storage Systems (BESS), bidirectional capable electric vehicles (EVs), and non-residential aggregation; specific manufacturers include Tesla Wall Connector and General Motors (via SMECO integrations) and third-party vendors (TPV) for DERMS capabilities to orchestrate dispatch; requirements include nameplate capacity, duration, and operational characteristics (e.g., export capability, solar pairing) for data collection, with performance incentives based on event participation and nameplate characteristics; non-performance is addressed by basing incentives on actual DER performance and participation metrics over semi-annual periods.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/cd4e235c-3333-40fa-b968-57c9c7cb4768\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/aa2c46df-0ec3-443f-b05b-33e5fb7a2248\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/d0e3e2e3-08cb-493b-8c58-ad99bd22f5b2\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/df23dd37-b92e-4f20-9c4e-f4c482aac177\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a> <a href=\"https://app.halcyon.io/documents/35d4f6fb-ee85-4d7b-83b7-4b37d6cb465e\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 4</a> <a href=\"https://app.halcyon.io/documents/eaa0e9ba-43b1-4ba9-8c0c-a9cf177d1d74\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 5</a></div>\n</div>", "count": 1, "has_data": true}, "geometry": {"type": "MultiPolygon", 39.60133707189761], [-78.02762724745774, 39.62065602371701], [-78.08225830718389, 39.67116601803694], [-78.22507366401024, 39.65887781058901], [-78.31303168059836, 39.631000722792], [-78.33278669450786, 39.62852730194985], [-78.38295765404806, 39.62224566229921], [-78.43817758316953, 39.563523646354966], [-78.46094954251623, 39.525986651945765], [-78.46826813644651, 39.52622391705854], [-78.59065232675344, 39.5301914129402], [-78.65503438324156, 39.54438150893643], [-78.7070961325147, 39.55585615832093], [-78.73904824967663, 39.60969612676192], [-78.771138358836, 39.638386104868815], [-78.85101409166295, 39.55404290849445], [-78.94261597405779, 39.47961271797987], [-78.95674916224844, 39.44026278103333], [-79.03562101987802, 39.4733425958036], [-79.06744544875814, 39.47280726887647], [-79.09132705616676, 39.47240555023189], [-79.16649534357802, 39.40088666519492], [-79.26239071774494, 39.32624264273948], [-79.28372169370418, 39.309638888140476], [-79.35374892602839, 39.27803809929369], [-79.42441221740086, 39.22817039720067], [-79.48687240019301, 39.20596056280304], [-79.48437104057912, 39.344298965983704]]]]}}, {"id": "17", "type": "Feature", "properties": {"STATE_NAME": "Iowa", "summary": "<b style='font-size:13px;'>Iowa</b><span style='font-size:10px;color:#888;'> \u2014 2 programs</span><br><br>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Smart Hours</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Interstate Power and Light Company</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Within the demand-side management and demand response framework for the electric utility, participants receive compensation or incentives under Schedule A2. The 'Smart Hours' initiative includes specific components for non-residential prescriptive incentives, residential switch-based incentives, and administrative support for both smart hours and switch-based programs.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Under the Smart Hours program, compensation for non-residential customers includes specific incentives for smart device participation and behavioral demand response. In the load management category, which involves interruptible service, commercial and industrial customers receive compensation in the form of interruptible discounts. For 2025, these discounts for approximately 136 participating customers totaled $27,641,295.17, which, after accounting for $373,689.91 in penalties, resulted in a net payment of $27,267,605.26. The program also utilizes a specific 'Interruptible Customer Charge' formula which, for the period of June through December 2026, is set at a monthly charge of $15.60 per customer.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The program is categorized under demand response. The available excerpts do not specify eligible technology types, manufacturers, telemetry, controllability requirements, or non-compliance penalties, but they identify relevant components as residential switch-based incentives, non-residential SmartHours incentives, and SmartHours switch-based and smart hours administration.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/dbcec671-db9e-4f62-9094-341eec87485d\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/ac7b3d15-6f91-4cc0-ad6a-6e55c4e7f7f5\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Nonresidential Load Management Program</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">MidAmerican Energy</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">\"MidAmerican\u2019s Nonresidential Load Management Program provides\nlarge nonresidential customers, that have a minimum of 200 kilowatts of curtailable load, with\nfinancial incentives to reduce demand during system peak conditions. Eligible customers must\ncommit to providing a specified amount of load reduction when notified by MidAmerican during\none of the curtailment participation periods: summer-only (June 1 to September 30) or year-round\n(June 1 to May 31).\"</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">MidAmerican Energy's nonresidential load management program compensates large nonresidential customers through financial incentives known as Rider CS credits. The incentive amounts are based on dollars per contracted kilowatt ($/kW) of demand reduction, rather than actual achieved reduction, provided the customer meets their contractual commitment. The approved rates are $30/kW for summer-only participation (June 1 to September 30) and $60/kW-year for year-round participation (June 1 to May 31). Payment occurs at the end of the curtailment season following MidAmerican\u2019s performance evaluation. If a customer achieves less than their contracted load reduction, they receive a payment equal to the percentage of curtailment achieved for all events; if they meet or exceed the contracted amount, they receive 100 percent of the incentive.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The program is classified as demand response. While specific manufacturers and technology types for the nonresidential program are not detailed, eligible participants include customers with loads of at least 100 MW (through aggregators) and those capable of curtailment. The utility requires controllability through direct load control or manual curtailment, but aggregators now compete by promising fewer events and no penalties, whereas the utility-led program traditionally involves penalties that aggregators avoid.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/50c4cf5b-771e-4987-ac2d-25187433e35a\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/processes/c1e7d1a6-a454-4cb9-95f8-8398672d4af2\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 2</a> <a href=\"https://app.halcyon.io/documents/0247135e-7ad5-4ca9-a76e-7bc01f47610d\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/e3d07c3a-789a-412e-870a-ea550a2da7d8\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/03913120-004d-4dc2-a64b-a11742e1328d\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a></div>\n</div>", "count": 2, "has_data": true}, "geometry": {"type": "Polygon", "coordinates": [[[-96.62187683345013, 42.77925392014865], [-96.57793890717956, 42.827643928708035], [-96.53785303578856, 42.878473929489616], [-96.54047451620664, 42.90859462059805], [-96.54169125678207, 42.92257491954488], [-96.5003103557145, 42.95938991565884], [-96.520248483611 n. The program structure involves creating virtual power plants (VPPs) by deploying a diverse mix of distributed energy resources (DERs) and customer products\u2014including smart thermostats, residential energy storage batteries, building control systems, and heat pumps\u2014in existing residential and commercial buildings. The program's goals include unlocking 1-2.25 megawatts of demand flexibility, achieving 440-900 MWh in annual energy efficiency savings, and reducing annual emissions by 320,000-650,000 pounds of CO2 equivalent. Additionally, the program aims to demonstrate how buildings can support decarbonization, resiliency, and equity by recruiting 50-75 residential customers (including low-income and named community members) and 25-50 commercial customers to test scalable solutions for shifting peak load and alleviating system constraints.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Commercial and Industrial (C&I) customers receive two primary forms of compensation: an annual capacity incentive and a performance incentive. The performance incentive is based on the demand flexibility achieved during a specific event. These payments can be forfeited for an individual event if the customer opts out through the EDO user interface. Specific $/kW or $/kWh rates for the C&I package are not detailed, though other residential battery participants receive up to $400/kW as a one-time incentive and up to $15/kW annually. The source material does not identify a specific tariff schedule name for these payments, but notes they are funded via a $300,000 customer incentive budget from DOE grant funds.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Eligible technologies include smart thermostats (specifically ecobee models), heat pumps, energy storage battery systems, controllable electric vehicle (EV) charging stations, building control systems, and energy efficiency measures. Requirements include the installation of an EDO gateway device for commercial/industrial customers, and all participants must have internet service and agree to a 36-month term. For demand response, Avista controls assets to flex demand during events lasting 2-8 hours; residential and small business customers who opt-out of more than three events in a calendar year are prohibited from receiving the annual opt-out bonus, while commercial and industrial customers who opt-out via the EDO user interface are not paid a performance incentive for that event.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/4dfa33f3-bf33-45c4-b43a-77afc71f4231\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/76773615-5903-46e8-b15a-b8ac7408c0fa\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Irrigation Load Control</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">PacifiCorp</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The PacifiCorp Irrigation Load Control program is an ongoing demand response program designed to meet capacity and energy grid needs by curtailing irrigation pump loads. The program utilizes load control devices with integrated 4G (LTE) cellular metering chips to validate pump operation and successful curtailment in near real-time, providing participating customers with access to energy usage data through a web portal. Participants choose between three notice periods for load control events\u201422.5 minutes, 1 hour, or 1 day\u2014with annual incentive payments scaled at $45/kW, $30/kW, and $18/kW, respectively. These incentives are based on measured available load and adjusted for non-performance or opt-outs. Managed by vendor Connected Energy, the program targets pumps with the highest connected loads and operates as a complement to other time-of-use pilots; however, customers are restricted to enrolling in only one such program per meter. Program changes are managed through Schedule 106.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Participants in the Irrigation Load Control program are compensated based on a site-level average available load for curtailment during program hours, adjusted for any opt-outs or non-performance during load control events. Annual incentive payments are structured as $/kW rates based on the participant's selected advance notice period: $45/kW for 22.5-minute notice, $30/kW for 1-hour notice, and $18/kW for 1-day notice. Incentives are delivered as billing credits, though reduced or zero credits may be issued if customer pump operations do not contribute to load reduction objectives during program hours. The provided materials do not identify a specific schedule or tariff name for these payments.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Eligible technology types include pumps, smart thermostats, and water heaters.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/dc3bbcc5-ad98-4b20-97b7-ee9b5fafc08c\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/fd56dc48-ca4d-41b0-b7b3-af9f39324c6a\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/2b7a388f-3172-4f92-93cb-de0dd1c3aea7\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/a09e8d18-f8e3-49cf-9106-b090dcc82478\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Wattsmart</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">PacifiCorp</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Wattsmart Battery program is a demand response initiative designed to achieve approximately 9 MW of battery demand response in Washington by 2030. The program provides incentives for residential and commercial customers to enroll battery equipment, with participation targeting 9,000 cumulative kW by 2030. Enrollment incentives are calculated based on the kW capacity and commitment term (e.g., $150/kW per year of commitment), while ongoing annual participation incentives are offered both during and after the commitment term. For customers facing high upfront costs, the program may offer a lease-type agreement where PacifiCorp works with qualified trade-allies to install and maintain batteries. The program is administered under Schedule 106, with cost recovery occurring through Schedule 191.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Commercial customers in the Wattsmart Battery program receive compensation through a combination of an up-front enrollment incentive and ongoing participation credits. Enrollment incentives are paid as a direct payment following eligibility and installation verification, while annual participation incentives are distributed as monthly bill credits. For commercial batteries, the enrollment incentive is up to $150/kW multiplied by the annual commitment term (initially four years). During the commitment term, the annual participation incentive is up to $15/kW, which increases to up to $50/kW after the initial term. Customers with pre-existing eligible batteries may start directly at the $50/kW annual credit level. Custom participation equipment utilizes custom incentive rates. The program is available to retail tariff customers taking service under electric service schedules listed on Schedule 191 \u2013 System Benefits Charge.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Eligible technologies include utility-grade residential and commercial batteries with a minimum of 4 kW / 10 kWh, a 10-year warranty, and 7,500 battery cycle life. Specific manufacturers are not listed, but they must be willing to integrate into the company\u2019s DBGMS and meet equipment eligibility. Requirements include a reliable internet connection and wi-fi, UL or equivalent safety certifications, and full dispatch control by PacifiCorp for daily load cycling, frequency response, and other grid services. The program is classified as demand response, and customers opting out of participation after their commitment term will have their annual participation incentive pro-rated.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/d3689c1b-4f8f-410e-8dcb-cc422ef4875f\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/25af25b0-fb9f-4f0d-93cb-e87e26cd85a1\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/c4815669-6dd0-4b83-b07b-247b83fdb4ef\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/2540fb1c-e773-4380-9896-5a570e235cf4\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a> <a href=\"https://app.halcyon.io/documents/7a0d18cd-7d76-4000-a892-f6179d372289\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 4</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Flex C&I</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Puget Sound Energy</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The program (identified as the Commercial Demand Response or Flex Business program) allows electric customers to earn incentives through a dual-enrollment structure consisting of a Peak Program and an Emergency Program. Under this structure, participants earn a $25 base payment plus a $10 bonus per season for the Peak Program (totaling up to $70 annually) and a $25 base payment plus a $5 bonus per season for the Emergency Program (totaling up to $60 annually). Demand response events are limited to summer (May 1 \u2013 September 30) and winter (November 1 \u2013 March 31) windows. Participants can earn up to $130/kW annually for their participation.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Flex Peak program provides commercial and industrial customers with both fixed and variable cash incentives paid via check or bill credit within 45 days of the season ending September 15. The fixed capacity payment is based on a tiered structure where participants' average energy reduction is divided by their committed reduction to determine a seasonal performance percentage. Rates for this fixed payment range from $0.81/kW for performance up to 24.99% to $3.25/kW for performance between 75% and 120%. If participants exceed their committed reduction, they can earn up to 20% more than the original payment. Additionally, a variable payment of $0.20/kWh is offered for each event called after the fourth event of the season, calculated by multiplying the kilowatts reduced by the event duration in hours. Incentives are paid based on the availability of load reduction, regardless of whether a dispatch event is actually called. The documentation does not specify a specific tariff or schedule name for this program.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Eligible technologies include smart thermostats (specifically ecobee), electric resistance water heaters, and heat pump water heaters (HPWHs) from various original equipment manufacturers (OEMs). For demand response programs such as Flex Smart, PSE requires automated controllability to adjust temperature set points by a few degrees during events.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/ea3f2dd8-cc80-4e49-b390-c4d24d1eb360\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/63f48f50-5e29-4dc5-8bfa-014f934d5bd6\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/ae30635b-e3bd-443f-b228-00043f25be71\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Flex Smart</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Puget Sound Energy</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Flex Smart is a demand response program designed to provide energy benefits to Puget Sound Energy (PSE) customers, with specific equity objectives to deliver 30% of energy benefits to named community customers and 6% to deepest need customers. The program design incorporates smart technology, and PSE has investigated strategies to eliminate participant costs by developing a device provisioning program for equipment such as smart thermostats or EV chargers. Evaluated alongside other residential offerings like Flex Events and Flex Rewards, the program\u2019s performance is measured by the megawatt (MW) contribution to PSE's overall portfolio. For 2025, program management intends to pursue cross-promotion with energy efficiency programs and develop partnerships with community-based organizations to increase and retain participation.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The compensation structure for the Idaho Power Flex Peak program provides cash incentives to C&I customers via check or bill credit within 45 days after the season ends. Participants qualify for a tiered fixed capacity payment rate based on their average season performance percentage: $3.25/kW (75%-120%), $2.44/kW (50%-74.99%), $1.63/kW (25%-49.99%), and $0.81/kW (up to 24.99%). Total incentives are calculated by multiplying the average energy reduction by the fixed payment rate and the number of weeks in the season. If participants exceed their committed reduction, they can earn up to 20% more. Additionally, a variable payment of $0.20/kWh is offered for each event called after the fourth event of the season.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The program currently utilizes smart thermostats and has plans to include electric water heaters and batteries; participating technologies are implemented through Autogrid/Uplight with end-use demand reduction events limited to a maximum of four hours.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/ea3f2dd8-cc80-4e49-b390-c4d24d1eb360\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/63f48f50-5e29-4dc5-8bfa-014f934d5bd6\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a></div>\n</div>", "count": 5, "has_data": true}, "geometry": {"type": "MultiPolygon", "coordinates": [[[[-123.23714807625772, 48.68346596041738], [-123.07042677981566, 48.69997076355319], [-123.01969875550485, 48.721311725499255], [-122.97951926116907, 48.781701796672834], [-122.93792583004915, 48.790314839556586], [-122.81843637595074, 48.74462877469603], [-122.74304896058017, 48.66199066259604], [-122.79900951850333, 48.60468258460224], [-122.77120525754135, 48.56242552692779], [-122.77912288677801, 48.5089104509119], [-122.81791086016898, 48.4838874767667], [-122.80351993499337, 48.42874760323582], [-122.87413397437636, 48.418195635477865], [-122.92800295972914, 48.439965588539806], [-123.03915505782386, 48.46000261483593], [-123.14147736080926, 48.505290721147276], [-123.20267976955809, 48 ation or rebates for participation under Schedule: Demand Side Management Cost Recovery Rider (DSM).</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The specific compensation structure and incentive rates (in $/kW or $/kWh) for the Business Peak Performers program are not detailed in the provided materials; however, the program is identified as a demand response offering for business customers. Participants receive rebates for participation, with specific requirements and terms displayed on the company website. The Demand Side Management Cost Recovery Rider (DSM Rider) is the mechanism used to recover costs, but the excerpts do not name a separate participant compensation schedule beyond referring to the programs as part of the DSM portfolio.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The Public Service Company of Oklahoma's Business Peak Performers program is classified as a demand response program; however, the source material does not provide a specific list of eligible technology types, manufacturers, telemetry requirements, or performance penalties.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/f72936fe-c030-4559-955c-12b99e9122b9\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/4b3de325-64c5-4aae-82e7-fa14e36b21c4\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/3346c529-f50f-4aec-bcf8-eccd6e38ea9c\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a></div>\n</div>", "count": 1, "has_data": true}, "ge d;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Interruptible Service Pilot</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Rocky Mountain Power</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Schedule 30</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Rocky Mountain Power proposed the elimination of Schedule 30, the Interruptible Service Pilot program, due to a lack of participation. Because the company is seeking to terminate this specific pilot program, the provided materials do not contain its incentive structure or compensation rates, but instead detail a proposed replacement Commercial and Industrial Demand Response (C&I DR) pilot under Schedule 114.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Eligible technology includes commercial and industrial custom equipment and electrical loads capable of providing curtailment, regulation reserve, contingency reserve, and frequency response; while specific manufacturers are not listed, requirements include a standard agreement with the program administrator, potential use of data pulse equipment (KYZ pulse initiators, junction boxes, and terminal strips), and compliance with dispatch notifications (Real Time, 4-hour, 60-minute, 20-minute, or 7-minute) to ensure the utility can shut off or control consumption.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/45ec8d88-6bc5-4178-a883-c9c8d2994455\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/47e0a956-27a9-4122-9cab-540560d85cc3\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/de999621-443e-4bb9-885c-41fad959ed34\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/59c279f0-f428-432e-9c84-1271cffeb169\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a> <a href=\"https://app.halcyon.io/documents/2ee2c878-d53f-4156-9920-6866184d5c45\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 4</a> <a href=\"https://app.halcyon.io/documents/e9e6547d-1e23-4daa-ab40-ec57b1a07c59\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 5</a> <a href=\"https://app.halcyon.io/documents/664614e2-f57a-4971-8a60-346c5bd23880\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 6</a></div>\n</div>\n<div style=\"border-bottom:1px solid #ddd;padding:10px 0;\">\n  <div style=\"font-weight:bold;font-size:12px;color:#1a1a2e;\">Wattsmart</div>\n  <div style=\"font-size:10px;color:#666;margin-bottom:6px;\">Rocky Mountain Power</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Program Description</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">The wattsmart program, a component of Rocky Mountain Power's demand-side management (DSM) portfolio, aims to promote energy efficiency and peak reduction as cost-effective alternatives to traditional supply-side resources to manage load growth and meet system requirements. The program is divided into two primary sectors: wattsmart homes and wattsmart business. The wattsmart homes program offers incentives for energy-efficient products and services to residential customers (Schedules 2 or 19) and landlords of those properties, covering new construction, multi-family, manufactured, and single-family homes. Benefits include incentives for heat pump installations, smart thermostats, and home energy assessments (self-guided, virtual, or in-person). The wattsmart business program provides support and incentives for implementing energy-efficient practices and technologies, such as lighting, HVAC, refrigeration upgrades, and custom energy-saving projects. Participants in the business sector also receive technical assistance to identify energy-saving opportunities and estimate potential savings.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Compensation Structure</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Commercial customers participate in the wattsmart battery program by installing eligible battery equipment and allowing Rocky Mountain Power to utilize it for grid management. Compensation is provided through an enrollment incentive and an annual participation incentive. For commercial batteries, the enrollment incentive is custom and may be considered at the company's discretion for custom projects or large capacity batteries. Enrollment incentives for new battery purchases are capped at 70% of the equipment costs and are delivered as direct payments after verification. The annual participation incentive for commercial customers is 'up to' $15/kW during the commitment term and $50/kW after the commitment term or for existing batteries where no enrollment incentive applies. These annual incentives are distributed as monthly bill credits applied toward energy charges. Participants are those taking service under the electric service schedules listed on Schedule 191.</div>\n  <div style=\"font-size:10px;font-weight:bold;color:#4b0082;margin-bottom:2px;\">Technologies Eligible</div>\n  <div style=\"font-size:11px;color:#333;line-height:1.5;margin-bottom:6px;\">Eligible technologies include battery storage (for Categories 1, 2, and 3), as well as remotely controlled relays and automatic transfer switches for back-up generators or building management systems (Category 3). Battery equipment must be qualified by the company, and the program aims to provide guidance to manufacturers on utility grid integration. Requirements include safety and operational standards, as well as the ability for the company to dispatch systems for grid management 24 hours per day, 365 days per year (year-round) for uses such as peak management and ancillary services. Category 3 demand response requires curtailable loads greater than 500 kW that can respond to real-time events (automated dispatch within 50 seconds) or advanced notice events (within 7 minutes). While the company may require customers to return enrollment incentives on a pro-rated basis if they end participation before the minimum four-year commitment term, specific financial penalties for individual event non-compliance are not detailed.</div>\n  <div style=\"margin-top:3px;\"><a href=\"https://app.halcyon.io/processes/f10d237e-48c2-4f48-bfa7-90a260f6a546\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Docket 1</a> <a href=\"https://app.halcyon.io/documents/24834840-ca58-4c59-a6aa-ac7717468652\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 1</a> <a href=\"https://app.halcyon.io/documents/1e5016e0-ba85-4f36-876a-d1920ae91955\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 2</a> <a href=\"https://app.halcyon.io/documents/ea47f2cf-aee1-408d-98f8-044d72611e00\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 3</a> <a href=\"https://app.halcyon.io/documents/74a4f6e4-293e-4287-bdf9-f72da98185eb\" target=\"_blank\" style=\"color:#4a9fd4;font-size:10px;text-decoration:underline;\">Source 4</a></div>\n</div>", "count": 2, "has_data": tr
